// ════════════════════════════════════════════════
//  INSCRIPCIÓN MÚLTIPLE A GRUPOS
// ════════════════════════════════════════════════

// Pricing tiers: [minGroups, maxGroups, pricePerGroup]
const PAQUETES_DEFAULT = [
  {min:1,max:1,precio:1400,label:'1 semana — $1,400'},
  {min:2,max:3,precio:1200,label:'2–3 semanas — $1,200 c/u'},
  {min:4,max:4,precio:900, label:'4 semanas — $900 c/u'},
  {min:5,max:99,precio:800, label:'5+ semanas — $800 c/u'},
];

function getPrecioXGrupo(n, paquetes){
  var tiers = paquetes||PAQUETES_DEFAULT;
  for(var i=0;i<tiers.length;i++){
    if(n>=tiers[i].min && n<=tiers[i].max) return tiers[i].precio;
  }
  return tiers[tiers.length-1].precio;
}

function promoAplicaACursoGrupo(promo, cursoNombre, grupoId){
  if(!promo.cursosAplicables || promo.cursosAplicables==='todos') return true;
  if(!cursoNombre) return false;
  var lista = promo.cursosAplicables.split(',').map(function(s){return s.trim();});
  return lista.some(function(entry){
    var partes = entry.split('|');
    var cn = partes[0], gid = partes[1];
    if(cn !== cursoNombre) return false;
    if(!gid) return true; // entrada aplica a TODO el curso, sin importar el grupo
    return gid === (grupoId||''); // entrada aplica SOLO a ese grupo específico
  });
}

function actualizarCostoBase(){
  var promoCont = document.getElementById('f-promo-cont');
  var cursoNombre = document.getElementById('f-curso')?.value;
  if(!cursoNombre){ if(promoCont) promoCont.style.display='none'; return; }
  if(promoCont) promoCont.style.display='block';
  recalcPagoConPromo();
}

function recalcPagoConPromo(soloRecalcular){
  var cursoNombre = document.getElementById('f-curso')?.value;
  var curso = cursoNombre ? (STATE.cursos||[]).find(function(c){return c.nombre===cursoNombre;}) : null;
  var pagoEl = document.getElementById('f-pago');
  var pagoMensualEl = document.getElementById('f-pago-mensual');
  var hintEl = document.getElementById('f-promo-hint');
  var promoSel = document.getElementById('f-promo');
  if(!curso || !pagoEl) return;
  var base = curso.costoBase || 0;
  // Reconstruir las OPCIONES del select cada vez que cambia el curso — solo promos
  // realmente aplicables a ESTE curso (cursosAplicables='todos' o que lo incluya).
  if(promoSel && !soloRecalcular){
    var vigentes = getPromosVigentes(monthStr()).filter(function(p){
      return promoAplicaACursoGrupo(p, cursoNombre, null);
    });
    var valorPrevio = promoSel.value;
    promoSel.innerHTML = '<option value="">— Sin promoción —</option>' + buildPromoOpts(vigentes);
    if(vigentes.some(function(p){return p.id===valorPrevio;})) promoSel.value = valorPrevio;
  }
  var promoId = document.getElementById('f-promo')?.value;
  var precioFinal = base, hintTxt = '';
  if(promoId){
    var promo = (STATE.promociones||[]).find(function(p){return p.id===promoId;});
    var razon = promoRazonInvalida(promo, 1, curso.nombre);
    if(razon){
      hintTxt = '⚠ '+razon;
    } else if(promo){
      var desc = promo.tipo==='porcentaje' ? +(base*promo.valor/100).toFixed(2) : promo.valor;
      precioFinal = Math.max(0, +(base-desc).toFixed(2));
      hintTxt = '✓ '+promo.nombre+': descuento de '+fmtMXN(desc)
        +' → precio sugerido '+fmtMXN(precioFinal)
        +'. El precio cobrado es el que escribas arriba en "Primer pago".';
    }
  } else {
    precioFinal = base;
  }
  // Solo poblar f-pago si está vacío o marcado como valor por defecto (no editado por el usuario)
  if(!pagoEl.value || pagoEl.dataset.default==='1'){
    pagoEl.value = precioFinal;
    pagoEl.dataset.default = '1';
  }

function distribuirPago(total,n){
  total=Math.floor(total);
  if(n<=0)return [];
  if(n===1)return [total];
  var q=Math.floor(total/n),r=total%n,amounts=[];
  for(var i=0;i<n-1;i++) amounts.push(r>0?q+1:q);
  amounts.push(total-amounts.reduce(function(a,b){return a+b;},0));
  return amounts;
}
function onManualTotalChange(){
  var inp=document.getElementById('mi-total-input');
  if(!inp)return;
  var total=Math.floor(parseFloat(inp.value)||0);
  var min=parseInt(inp.getAttribute('data-min'))||0;
  // FIX: ya no bloqueamos el precio mínimo — si el usuario pone menos,
  // se mostrará advertencia y al guardar se pedirá autorización.
  var warn=document.getElementById('mi-ajuste-warn');
  if(warn){
    if(total>0&&min>0&&total<min){
      warn.style.display='block';
      warn.innerHTML='⚠️ Precio por debajo del costo base ('+fmtMXN(min)+').'
        +(puedeAutorizarPromos()?' El Semidios puede autorizarlo directamente.':' Se enviará a autorización del Modo Dios al guardar.');
    } else {
      warn.style.display='none';
    }
  }
  var n=document.querySelectorAll('.f-grupo-chk:checked').length;
  if(n===0)return;
  var dist=distribuirPago(total,n);
  var box=document.getElementById('mi-dist-box');
  var txt=document.getElementById('mi-dist-txt');
  if(box&&txt){
    if(dist.every(function(v){return v===dist[0];})){
      txt.textContent='$'+dist[0].toLocaleString('es-MX')+' × '+n+' contratos';
    } else {
      txt.textContent=dist.map(function(v,i){return 'C'+(i+1)+': $'+v.toLocaleString('es-MX');}).join(' · ');
    }
    box.style.display='block';
  }
  var pf=document.getElementById('f-pago');
  if(pf) pf.value=total;
}
// Calcula el precio/semana dinámicamente: costoBase del curso menos el descuento
// de la promoción aplicable (STATE.promociones) según el número de grupos (n) y el curso.
function getPrecioPaquete(curso, n){
  var base = parseFloat(String((curso&&curso.costoBase)||'').replace(/[^0-9.]/g,''))||0;
  var cm = monthStr();
  var candidatas = (STATE.promociones||[]).filter(function(p){
    if(!p.activa||p.estado==='inactiva') return false;
    var fi=p.fechaInicio?p.fechaInicio.substring(0,7):'';
    var ff=p.fechaFin?p.fechaFin.substring(0,7):'';
    if(fi&&fi>cm) return false;
    if(ff&&ff<cm) return false;
    if(!(p.mesesMinimos<=n)) return false;
    if(p.cursosAplicables && p.cursosAplicables!=='todos' && curso){
      var lista=p.cursosAplicables.split(',').map(function(s){return s.trim();});
      var aplica=lista.some(function(entry){
        var cn=entry.split('|')[0];
        return cn===curso.nombre||entry===curso.nombre;
      });
      if(!aplica) return false;
    }
    return true;
  });
  candidatas.sort(function(a,b){return (b.mesesMinimos||0)-(a.mesesMinimos||0);});
  var promo=candidatas[0]||null;
  var precio=base;
  var label=base>0?('Precio regular — $'+base.toLocaleString('es-MX')+' c/u'):'—';
  if(promo){
    var desc = promo.tipo==='porcentaje' ? base*((promo.valor||0)/100) : (promo.valor||0);
    precio = Math.max(0, base-desc);
    label = promo.nombre+' — $'+precio.toLocaleString('es-MX')+' c/u';
  }
  return {precio:precio, label:label, promo:promo};
}

function recalcMultiPago(cursoNombre){
  var checks = [...document.querySelectorAll('.f-grupo-chk:checked')];
  var n = checks.length;
  var info = document.getElementById('multi-paquete-info');
  // Highlight selected labels
  document.querySelectorAll('.f-grupo-chk').forEach(function(chk){
    var lbl = document.getElementById('lbl-g-'+chk.value);
    if(lbl) lbl.style.borderColor = chk.checked ? 'var(--accent)' : 'var(--border)';
  });
  if(!info) return;
  if(n===0){ info.style.display='none'; document.getElementById('f-pago').value=''; return; }
  info.style.display='block';
  var curso = STATE.cursos.find(function(c){return c.nombre===cursoNombre;});
  var pp = getPrecioPaquete(curso, n);
  var precio = pp.precio;
  var total = precio*n;
  document.getElementById('mi-count').textContent = n;
  document.getElementById('mi-precio').textContent = '$'+precio.toLocaleString('es-MX')+' MXN';
  document.getElementById('mi-paquete').textContent = pp.label;
  document.getElementById('mi-total').textContent = '$'+total.toLocaleString('es-MX')+' MXN';
  // FIX: solo actualizar f-pago si el usuario no lo modificó manualmente
  var _fp=document.getElementById('f-pago');
  if(_fp&&(_fp.dataset.default==='1'||!_fp.value)){_fp.value=total;_fp.dataset.default='1';}
  var inp=document.getElementById('mi-total-input');
  var minTxt=document.getElementById('mi-min-txt');
  if(inp){
    var autoPrevio=parseFloat(inp.getAttribute('data-autoval')||'0');
    var valorActual=parseFloat(inp.value)||0;
    var fueEditadoManualmente = inp.value!=='' && valorActual!==autoPrevio;
    // FIX: solo actualizar si el usuario NO lo ha tocado manualmente
    if(!fueEditadoManualmente){
      inp.value=total;
    }
    inp.setAttribute('data-autoval',total);
    // FIX: data-min = costoBase×grupos (mínimo real). El precio de la promo NO es el piso.
    if(cursoNombre){
      var cursoObjM2=(STATE.cursos||[]).find(function(c){return c.nombre===cursoNombre;});
      var costoB2=cursoObjM2?(parseFloat(String(cursoObjM2.costoBase||'').replace(/[^0-9.]/g,''))||0):0;
      inp.setAttribute('data-min',Math.floor(costoB2*n));
    } else { inp.setAttribute('data-min',0); }
    inp.removeAttribute('min'); // FIX CLAVE: quitar min HTML que el navegador enforza
    if(minTxt)minTxt.textContent='$'+total.toLocaleString('es-MX');
    onManualTotalChange();
  }
}

async function guardarMatriculasMultiples(){
  var alumno  = (document.getElementById('f-alumno')||{}).value?.trim();
  var nac     = document.getElementById('f-nac')?.value||null;

  // Validation with hints
  var valid=true;
  var req=[['f-alumno',alumno,'Nombre del alumno requerido'],
           ['f-nac',nac,'Fecha de nacimiento requerida'],
           ['f-curso',curso,'Selecciona un curso'],
           ['f-titular',titular,'Nombre del titular requerido'],
           ['f-tel',tel,'Teléfono requerido']];
  // Email format validation
  if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/i.test(email)){
    resaltarError('f-email');mostrarHintCampo('f-email','Correo electrónico no válido');valid=false;
  }
  req.forEach(function(r){
    if(!r[1]){resaltarError(r[0]);mostrarHintCampo(r[0],r[2]);valid=false;}
  });
  if(!valid){
    var fe=document.querySelector('.field-err');
    if(fe)fe.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }

  var gruposSelIds=[...document.querySelectorAll('.f-grupo-chk:checked')].map(function(c){return c.value;});
  if(gruposSelIds.length===0){
    var cont=document.getElementById('f-multi-grupos-cont');
    if(cont){
      // Aviso visible directamente sobre los checkboxes de grupo (no arriba en Curso)
      var aviso=cont.querySelector('.grupo-aviso-err');
      if(!aviso){
        aviso=document.createElement('div');
        aviso.className='grupo-aviso-err';
        aviso.style.cssText='color:#dc2626;font-size:12px;font-weight:700;margin-bottom:8px;padding:8px 10px;background:#fef2f2;border:1px solid #fca5a5;border-radius:6px';
        cont.insertBefore(aviso, cont.firstChild);
      }
      aviso.textContent='⚠ Marca al menos un grupo de la lista para poder inscribir al alumno.';
      cont.style.outline='2px solid #dc2626';
      cont.style.outlineOffset='3px';
      cont.scrollIntoView({behavior:'smooth', block:'center'});
      setTimeout(function(){cont.style.outline='';}, 2500);
    } else {
      mostrarHintCampo('f-curso','Selecciona al menos un grupo para inscribir');
    }
    return;
  }

  var cursoObj=STATE.cursos.find(function(c){return c.nombre===curso;});
  var n=gruposSelIds.length;
  var precioPorGrupo=getPrecioXGrupo(n);
  var autoTotal=precioPorGrupo*n;
  var inpManual=document.getElementById('mi-total-input');
  var fpPago=document.getElementById('f-pago');
  var userInputTotal=Math.floor(parseFloat(inpManual&&inpManual.value)||0);
  var fpagoVal=Math.floor(parseFloat(fpPago&&fpPago.value)||0);
  // FIX COMPLETO: leer el precio desde f-pago ("Primer pago") si el usuario lo modificó,
  // ya que es el campo donde el usuario escribe el precio especial.
  // Si f-pago difiere de mi-total-input Y fue modificado manualmente, f-pago tiene prioridad.
  var fpagoMod=fpPago&&fpPago.dataset.default!=='1'&&fpagoVal>0;
  var totalPago=fpagoMod?fpagoVal:(userInputTotal>0?userInputTotal:autoTotal);
  // ── Autorización si el precio está por debajo del costo base ──────────────
  var cursoBase=parseFloat(String((cursoObj&&cursoObj.costoBase)||'').replace(/[^0-9.]/g,''))||0;
  var minimoReqM=cursoObj?Math.max(cursoObj.pagoMinimo||0,cursoBase):0;
  var necesitaAuthM=minimoReqM>0&&totalPago>0&&totalPago<minimoReqM&&!puedeAutorizarPromos();
  var semidiosAuthM=minimoReqM>0&&totalPago>0&&totalPago<minimoReqM&&puedeAutorizarPromos();
  var motivoAuthM='';
  if(necesitaAuthM||semidiosAuthM){
    var msgAuth=semidiosAuthM
      ?'ℹ️ Semidios activo. Total $'+totalPago.toLocaleString('es-MX')+' < costo base $'+minimoReqM.toLocaleString('es-MX')+'.\nSe autorizará automáticamente. Escribe el motivo:'
      :'⚠️ Total $'+totalPago.toLocaleString('es-MX')+' < costo base $'+minimoReqM.toLocaleString('es-MX')+'.\nLa matrícula quedará PENDIENTE de autorización del Modo Dios.\nMotivo (beca, caso especial, etc.):';
    motivoAuthM=prompt(msgAuth);
    if(motivoAuthM===null)return; // canceló
  }
  var dist=distribuirPago(totalPago,n);

  // Method
  var pagoStatusEl=document.querySelector('input[name="f-pago-status"]:checked');
  var yaPagado=pagoStatusEl&&pagoStatusEl.value==='pagado';
  var metEl=document.querySelector('input[name="f-metodo-pago"]:checked');
  var metodo=metEl?metEl.value:'cash';

  // Create one matrícula per group
  var foliosCreados=[];
  var nombresCreados=[];
  gruposSelIds.forEach(function(gid,idx){
    var grupo=cursoObj?cursoObj.grupos.find(function(g){return g.id===gid;}):null;
    var folio=STATE.nextFolio++;
    foliosCreados.push(folio);
    nombresCreados.push(alumno+' — '+(grupo?grupo.nombre:'Grupo '+(idx+1)));
    STATE.matrículas.push({
      folio,alumno,nacimiento:nac,curso,titular,email,telefono:tel,
      primerPago:dist[idx]||precioPorGrupo,
      pagoTipo:'unico', // Inscripción por grupo = pago único (ya cobrado completo al inscribir, no recurrente)
      fecha:fmtFecha(fechaISO),fechaISO,
      grupoId:gid,
      grupoNombre:grupo?grupo.nombre:'',
      salon:grupo?grupo.salon||'':'',
      notas:notas+(notas?' | ':'')+'Paquete '+n+' grupo'+(n>1?'s':'')+' — Folio #'+folio,
      createdAt:new Date().toISOString(),createdBy:currentUser.username,
      enPaquete:true,paqueteTotal:totalPago,paqueteFolios:[]
    });
  });

  // Update paqueteFolios
  STATE.matrículas.filter(function(m){return foliosCreados.includes(m.folio);}).forEach(function(m){
    m.paqueteFolios=foliosCreados;
  });

  // Register ONE global payment if already paid
  if(yaPagado&&totalPago>0){
    var comm=0,iva=0,neto=totalPago;
    if(metodo==='card'){comm=+(totalPago*0.035).toFixed(2);iva=+(comm*0.16).toFixed(2);neto=+(totalPago-comm-iva).toFixed(2);}
    STATE.pagosRegulares.push({id:uid(),alumnoNombre:alumno,crmFolio:foliosCreados[0],curso,
      meses:[monthStr()],mesesCount:1,montoBase:totalPago,subtotal:totalPago,
      promoId:null,promoNombre:null,descuentoMonto:0,montoFinal:totalPago,
      commMP:comm,ivaMP:iva,neto,method:metodo,
      fecha:fmtFecha(fechaISO),fechaISO,
      notas:'Pago paquete '+n+' grupo'+(n>1?'s':'')+' — Folios #'+foliosCreados.join(', #'),
      createdAt:new Date().toISOString(),createdBy:currentUser.username});
  }

  // Registrar solicitud de autorización si el precio fue por debajo del mínimo
  if(necesitaAuthM&&motivoAuthM!==null){
    if(!STATE.autorizacionesPago)STATE.autorizacionesPago=[];
    foliosCreados.forEach(function(folio){
      STATE.autorizacionesPago.push({
        folio,alumno,curso,
        montoPropuesto:Math.floor(totalPago/n),
        minimoRequerido:minimoReqM,
        motivo:motivoAuthM,
        estado:'pendiente',
        solicitadoEn:new Date().toISOString(),
        solicitadoPor:currentUser.username
      });
    });
  }
  await saveState();
  renderMatriculas();
  buildSidebar();

  // Show download panel instead of auto-close
  mostrarPanelDescargaContratos(foliosCreados, nombresCreados);
}

// ── Vista principal: clases de HOY para el instructor logueado ────────────
function autoFinalizarSesionesPasadas(){
  var ahora=new Date();
  var changed=false;
  (STATE.sesionesClase||[]).forEach(function(s){
    var limite=horarioHastaDeSesion(s);
    // Si no hay horarioHasta programado, cerrar después de 8 horas máximo
    if(!limite){
      var primerTrampoInicio=null;
      ['tramosP','tramosA'].forEach(function(k){(s[k]||[]).forEach(function(t){if(t.inicio&&(!primerTrampoInicio||t.inicio<primerTrampoInicio))primerTrampoInicio=t.inicio;});});
      if(primerTrampoInicio){
        var maxFin=new Date(new Date(primerTrampoInicio).getTime()+8*3600000);
        if(ahora>=maxFin) limite=maxFin;
      }
    }
    if(!limite||ahora<=limite) return;
    ['P','A'].forEach(function(rol){
      var campo=rol==='P'?'estadoP':'estadoA';
      var trampKey=rol==='P'?'tramosP':'tramosA';
      var horasKey=rol==='P'?'horasInstructor':'horasAsistente';
      if(s[campo]!=='iniciada') return;
      var tramos=s[trampKey]||[];
      var tr=tramos[tramos.length-1];
      if(tr&&!tr.fin){
        tr.fin=limite.toISOString();
        tr.horas=+Math.max(0,(limite-new Date(tr.inicio))/3600000).toFixed(2);
        var tramosAutoRol=s[trampKey]||[];
        s[horasKey]=+tramosAutoRol.reduce(function(a,t){return a+(t.horas||0);},0).toFixed(2);
      }
      s[campo]='finalizada';
      changed=true;
    });
  });
  if(changed) saveState();
}

      instructorId:c.instructorId,asistenteId:c.asistenteId
    }];
    grupos.forEach(function(g){
      var gInstr=g.instructorId||c.instructorId, gAsist=g.asistenteId||c.asistenteId;
      var esP=gInstr===uid||(maestro&&gInstr===maestro.id);
      var esA=gAsist===uid||(maestro&&gAsist===maestro.id);
      if(!esP&&!esA) return;
      // No mostrar cursos que aún no han iniciado
     var fechaIni=c.fechaInicio||g.fechaInicio||'';
     if(fechaIni && fechaIni > hoy) return;
     todas.push({c:c,g:g,esP:esP,esA:esA});
    });
  });

  var deHoy = todas.filter(function(t){return diasOverlap(diaHoy, t.g.dia||t.c.dia);});
  var otros = todas.filter(function(t){return !diasOverlap(diaHoy, t.g.dia||t.c.dia);});

  var header='<div class="page-header fade-in"><h2>📅 Mis Clases</h2><p>Hoy: '+diaHoy+', '
    +new Date().toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'})+'</p></div>'
    +'<div class="tab-nav" style="margin-bottom:16px">'
    +_horBtn('hoy','📅 Mis Clases')
    +_horBtn('cursos','📚 Mis Cursos')
    +'</div>';

  var html=header;
  if(deHoy.length===0){
    html+='<div class="empty"><div class="empty-icon">📅</div><h3>No tienes clases programadas para hoy</h3>'
      +'<p>Ninguno de tus grupos asignados cae en "'+diaHoy+'".</p></div>';
  } else {
    html += deHoy.map(renderTarjetaHorario).join('');
  }

  if(otros.length>0){
    html += '<div style="margin-top:28px;margin-bottom:10px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">'
      +'📋 Resto de tu horario semanal ('+otros.length+')</div>';
    html += otros.map(renderTarjetaResumen).join('');
  }

  if(todas.length===0){
    html += '<div class="empty"><div class="empty-icon">🗓️</div><h3>Aún no tienes grupos asignados</h3>'
      +'<p>Pídele al administrador que te asigne como instructor o asistente en algún grupo desde la pestaña Cursos.</p></div>';
    html += debugInstructorInfo(maestro);
  }

  mc.innerHTML = html;
 } catch(err) {
  document.getElementById('main-content').innerHTML =
    '<div class="page-header fade-in"><h2>📅 Mis Clases</h2></div>'
    +'<div class="tab-nav" style="margin-bottom:16px">'
    +_horBtn('hoy','📅 Mis Clases')
    +_horBtn('cursos','📚 Mis Cursos')
    +'</div>'
    +'<div class="empty"><div class="empty-icon">⚠️</div><h3>Error al cargar Horarios</h3>'
    +'<pre style="white-space:pre-wrap;font-size:11px;color:var(--danger);text-align:left;background:var(--surface2);padding:12px;border-radius:8px;overflow:auto;max-width:100%">'
    +String((err&&err.stack)||(err&&err.message)||err).replace(/</g,'&lt;')
    +'</pre><p style="margin-top:10px">Copia este texto y compártelo para corregirlo.</p></div>';
 }
}

// ── Tarjeta de una clase de hoy ────────────────────────────────────────────
function renderTarjetaHorario(t){
  var c=t.c, g=t.g, hoy=todayISO();
  if(!STATE.modulosCurso)STATE.modulosCurso={};
  var mods=STATE.modulosCurso[g.id]||{moduloBase:'',sesiones:{}};
  var modHoy=(mods.sesiones&&mods.sesiones[hoy])||mods.moduloBase||'';

  var s=(STATE.sesionesClase||[]).find(function(x){return x.grupoId===g.id&&x.fecha===hoy;});
  var asis=(STATE.asistencias||[]).find(function(x){return x.grupoId===g.id&&x.fecha===hoy;});
  var anyIniciada = !!(s&&(s.estadoP==='iniciada'||s.estadoA==='iniciada'));
  var anyExiste = !!(s&&(s.estadoP||s.estadoA));

  var info=[];
  if(g.salon) info.push((g.salon==='Netflix'?'🔵':g.salon==='Youtube'?'🔴':g.salon==='Online'?'💻':'▶️')+' '+esc(g.salon));
  if(g.horarioDesde&&g.horarioHasta) info.push('⏰ '+g.horarioDesde+'–'+g.horarioHasta);
  if(g.dia) info.push('📅 '+esc(g.dia));

  var html='<div class="fade-in" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px">';
  html+='<div style="font-size:16px;font-weight:700">'+esc(cursoGrupoLabel(c.nombre,g.nombre))+'</div>';
  if(info.length) html+='<div style="font-size:12px;color:var(--text3);margin-top:3px">'+info.join(' · ')+'</div>';

  if(anyExiste && s.modulo){
    html+='<div style="margin-top:10px;font-size:13px"><strong>📘 Módulo de hoy:</strong> '+esc(s.modulo)+'</div>';
  }

  if(t.esP) html+=renderRolControls(t, 'principal', s, modHoy);
  if(t.esA) html+=renderRolControls(t, 'asistente', s, modHoy);

  if(anyIniciada){
    html+=renderListaAsistencia(t, asis);
  } else if(anyExiste){
    html+='<div style="font-size:12px;color:var(--text3);margin-top:10px">La lista de asistencia se mostrará cuando inicie la clase.</div>';
  }

  html+='</div>';
  return html;
}

// ── Lista de asistencia (Asistencia / Retardo / Falta) ─────────────────────
function renderListaAsistencia(t, asis){
  var alumnos=getAlumnosDeGrupo(t.c.nombre, t.g.id);
  var registros = asis?(asis.registros||[]):[];
  function estadoDe(folio){
    var r=registros.find(function(x){return String(x.folio)===String(folio);});
    return r?r.estado:null;
  }
  if(alumnos.length===0){
    return '<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px;font-size:12px;color:var(--text3)">'

  }
  var EST=[['asistencia','Asistencia','ti-check','var(--green)'],['retardo','Retardo','ti-clock','#f59e0b'],['falta','Falta','ti-x','var(--danger)']];
  var rows=alumnos.map(function(m){
    var est=estadoDe(m.folio);
    var btns=EST.map(function(e){
      var active=est===e[0];
      // Usamos data-attributes para evitar problemas de escape con nombres de alumnos
      // que puedan contener comillas u otros caracteres especiales.
      return '<button class="btn-asist btn-sm"'
        +' data-gid="'+t.g.id+'"'

        +' data-alumno="'+esc(m.alumno||'')+'"'
        +' data-estado="'+e[0]+'"'
        +' style="border:1px solid '+e[3]+';background:'+(active?e[3]:'transparent')+';color:'+(active?'#fff':'var(--text2)')+';border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer"'
        +' onclick="marcarAsistenciaBtn(this)">'
        +'<i class="ti '+e[2]+'"></i> '+e[1]+'</button>';
    }).join('');
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap">'
      +'<span style="flex:1;min-width:140px;font-size:13px;font-weight:500">'+esc(m.alumno)+'</span>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'+btns+'</div>'
      +'</div>';
  }).join('');
  var nA=registros.filter(function(r){return r.estado==='asistencia';}).length;
  var nR=registros.filter(function(r){return r.estado==='retardo';}).length;
  var nF=registros.filter(function(r){return r.estado==='falta';}).length;

    +rows+'</div>';
}

// ── Acciones: comenzar / pausar / reanudar / finalizar / marcar asistencia ─
async function comenzarClaseHorario(gid, cid, rol){
  var inp=document.getElementById('modhoy-'+gid+'-'+rol);
  var modulo=inp?inp.value.trim():'';
  if(!modulo){ alert('Escribe el nombre del módulo que impartirás hoy.'); return; }
  var hoy=todayISO();
  if(!STATE.modulosCurso)STATE.modulosCurso={};
  if(!STATE.modulosCurso[gid])STATE.modulosCurso[gid]={moduloBase:'',sesiones:{}};
  STATE.modulosCurso[gid].sesiones[hoy]=modulo;

  if(!STATE.sesionesClase)STATE.sesionesClase=[];
  var s=STATE.sesionesClase.find(function(x){return x.grupoId===gid&&x.fecha===hoy;});
  if(!s){
    s={id:uid(),grupoId:gid,cursoId:cid,fecha:hoy,mes:monthStr(),modulo:modulo,
       instructorId:null,asistenteId:null,tramosP:[],tramosA:[],
       horasInstructor:0,horasAsistente:0};
    STATE.sesionesClase.push(s);
  }
  s.modulo=modulo;
  // Puente maestro: currentUser.id es el ID del usuario (tabla usuarios),
  // pero sesionesClase.instructorId debe ser p.id (tabla instructores).
  var _maestroB=(STATE.instructores||[]).find(function(i){
    return i.userId===currentUser.id||i.nombre===currentUser.name||i.nombre===currentUser.username;
  });
  var _instrId=_maestroB?_maestroB.id:currentUser.id;

  if(rol==='principal'){
    s.instructorId=_instrId; s.estadoP='iniciada';
    if(!s.tramosP)s.tramosP=[];
    s.tramosP.push({inicio:new Date().toISOString()});
  } else {
    s.asistenteId=_instrId; s.estadoA='iniciada';
    if(!s.tramosA)s.tramosA=[];
    s.tramosA.push({inicio:new Date().toISOString()});
  }
  await saveState();
  renderHorarios();
}

// Tope: el horario programado del grupo (horarioHasta) para la fecha de la sesión.
// Si el instructor olvida dar click en Finalizar/Pausar, las horas no se siguen
// contando más allá de este límite.
function horarioHastaDeSesion(s){
  var c=(STATE.cursos||[]).find(function(x){return x.id===s.cursoId;});
  if(!c) return null;
  var g=(c.grupos||[]).find(function(x){return x.id===s.grupoId;});
  var hh=(g&&g.horarioHasta)||c.horarioHasta;
  if(!hh) return null;
  var d=new Date(s.fecha+'T'+hh+':00');
  return isNaN(d.getTime())?null:d;
}

async function pausarClaseHorario(sesionId, rol){
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s) return;
  var tramos=rol==='principal'?(s.tramosP||[]):(s.tramosA||[]);
  var tr=tramos[tramos.length-1];
  if(tr&&!tr.fin){
    tr.fin=new Date().toISOString(); // hora real del click
    tr.horas=+Math.max(0,(new Date(tr.fin)-new Date(tr.inicio))/3600000).toFixed(2);
    var tramosRol2=rol==='principal'?(s.tramosP||[]):(s.tramosA||[]);
    if(rol==='principal') s.horasInstructor=+tramosRol2.reduce(function(a,t){return a+(t.horas||0);},0).toFixed(2);
    else s.horasAsistente=+tramosRol2.reduce(function(a,t){return a+(t.horas||0);},0).toFixed(2);
  }
  if(rol==='principal') s.estadoP='pausada'; else s.estadoA='pausada';
  await saveState();
  renderHorarios();
}

async function reanudarClaseHorario(sesionId, rol){
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s) return;
  // NO se reasigna instructorId/asistenteId aquí — ya quedó correctamente puenteado
  // (tabla usuarios → tabla instructores) desde comenzarClaseHorario. Sobreescribirlo
  // con currentUser.id crudo corrompía el vínculo y rompía el cálculo de pagos en Contabilidad.
  if(rol==='principal'){
    if(!s.tramosP)s.tramosP=[];
    s.tramosP.push({inicio:new Date().toISOString()});
    s.estadoP='iniciada';
  } else {
    if(!s.tramosA)s.tramosA=[];
    s.tramosA.push({inicio:new Date().toISOString()});
    s.estadoA='iniciada';
  }
  await saveState();
  renderHorarios();
}

async function finalizarClaseHorario(sesionId, rol){
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s) return;
  if(!confirm('¿Finalizar tu participación en esta clase?\n\nSe registrarán las horas trabajadas para tu pago mensual.')) return;
  var tramos=rol==='principal'?(s.tramosP||[]):(s.tramosA||[]);
  var tr=tramos[tramos.length-1];
  if(tr&&!tr.fin){
    tr.fin=new Date().toISOString(); // hora real del click
    tr.horas=+Math.max(0,(new Date(tr.fin)-new Date(tr.inicio))/3600000).toFixed(2);
    var tramosRol2=rol==='principal'?(s.tramosP||[]):(s.tramosA||[]);
    if(rol==='principal') s.horasInstructor=+tramosRol2.reduce(function(a,t){return a+(t.horas||0);},0).toFixed(2);
    else s.horasAsistente=+tramosRol2.reduce(function(a,t){return a+(t.horas||0);},0).toFixed(2);
  }
  if(rol==='principal') s.estadoP='finalizada'; else s.estadoA='finalizada';
  await saveState();
  renderHorarios();
}

// Permite reabrir una sesión ya finalizada: descuenta el tiempo registrado y
// limpia los tramos, para poder "Comenzar" de nuevo y seguir sumando horas hoy.
async function reabrirClaseHorario(sesionId, rol){
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s) return;
  if(!confirm('¿Reabrir esta sesión de hoy?\n\nSe descontará el tiempo ya registrado y podrás iniciar de nuevo para seguir sumando horas.')) return;
  var tramos=rol==='principal'?(s.tramosP||[]):(s.tramosA||[]);
  var sumHoras=tramos.reduce(function(acc,t){return acc+(t.horas||0);},0);
  if(rol==='principal'){
    s.horasInstructor=Math.max(0,(s.horasInstructor||0)-sumHoras);
    s.tramosP=[]; s.estadoP=null;
  } else {
    s.horasAsistente=Math.max(0,(s.horasAsistente||0)-sumHoras);
    s.tramosA=[]; s.estadoA=null;
  }
  await saveState();
  renderHorarios();
}

function marcarAsistenciaBtn(btn){
  // Wrapper para leer data-attributes y evitar problemas de escape en onclick
  marcarAsistencia(btn.dataset.gid, btn.dataset.folio, btn.dataset.alumno, btn.dataset.estado);
}

async function marcarAsistencia(grupoId, folio, alumno, estado){
  var hoy=todayISO();
  if(!STATE.asistencias)STATE.asistencias=[];
  var asis=STATE.asistencias.find(function(a){return a.grupoId===grupoId&&a.fecha===hoy;});
  if(!asis){ asis={id:uid(),grupoId:grupoId,fecha:hoy,registros:[]}; STATE.asistencias.push(asis); }
  var idx=asis.registros.findIndex(function(r){return String(r.folio)===String(folio);});
  if(idx>=0){
    if(asis.registros[idx].estado===estado) asis.registros.splice(idx,1);
    else asis.registros[idx].estado=estado;
  } else {
    asis.registros.push({folio:folio,alumno:alumno,estado:estado});
  }
  await saveState();
  renderHorarios();
}

//  HORARIOS DE CURSOS (admin/God) — vista COMPLETA y EDITABLE
// ════════════════════════════════════════════════
function renderHorariosAdmin(){
  // Admin ve TODOS los instructores, con los mismos controles que ellos tienen
  autoFinalizarSesionesPasadas();
  var mc=document.getElementById('main-content');
  if(!mc) return;
  var hoy=todayISO();
  var diaHoy=diaHoyNombre();

  // Construir lista de todos los grupos con su instructor
  var todos=[];
  // ── Filtro anti-anidamiento: identificar cursos que ya son grupos de otro ──
  var _yaGrupoIds=new Set();     // IDs de cursos convertidos a grupos
  var _yaGrupoNombres=new Set(); // Nombres de grupos (por si el ID no coincide)
  (STATE.cursos||[]).forEach(function(c){
    if(!(c.grupos&&c.grupos.length)) return;
    c.grupos.forEach(function(g){
      // 1. Capturar por _originalCursoId (conversión explícita con agregarCursoComoGrupo)
      if(g._originalCursoId) _yaGrupoIds.add(g._originalCursoId);
      // 2. Capturar por g.id (si el grupo conservó el mismo id del curso original)
      if(g.id&&!g.id.startsWith('_main')) _yaGrupoIds.add(g.id);
      // 3. Capturar por nombre (grupos creados manualmente con el mismo nombre del curso)
      if(g.nombre) _yaGrupoNombres.add(g.nombre.toLowerCase().trim());
    });
  });
  (STATE.cursos||[]).filter(function(c){
    // Excluir si el id ya está registrado como grupo de otro curso
    if(_yaGrupoIds.has(c.id)) return false;
    // Excluir si es un curso sin grupos propios y su nombre coincide con
    // el nombre de algún grupo en otro curso (grupos creados manualmente)
    if(!(c.grupos&&c.grupos.length)&&_yaGrupoNombres.has(c.nombre.toLowerCase().trim())) return false;
    return true;
  }).forEach(function(c){
    var grupos=(c.grupos&&c.grupos.length)?c.grupos:[{
      id:'_main_'+c.id,nombre:c.nombre,salon:c.salon,dia:c.dia,
      horarioDesde:c.horarioDesde,horarioHasta:c.horarioHasta,
      instructorId:c.instructorId,asistenteId:c.asistenteId
    }];
    grupos.forEach(function(g){
      var esHoy=diasOverlap(diaHoy,g.dia||c.dia||'');
      todos.push({c:c,g:g,esP:true,esA:false,esHoy:esHoy,_adminView:true});
      // Si tiene asistente, agregar también su tarjeta
      if(g.asistenteId||c.asistenteId){
        todos.push({c:c,g:g,esP:false,esA:true,esHoy:esHoy,_adminView:true});
      }
    });
  });

  // Separar: hoy primero
  var deHoy=todos.filter(function(t){return t.esHoy&&t.esP;}); // principal por grupo, hoy
  var deMas=todos.filter(function(t){return !t.esHoy&&t.esP;}); // resto de la semana

  var header='<div class="page-header fade-in">'
    +'<h2>📅 Horarios de Cursos — Todos los instructores</h2>'
    +'<p>Hoy: '+diaHoy+', '+new Date().toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"})
    +' &nbsp;·&nbsp; '+deHoy.length+' grupo(s) con clase hoy</p></div>';

  var html=header;

  if(deHoy.length===0){
    html+='<div class="empty"><div class="empty-icon">📅</div>'
      +'<h3>No hay grupos programados para hoy ('+diaHoy+')</h3></div>';
  } else {
    html+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;'
      +'letter-spacing:.5px;margin-bottom:12px">📍 Clases de hoy</div>';
    html+=deHoy.map(function(t){return renderTarjetaHorarioAdmin(t);}).join('');
  }

  if(deMas.length>0){
    html+='<div style="margin-top:28px;margin-bottom:10px;font-size:11px;font-weight:700;'
      +'color:var(--text3);text-transform:uppercase;letter-spacing:.5px">'
      +'📋 Resto del horario semanal ('+deMas.length+' grupos)</div>';
    html+=deMas.map(function(t){return renderTarjetaResumenAdmin(t);}).join('');
  }

  mc.innerHTML=html;
}

function renderTarjetaResumenAdmin(t){
  var c=t.c,g=t.g;
  var instrId=g.instructorId||c.instructorId, asistId=g.asistenteId||c.asistenteId;
  var instr=(STATE.instructores||[]).find(function(x){return x.id===instrId;});
  var asist=(STATE.instructores||[]).find(function(x){return x.id===asistId;});
  var info=[];
  if(g.dia||c.dia) info.push('📅 '+(g.dia||c.dia));
  if(g.horarioDesde&&g.horarioHasta) info.push('⏰ '+g.horarioDesde+'–'+g.horarioHasta);
  if(g.salon||c.salon){var s=g.salon||c.salon;info.push((s==='Netflix'?'🔵':s==='Youtube'?'🔴':s==='Online'?'💻':'▶️')+' '+esc(s));}
  return '<div class="fade-in" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;'
    +'padding:10px 14px;margin-bottom:8px;opacity:.85;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<div><strong style="font-size:13px">'+esc(cursoGrupoLabel(c.nombre,g.nombre))+'</strong>'
    +(info.length?' <span style="font-size:12px;color:var(--text3)">· '+info.join(' · ')+'</span>':'')+'</div>'
    +'<div style="font-size:11px;color:var(--text3)">'
    +(instr?'👨‍🏫 '+esc(instr.nombre):'Sin instructor asignado')
    +(asist?'  🤝 '+esc(asist.nombre):'')+'</div>'
    +'</div>';
}

function renderTarjetaHorarioAdmin(t){
  var c=t.c,g=t.g,hoy=todayISO();
  var instrId=g.instructorId||c.instructorId, asistId=g.asistenteId||c.asistenteId;
  var instr=(STATE.instructores||[]).find(function(x){return x.id===instrId;});
  var asist=(STATE.instructores||[]).find(function(x){return x.id===asistId;});
  var s=(STATE.sesionesClase||[]).find(function(x){return x.grupoId===g.id&&x.fecha===hoy;});
  var asis=(STATE.asistencias||[]).find(function(x){return x.grupoId===g.id&&x.fecha===hoy;});
  var anyIniciada=!!(s&&(s.estadoP==='iniciada'||s.estadoA==='iniciada'));
  var anyExiste=!!(s&&(s.estadoP||s.estadoA));
  var info=[];
  if(g.salon||c.salon){var sl=g.salon||c.salon;info.push((sl==='Netflix'?'🔵':sl==='Youtube'?'🔴':sl==='Online'?'💻':'▶️')+' '+esc(sl));}
  if(g.horarioDesde&&g.horarioHasta) info.push('⏰ '+g.horarioDesde+'–'+g.horarioHasta);

  var html='<div class="fade-in" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">';
  html+='<div><div style="font-size:16px;font-weight:700">'+esc(cursoGrupoLabel(c.nombre,g.nombre))+'</div>';
  if(info.length) html+='<div style="font-size:12px;color:var(--text3);margin-top:3px">'+info.join(' · ')+'</div></div>';
  html+='<div style="font-size:12px;color:var(--text2);text-align:right">'
    +(instr?'👨‍🏫 <strong>'+esc(instr.nombre)+'</strong> '+(s&&s.estadoP?'<span style="color:'+(s.estadoP==='finalizada'?'var(--green)':'#f59e0b')+'">'+s.estadoP+'</span>':''):'')
    +(asist?'<br>🤝 <strong>'+esc(asist.nombre)+'</strong> '+(s&&s.estadoA?'<span style="color:'+(s.estadoA==='finalizada'?'var(--green)':'#f59e0b')+'">'+s.estadoA+'</span>':''):'')
    +'</div></div>';

  // Controles de clase — admin puede iniciar/pausar/finalizar en nombre del instructor
  if(instrId){
    var tSimP={c:c,g:g,esP:true,esA:false};
    html+=renderRolControls(tSimP,'principal',s,'');
  }
  if(asistId){
    var tSimA={c:c,g:g,esP:false,esA:true};
    html+=renderRolControls(tSimA,'asistente',s,'');
  }

  // Lista de asistencia editable
  if(anyIniciada){
    html+=renderListaAsistencia({c:c,g:g,esP:true,esA:false},asis);
  } else if(anyExiste){
    html+='<div style="font-size:12px;color:var(--text3);margin-top:10px">La clase ya terminó. '
      +'<button class="btn-ghost btn-sm" onclick="navigate(\'asistencias_admin\')" style="font-size:11px">Ver asistencias históricas</button></div>';
  }

  html+='</div>';
  return html;
}


// ════════════════════════════════════════════════
//  ASISTENCIAS ADMIN: historial completo y editable
// ════════════════════════════════════════════════
function renderAsistenciasAdmin(){
  var mc=document.getElementById('main-content');
  if(!mc) return;
  var grupoIdx={};
  (STATE.cursos||[]).forEach(function(c){
    var grupos=(c.grupos&&c.grupos.length)?c.grupos:[{id:'_main_'+c.id,nombre:c.nombre}];
    grupos.forEach(function(g){ grupoIdx[g.id]={c:c,g:g}; });
  });
  var asistencias=[...(STATE.asistencias||[])].sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var EST2=[['asistencia','Asistencia','var(--green)'],['retardo','Retardo','#f59e0b'],['falta','Falta','var(--danger)']];
  var rows=asistencias.map(function(asis){
    var info=grupoIdx[asis.grupoId];
    var label=info?(asis.grupoId.startsWith('_main_')?info.c.nombre:info.c.nombre+' - '+info.g.nombre):'Grupo desconocido';
    var alumnos=info?getAlumnosDeGrupo(info.c.nombre,info.g.id):[];
    var registros=asis.registros||[];
    var nA=registros.filter(function(r){return r.estado==='asistencia';}).length;
    var nR=registros.filter(function(r){return r.estado==='retardo';}).length;
    var nF=registros.filter(function(r){return r.estado==='falta';}).length;
    var nSin=alumnos.length-registros.length;
    var filas=alumnos.map(function(m){
      var reg=registros.find(function(r){return String(r.folio)===String(m.folio);});
      var est=reg?reg.estado:null;
      var btns=EST2.map(function(e){
        var active=est===e[0];
        return '<button class="btn-sm" data-asid="'+asis.id+'" data-folio="'+m.folio+'" data-alumno="'+esc(m.alumno)+'" data-estado="'+e[0]+'" data-gid="'+asis.grupoId+'"'
          +' style="border:1px solid '+e[2]+';background:'+(active?e[2]:'transparent')+';color:'+(active?'#fff':'var(--tx2)')+';border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer"'
          +' onclick="editarAsistenciaAdmin(this)">'+e[1]+'</button>';
      }).join('');
      return '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--br);flex-wrap:wrap">'
        +'<span style="flex:1;font-size:12px">'+esc(m.alumno)+'</span>'
        +'<div style="display:flex;gap:4px">'+btns+'</div></div>';
    }).join('');
    return '<div style="background:var(--s2);border:1px solid var(--br);border-radius:10px;margin-bottom:12px;overflow:hidden">'
      +'<div style="padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none" onclick="var d=this.nextElementSibling;d.style.display=d.style.display===\'none\'?\'block\':\'none\'">'
      +'<div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(label)+'</div>'
      +'<div style="font-size:11px;color:var(--tx3)">'+fmtFecha(asis.fecha)+' - Asist: '+nA+' / Retardos: '+nR+' / Faltas: '+nF+(nSin>0?' / Sin registro: '+nSin:'')+'</div></div>'
      +'<span style="font-size:11px;color:var(--tx3)">expandir/editar</span></div>'
      +'<div style="display:none">'+filas+'</div></div>';
  }).join('');
  mc.innerHTML='<div class="cnt fade-in">'
    +'<div class="page-hdr"><div><div class="page-title">Registro de Asistencias</div>'
    +'<div class="page-sub">Historial completo - editable por administradores y God</div></div></div>'
    +(asistencias.length===0
      ?'<div class="empty"><div class="empty-icon">📋</div><div class="empty-ttl">Sin asistencias registradas</div>'
       +'<div class="empty-sub">Se registran durante las clases en la pestana Horarios.</div></div>'
      :rows)
    +'</div>';
}

async function editarAsistenciaAdmin(btn){
  if(!STATE.asistencias) return;
  var asis=STATE.asistencias.find(function(a){return a.id===btn.dataset.asid;});
  if(!asis) return;
  var idx=asis.registros.findIndex(function(r){return String(r.folio)===String(btn.dataset.folio);});
  if(idx>=0){
    if(asis.registros[idx].estado===btn.dataset.estado) asis.registros.splice(idx,1);
    else asis.registros[idx].estado=btn.dataset.estado;
  } else {
    asis.registros.push({folio:btn.dataset.folio,alumno:btn.dataset.alumno,estado:btn.dataset.estado});
  }
  await saveState();
  renderAsistenciasAdmin();
}


// ════════════════════════════════════════════════
//  PESTAÑA MAESTROS / INSTRUCTORES

function renderMaestros(){
  const mesActual = monthStr();
  const cm = prevMonth(mesActual); // las horas se pagan a mes caído
  const canEdit = hasPerm('gestionar_cursos') || hasPerm('modo_dios');
  const esInstructor = currentUser.role === 'instructor';
  const inst = STATE.instructores || [];

  // For instructor role: show only their own panel
  if(esInstructor){
    renderPanelInstructor();
    return;
  }

  // Build instructor rows
  function horasImpartidas(id){
    var hP=0, hA=0;
    var maestroP=(STATE.instructores||[]).find(function(x){return x.id===id;});
    var altIds=maestroP&&maestroP.userId?[id,maestroP.userId]:[id];
    (STATE.sesionesClase||[]).forEach(function(s){
      if(s.mes!==cm) return;
      var esInstr=altIds.indexOf(s.instructorId)>=0;
      var esAsist=altIds.indexOf(s.asistenteId)>=0;
      if(esInstr && s.estadoP==='finalizada') hP+=(s.horasInstructor||0);
      if(esAsist && s.estadoA==='finalizada') hA+=(s.horasAsistente||0);
      if(s.estado==='finalizada'&&!s.estadoP&&!s.estadoA){
        if(esInstr) hP+=(s.horasInstructor||0);
        if(esAsist) hA+=(s.horasAsistente||0);
      }
    });
    return {hPrincipal:hP, hAsistente:hA, total:hP+hA};
  }

  function horasPlaneadas(id){
    var total = 0;
    (STATE.cursos||[]).forEach(function(c){
      (c.grupos||[]).forEach(function(g){
        (g.modulos||[]).forEach(function(m){
          if(m.instructorId===id || m.asistenteId===id){
            var hg = calcHorasGrupo(g.horarioDesde, g.horarioHasta);
            // Count sessions in current month
            var sesionesEnMes = contarSesionesMes(m, cm);
            total += hg * sesionesEnMes;
          }
        });
      });
    });
    return total;
  }

  var rows = inst.map(function(p){
    // ── Mes anterior (cm): horas impartidas → lo que se paga ESTE mes ──────
    var _hObj=horasImpartidas(p.id);
    var tarifaA=p.tarifaHoraAsistente||p.tarifaHora||0;
    var hAntTotal=_hObj.total;
    var totalAntMes=+(_hObj.hPrincipal*(p.tarifaHora||0)+_hObj.hAsistente*tarifaA).toFixed(2);
    // ── Mes actual (mesActual): horas finalizadas hasta hoy → se pagan el mes siguiente ──
    var maestroInst=(STATE.instructores||[]).find(function(x){return x.id===p.id;});
    var altIds=maestroInst&&maestroInst.userId?[p.id,maestroInst.userId]:[p.id];
    var hActP=0,hActA=0;
    (STATE.sesionesClase||[]).forEach(function(s){
      if(s.mes!==mesActual) return;
      var esInstr=altIds.indexOf(s.instructorId)>=0;
      var esAsist=altIds.indexOf(s.asistenteId)>=0;
      if(esInstr&&s.estadoP==='finalizada') hActP+=(s.horasInstructor||0);
      if(esAsist&&s.estadoA==='finalizada') hActA+=(s.horasAsistente||0);
      if(s.estado==='finalizada'&&!s.estadoP&&!s.estadoA){
        if(esInstr) hActP+=(s.horasInstructor||0);
        if(esAsist) hActA+=(s.horasAsistente||0);
      }
    });
    var hActTotal=hActP+hActA;
    var totalActMes=+(hActP*(p.tarifaHora||0)+hActA*tarifaA).toFixed(2);
    var tipoBadge = p.tipo==='asistente'
      ? '<span style="background:rgba(107,45,146,.1);color:var(--accent);border-radius:4px;padding:1px 7px;font-size:11px">Asistente</span>'
      : '<span style="background:rgba(16,185,129,.1);color:var(--green);border-radius:4px;padding:1px 7px;font-size:11px">Instructor</span>';
    var activoBadge = p.activo!==false
      ? '<span style="color:var(--green);font-size:11px">● Activo</span>'
      : '<span style="color:var(--text3);font-size:11px">○ Inactivo</span>';
    var isInact=p.activo===false||p.activo==='false';
    var trStyle=isInact?'background:#fde8e6;outline:2px solid #c0392b;outline-offset:-2px':'';
    return '<tr style="'+trStyle+'">'
      + '<td><div style="font-weight:600">'+p.nombre+'</div>'
      + (p.especialidad?'<div style="font-size:11px;color:var(--text3)">'+p.especialidad+'</div>':'')
      + '</td>'
      + '<td>'+tipoBadge+'</td>'
      + '<td class="monto-tag" style="font-size:12px">'+fmtMXN(p.tarifaHora)+'/hr</td>'
      + '<td style="text-align:right"><span style="font-size:13px;font-weight:700;color:var(--text)">'+hAntTotal.toFixed(1)+'</span><span style="font-size:10px;color:var(--text3)"> hrs</span></td>'
      + '<td class="monto-tag" style="color:var(--green);font-weight:700">'+fmtMXN(totalAntMes)+'</td>'
      + '<td style="text-align:right"><span style="font-size:13px;font-weight:700;color:var(--text)">'+hActTotal.toFixed(1)+'</span><span style="font-size:10px;color:var(--text3)"> hrs</span>'
      + (hActTotal===0?'<div style="font-size:10px;color:var(--text3)">sin sesiones finalizadas</div>':'')
      + '</td>'
      + '<td class="monto-tag" style="color:var(--accent)">'+fmtMXN(totalActMes)+'</td>'
      + '<td>'+activoBadge+'</td>'
      + (canEdit?'<td style="white-space:nowrap">'
        + '<button class="btn-ghost btn-sm" style="margin-right:4px" title="Ver sesiones del mes" onclick="showModalSesionesInstructor(\''+p.id+'\')"><i class="ti ti-calendar-stats"></i></button>'
        + '<button class="btn-ghost btn-sm" style="margin-right:4px" onclick="showModalInstructor(\''+p.id+'\')"><i class="ti ti-edit"></i></button>'
        + '<button class="btn-ghost btn-sm" style="margin-right:4px" onclick="toggleInstructor(\''+p.id+'\')" title="Activar/Desactivar"><i class="ti ti-power"></i></button>'
        + '<button class="btn-danger btn-sm" onclick="eliminarInstructor(\''+p.id+'\')" title="Eliminar"><i class="ti ti-trash"></i></button>'
        + '</td>':'')
      + '</tr>';
  }).join('');
  var totalSigMes = inst.reduce(function(acc,p){
    var hP=(STATE.sesionesClase||[]).filter(function(s){
      return s.mes===mesActual&&(s.instructorId===p.id||(p.userId&&s.instructorId===p.userId))&&s.estadoP==='finalizada';
    }).reduce(function(a,s){return a+(s.horasInstructor||0);},0);
    var hA=(STATE.sesionesClase||[]).filter(function(s){
      return s.mes===mesActual&&(s.asistenteId===p.id||(p.userId&&s.asistenteId===p.userId))&&s.estadoA==='finalizada';
    }).reduce(function(a,s){return a+(s.horasAsistente||0);},0);
    var ta=p.tarifaHoraAsistente||p.tarifaHora||0;
    return acc+hP*(p.tarifaHora||0)+hA*ta;
  },0);
  var totalAPagar = inst.reduce(function(acc,p){
    var _o=horasImpartidas(p.id);var ta=p.tarifaHoraAsistente||p.tarifaHora; return acc+_o.hPrincipal*(p.tarifaHora||0)+_o.hAsistente*(ta||0);
  }, 0);
  var totalPlaneado = inst.reduce(function(acc,p){
    return acc + horasPlaneadas(p.id) * p.tarifaHora;
  }, 0);

  document.getElementById('main-content').innerHTML =
    '<div class="page-header fade-in"><h2>'+t('nav_maestros')+'</h2>'
    + '<p>'+inst.length+' instructor'+(inst.length!==1?'es':'')+' registrado'+(inst.length!==1?'s':'')+'</p></div>'

    + '<div class="toolbar">'
    + (canEdit?'<button class="btn-primary" onclick="showModalInstructor()"><i class="ti ti-plus"></i> '+t('mae_nuevo')+'</button>':'')
    + '</div>'

    // Summary cards
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px">'
    + statsCard('Instructores activos', inst.filter(function(p){return p.activo!==false;}).length, '')
    + statsCard('Horas impartidas '+mesLabel(cm), inst.reduce(function(a,p){return a+horasImpartidas(p.id).total;},0).toFixed(1)+' hrs', 'var(--accent)')
    + statsCard('A pagar este mes (horas de '+mesLabel(cm)+')', fmtMXN(totalAPagar), 'var(--green)')
    + statsCard('A pagar el siguiente mes (horas de '+mesLabel(mesActual)+')', fmtMXN(totalSigMes), 'var(--accent)')
    + statsCard('Presupuesto planeado', fmtMXN(totalPlaneado), 'var(--text2)')
    + '</div>'

    + (inst.length===0
      ? '<div class="empty"><div class="empty-icon">👨‍🏫</div><h3>'+t('mae_sin_instructores')+'</h3></div>'
      : '<div class="table-wrap fade-in"><table>'
        + '<thead>'
        + '<tr>'
        + '<th rowspan="2">Instructor</th><th rowspan="2">Tipo</th><th rowspan="2">Tarifa/hr</th>'
        + '<th colspan="2" style="text-align:center;background:rgba(16,185,129,.08);border-bottom:2px solid var(--green);font-size:11px">'+mesLabel(cm)+' — Pagar ESTE mes</th>'
        + '<th colspan="2" style="text-align:center;background:rgba(139,92,246,.08);border-bottom:2px solid var(--accent);font-size:11px">'+mesLabel(mesActual)+' — Pagar el mes siguiente</th>'
        + '<th rowspan="2">Estado</th>'
        + (canEdit?'<th rowspan="2"></th>':'')
        + '</tr>'
        + '<tr>'
        + '<th style="background:rgba(16,185,129,.05);font-size:11px">Horas impartidas</th>'
        + '<th style="background:rgba(16,185,129,.05);font-size:11px">Total a pagar</th>'
        + '<th style="background:rgba(139,92,246,.05);font-size:11px">Horas acumuladas</th>'
        + '<th style="background:rgba(139,92,246,.05);font-size:11px">Proyección</th>'
        + '</tr>'
        + '</thead>'
        + '<tbody>'+rows+'</tbody></table></div>'
    )

    // Payment alert if ≥10th of month
    + generarAlertaPago(totalAPagar, cm, cm);
}

function statsCard(label, value, color){
  return '<div class="mini-stat"><div class="ms-label">'+label+'</div>'
    + '<div class="ms-val" style="'+(color?'color:'+color:'')+'">'+value+'</div></div>';
}

function generarAlertaPago(total, cm, mesHoras){
  var dia = new Date().getDate();
  if(dia < 8 || total <= 0) return '';
  var diaSemana = new Date().getDay();
  var aviso = dia >= 8 && dia <= 12
    ? '⏰ Se acerca el día de pago de instructores (día 10)'
    : dia > 12 ? '⚠️ El pago de instructores ya está vencido' : '';
  if(!aviso) return '';
  return '<div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:10px;padding:14px 18px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
    + '<div><div style="font-weight:700;color:#92600a">'+aviso+'</div>'

    + '<button class="btn-primary" onclick="confirmarPagoInstructores()"><i class="ti ti-check"></i> Confirmar y registrar pago</button>'

function calcHorasGrupo(desde, hasta){
  if(!desde||!hasta) return 0;
  var s = toMin(desde), e = toMin(hasta);
  if(e <= s) e += 1440; // past midnight
  return +((e-s)/60).toFixed(2);
}

function contarSesionesMes(modulo, cm){
  // Count planned sessions in the current month based on module dates
  if(!modulo.fechaInicio) return 0;
  var start = new Date(modulo.fechaInicio+'T12:00:00');
  var end = modulo.fechaFin ? new Date(modulo.fechaFin+'T12:00:00') : new Date(start.getFullYear(), start.getMonth()+1, 0);
  var mes = parseInt(cm.split('-')[1])-1;
  var anio = parseInt(cm.split('-')[0]);
  var count = 0;
  var cur = new Date(start);
  while(cur <= end){
    if(cur.getMonth()===mes && cur.getFullYear()===anio) count++;
    cur.setDate(cur.getDate()+7); // weekly sessions
  }
  return count;
}

async function adminFinalizarSesion(sesionId, rol){
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s)return;
  var limite=horarioHastaDeSesion(s);
  var finTime=(limite&&new Date()>limite)?limite:new Date();
  var campoEstado=rol==='principal'?'estadoP':'estadoA';
  var campoTramos=rol==='principal'?'tramosP':'tramosA';
  var campoHoras=rol==='principal'?'horasInstructor':'horasAsistente';
  var tramos=s[campoTramos]||[];
  var tr=tramos[tramos.length-1];
  if(tr&&!tr.fin){
    tr.fin=finTime.toISOString();
    tr.horas=Math.max(0,(finTime-new Date(tr.inicio))/3600000);
    s[campoHoras]=(s[campoHoras]||0)+tr.horas;
  }
  s[campoEstado]='finalizada';
  await saveState();
  showModalSesionesInstructor(instrId, s.mes);
}

async function adminBorrarSesion(sesionId, instrId, rol){
  // Solo borra los datos DEL ROL de este instructor en esta sesión — NO afecta al otro rol.
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s)return;
  var rolLabel=rol==='principal'?'Instructor Principal':'Instructor Asistente';
  if(!confirm('¿Borrar las horas de '+rolLabel+' en esta sesión?\n\nSolo afecta a este instructor y este día. El otro rol (si existe) no se modifica.')) return;
  if(rol==='principal'){
    s.tramosP=[]; s.horasInstructor=0; s.estadoP=null;
  } else {
    s.tramosA=[]; s.horasAsistente=0; s.estadoA=null;
  }
  // Si la sesión quedó completamente vacía (ningún rol con datos), eliminarla del todo
  var vacioP=!s.estadoP && !(s.tramosP&&s.tramosP.length);
  var vacioA=!s.estadoA && !(s.tramosA&&s.tramosA.length);
  if(vacioP && vacioA){
    STATE.sesionesClase=(STATE.sesionesClase||[]).filter(function(x){return x.id!==sesionId;});
  }
  await saveState();
  showModalSesionesInstructor(instrId, s.mes);
}

async function adminEditarHorasTramo(sesionId, instrId, rol, tramoIdx){
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s)return;
  var campoTramos=rol==='principal'?'tramosP':'tramosA';
  var campoHoras=rol==='principal'?'horasInstructor':'horasAsistente';
  var tr=(s[campoTramos]||[])[tramoIdx];
  if(!tr)return;
  function fmtHHMM(iso){ if(!iso) return ''; var d=new Date(iso); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
  var horaIniActual=fmtHHMM(tr.inicio);
  var horaFinActual=tr.fin?fmtHHMM(tr.fin):horaIniActual;
  var reHora=/^([01]\d|2[0-3]):[0-5]\d$/;

  var nuevaIni=prompt('Hora de INICIO de esta clase ('+s.fecha+'), formato HH:MM 24hrs:', horaIniActual);
  if(nuevaIni===null) return;
  nuevaIni=nuevaIni.trim();
  if(!reHora.test(nuevaIni)){ alert('Formato de hora inválido. Usa HH:MM, por ejemplo 18:00'); return; }

  var nuevaFin=prompt('Hora de FIN de esta clase ('+s.fecha+'), formato HH:MM 24hrs:', horaFinActual);
  if(nuevaFin===null) return;
  nuevaFin=nuevaFin.trim();
  if(!reHora.test(nuevaFin)){ alert('Formato de hora inválido. Usa HH:MM, por ejemplo 20:00'); return; }

  var partsI=nuevaIni.split(':').map(Number), partsF=nuevaFin.split(':').map(Number);
  var dIni=new Date(s.fecha+'T00:00:00'); dIni.setHours(partsI[0],partsI[1],0,0);
  var dFin=new Date(s.fecha+'T00:00:00'); dFin.setHours(partsF[0],partsF[1],0,0);
  if(dFin<=dIni) dFin.setDate(dFin.getDate()+1); // por si la clase cruza medianoche

  tr.inicio=dIni.toISOString();
  tr.fin=dFin.toISOString();
  tr.horas=+((dFin-dIni)/3600000).toFixed(2);

  // El total de la sesión se recalcula como SUMA de todos los tramos de este rol,
  // nunca como resta/suma incremental, para no arrastrar errores de redondeo.
  var tramosRol=s[campoTramos]||[];
  s[campoHoras]=+tramosRol.reduce(function(acc,t){return acc+(t.horas||0);},0).toFixed(2);

  await saveState();
  showModalSesionesInstructor(instrId, s.mes);
}

async function adminBorrarTramo(sesionId, instrId, rol, tramoIdx){
  var s=(STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s)return;
  var campoTramos=rol==='principal'?'tramosP':'tramosA';
  var campoHoras=rol==='principal'?'horasInstructor':'horasAsistente';
  var tramos=s[campoTramos]||[];
  var tr=tramos[tramoIdx];
  if(!tr)return;
  if(!confirm('¿Borrar esta clase de '+(tr.horas||0).toFixed(2)+' h del '+s.fecha+'?')) return;
  tramos.splice(tramoIdx,1);
  s[campoTramos]=tramos;
  // Recalcular como SUMA del resto de tramos (consistente con adminEditarHorasTramo).
  s[campoHoras]=+tramos.reduce(function(acc,t){return acc+(t.horas||0);},0).toFixed(2);
  if(!tramos.length){
    if(rol==='principal'){s.estadoP=null;}
    else{s.estadoA=null;}
  }
  await saveState();
  showModalSesionesInstructor(instrId, s.mes);
}

async function guardarClaseManual(instrId){
  var cursoId=document.getElementById('acm-curso').value;
  var rol=document.getElementById('acm-rol').value;
  var fecha=document.getElementById('acm-fecha').value;
  var horaIni=document.getElementById('acm-inicio').value;
  var horaFin=document.getElementById('acm-fin').value;
  if(!cursoId){ alert('Selecciona un curso.'); return; }
  if(!fecha){ alert('Selecciona una fecha.'); return; }
  if(!horaIni||!horaFin){ alert('Captura la hora de inicio y de fin.'); return; }

  var partsI=horaIni.split(':').map(Number), partsF=horaFin.split(':').map(Number);
  var dIni=new Date(fecha+'T00:00:00'); dIni.setHours(partsI[0],partsI[1],0,0);
  var dFin=new Date(fecha+'T00:00:00'); dFin.setHours(partsF[0],partsF[1],0,0);
  if(dFin<=dIni) dFin.setDate(dFin.getDate()+1);
  var horas=+((dFin-dIni)/3600000).toFixed(2);
  if(horas<=0||horas>16){ alert('El horario capturado no es válido.'); return; }

  var mes=fecha.slice(0,7);
  var campoId=rol==='principal'?'instructorId':'asistenteId';
  var campoTramos=rol==='principal'?'tramosP':'tramosA';
  var campoHoras=rol==='principal'?'horasInstructor':'horasAsistente';
  var campoEstado=rol==='principal'?'estadoP':'estadoA';

  // ¿Ya existe una sesión de ESE día, curso e instructor en ese rol? Si sí, se le agrega el tramo;
  // si no, se crea una sesión nueva. Así varias clases manuales del mismo día se acumulan igual
  // que las clases en vivo con pausas/reanudaciones.
  var s=(STATE.sesionesClase||[]).find(function(x){
    return x.fecha===fecha && x.cursoId===cursoId && x[campoId]===instrId;
  });
  if(!s){
    s={id:uid(), cursoId, fecha, mes, instructorId:null, asistenteId:null, tramosP:[], tramosA:[], horasInstructor:0, horasAsistente:0, manual:true};
    s[campoId]=instrId;
    STATE.sesionesClase.push(s);
  }
  s[campoTramos]=s[campoTramos]||[];
  s[campoTramos].push({inicio:dIni.toISOString(), fin:dFin.toISOString(), horas, manual:true});
  s[campoHoras]=+s[campoTramos].reduce(function(acc,t){return acc+(t.horas||0);},0).toFixed(2);
  s[campoEstado]='finalizada';

  await saveState();
  showModalSesionesInstructor(instrId, mes);
}

async function eliminarInstructor(id){
  var p = STATE.instructores.find(function(x){return x.id===id;});
  if(!p) return;
  var cursosVinculados = (STATE.cursos||[]).filter(function(c){
    return c.instructorId===id || c.asistenteId===id ||
      (c.grupos||[]).some(function(g){return g.instructorId===id||g.asistenteId===id;});
  });
  var msg='¿Eliminar al maestro "'+p.nombre+'"?\n\nEsta acción NO se puede deshacer.';
  if(cursosVinculados.length>0){
    msg+='\n\n⚠ Está asignado a '+cursosVinculados.length+' curso'+(cursosVinculados.length!==1?'s':'')+': '
      + cursosVinculados.map(function(c){return c.nombre;}).join(', ')
      + '.\nEsos cursos quedarán sin instructor asignado.';
  }
  if(p.userId){
    msg+='\n\n⚠ Tiene un usuario vinculado para acceso al CRM. El usuario NO se eliminará, pero perderá la vinculación con este maestro.';
  }
  if(!confirm(msg)) return;
  // Desvincular de cursos/grupos
  (STATE.cursos||[]).forEach(function(c){
    if(c.instructorId===id){c.instructorId=null;c.instructor='';}
    if(c.asistenteId===id){c.asistenteId=null;c.asistente='';}
    (c.grupos||[]).forEach(function(g){
      if(g.instructorId===id){g.instructorId=null;g.instructor='';}
      if(g.asistenteId===id){g.asistenteId=null;g.asistente='';}
    });
  });
  STATE.instructores = STATE.instructores.filter(function(x){return x.id!==id;});
  await saveState();
  renderMaestros();
}

async function confirmarPagoInstructores(){
  var cm = monthStr();
  var inst = STATE.instructores || [];
  var detalle = [];
  var total = 0;

  inst.forEach(function(p){
    var sesiones = (STATE.sesionesClase||[]).filter(function(s){
      return (s.instructorId===p.id||s.asistenteId===p.id) && s.mes===cm && s.estado==='finalizada';
    });
    var horas = sesiones.reduce(function(acc,s){
      return acc + (s.instructorId===p.id ? s.horasInstructor||0 : s.horasAsistente||0);
    }, 0);
    if(horas>0){
      var monto = +(horas * p.tarifaHora).toFixed(2);
      detalle.push(p.nombre+': '+horas.toFixed(1)+' hrs × $'+p.tarifaHora+' = $'+monto);
      total += monto;
    }
  });

  if(total<=0){ alert('No hay horas impartidas registradas este mes.'); return; }

  var msg = 'RESUMEN DE PAGO — '+mesLabel(cm)+':\n\n'+detalle.join('\n')+'\n\nTOTAL: $'+total.toFixed(2)+'\n\n¿Confirmar y registrar este gasto?';
  if(!confirm(msg)) return;

  // Register as expense in pagosGastos (accessible from accounting app)
  if(!STATE.pagosGastosMaestros) STATE.pagosGastosMaestros = [];
  STATE.pagosGastosMaestros.push({
    id: uid(),
    mes: cm,
    total: +total.toFixed(2),
    detalle: detalle,
    confirmadoPor: currentUser.username,
    confirmadoEn: new Date().toISOString(),
    fecha: todayISO()
  });

  await saveState();
  alert('✅ Pago registrado correctamente por $'+total.toFixed(2)+' MXN.');
  renderMaestros();
}

  // Build module cards
  var cards = misModulos.map(function(x){
    var m = x.modulo;

      var finMs = new Date(hoy+'T'+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':00').getTime();
      minutosParaFin = Math.floor((finMs - ahora.getTime())/60000);

          : '<span style="background:var(--accent-light);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:11px">✓ Finalizada</span>';

           + '<i class="ti ti-player-play"></i> Iniciar clase</button>';
    } else if(sesion.estado==='iniciada'){
      var finLabel = puedeFinalizarBloqueado
        ? 'Disponible al finalizar horario'
        : '<i class="ti ti-circle-check"></i> Clase finalizada ✓';
      btns = '<button class="btn-warn btn-sm" onclick="pausarSesion(\''+sesion.id+'\')">'
           + '<i class="ti ti-player-pause"></i> Pausa académica</button> '
           + '<button class="btn-green btn-sm" '+(puedeFinalizarBloqueado?'disabled title="'+finLabel+'" style="opacity:.5"':'onclick="finalizarSesion(\''+sesion.id+'\')"')+'>'
           + (puedeFinalizarBloqueado?'<i class="ti ti-lock"></i> '+finLabel:finLabel)+'</button>';
    } else if(sesion.estado==='pausada'){
      btns = '<button class="btn-primary btn-sm" onclick="reanudarSesion(\''+sesion.id+'\',\''+yoId+'\')">'
           + '<i class="ti ti-player-play"></i> ▶ Reanudar clase</button> '

async function confirmarInicioSesion(moduloId, cursoId, grupoId, instructorId, sesionExistenteId){
  var rolEl = document.querySelector('input[name="rol-sesion"]:checked');
  var rol = rolEl ? rolEl.value : 'principal';
  var hoy = todayISO();
  var ahora = new Date().toISOString();

  if(!STATE.sesionesClase) STATE.sesionesClase = [];

  var sesion;
  if(sesionExistenteId){
    sesion = STATE.sesionesClase.find(function(s){return s.id===sesionExistenteId;});
  }

  if(!sesion){
    // Create new session
    var curso = STATE.cursos.find(function(c){return c.id===cursoId;});
    var grupo = curso ? (curso.grupos||[]).find(function(g){return g.id===grupoId;}) : null;
    var modulo = grupo ? (grupo.modulos||[]).find(function(m){return m.id===moduloId;}) : null;
    var horas = calcHorasGrupo(grupo?grupo.horarioDesde:'', grupo?grupo.horarioHasta:'');

    sesion = {
      id: uid(),
      moduloId, cursoId, grupoId, fecha: hoy,
      mes: monthStr(),
      horarioDesde: grupo?grupo.horarioDesde:'',
      horarioHasta: grupo?grupo.horarioHasta:'',
      horasProgramadas: horas,
      estado: 'iniciada',
      inicioReal: ahora,
      finReal: null,
      participantes: [],
      asistencia: [],
      pausas: []
    };
    STATE.sesionesClase.push(sesion);
  } else if(sesion.estado === 'pausada'){
    sesion.estado = 'iniciada';
    sesion.pausas.push({fin: ahora});
  }

  // Add participant
  var inst = (STATE.instructores||[]).find(function(p){return p.id===instructorId;});
  var tarifa = rol==='asistente' ? (STATE.tarifaAsistente||TARIFA_ASISTENTE_DEFAULT) : (inst?inst.tarifaHora:0);
  sesion.participantes.push({
    instructorId, nombre:inst?inst.nombre:instructorId,
    rol, tarifa, entrada:ahora, activo:true
  });

  await saveState();
  closeModal();
  renderPanelInstructor();
}

async function pausarSesion(sesionId){
  var s = (STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s) return;
  var ahora = new Date().toISOString();
  s.estado = 'pausada';
  s.pausas = s.pausas||[];
  s.pausas.push({inicio: ahora});
  // Mark all active participants as inactive
  (s.participantes||[]).forEach(function(p){if(p.activo){p.activo=false;p.salida=ahora;}});
  // Calculate hours for each participant so far
  calcularHorasSesion(s);
  await saveState();
  renderPanelInstructor();
}

async function reanudarSesion(sesionId, instructorId){
  // Same as iniciarSesion but for paused session — reopens role selection
  var s = (STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s) return;
  var modulo = encontrarModulo(s.moduloId);
  var yaPrincipal = (s.participantes||[]).some(function(p){return p.rol==='principal'&&p.activo;});
  iniciarSesion(s.moduloId, s.cursoId, s.grupoId, instructorId);
}

async function finalizarSesion(sesionId){
  var s = (STATE.sesionesClase||[]).find(function(x){return x.id===sesionId;});
  if(!s) return;
  var ahora = new Date().toISOString();
  s.estado = 'finalizada';
  s.finReal = ahora;
  (s.participantes||[]).forEach(function(p){if(p.activo){p.activo=false;p.salida=ahora;}});
  calcularHorasSesion(s);
  await saveState();
  renderPanelInstructor();
  alert('✅ Clase finalizada. Se registraron '+s.horasInstructor+'hrs para el instructor principal.');
}

function calcularHorasSesion(s){
  // For each participant, calculate actual hours worked
  (s.participantes||[]).forEach(function(p){
    var entrada = new Date(p.entrada).getTime();
    var salida = p.salida ? new Date(p.salida).getTime() : new Date().getTime();
    var horas = +((salida - entrada) / 3600000).toFixed(2);
    p.horasTrabajadas = horas;
    p.pagoSesion = +(horas * p.tarifa).toFixed(2);
    // Store on sesion level for easy access
    if(p.rol === 'principal'){
      s.horasInstructor = (s.horasInstructor||0) + horas;
      s.instructorId = p.instructorId;
    } else {
      s.horasAsistente = (s.horasAsistente||0) + horas;
      s.asistenteId = p.instructorId;
    }
  });
}

function encontrarModulo(moduloId){
  var result = null;
  (STATE.cursos||[]).forEach(function(c){
    (c.grupos||[]).forEach(function(g){
      (g.modulos||[]).forEach(function(m){
        if(m.id===moduloId) result = m;
      });
    });
  });
  return result;
}

async function guardarModulo(cursoNombre, grupoId, moduloId){
  var nombre = document.getElementById('mf-nombre')?.value?.trim();
  if(!nombre){ alert('El nombre del módulo es obligatorio.'); return; }

  var c = STATE.cursos.find(function(x){return x.nombre===cursoNombre;});
  var g = (c.grupos||[]).find(function(x){return x.id===grupoId;});
  if(!g.modulos) g.modulos = [];

  var instId = document.getElementById('mf-inst')?.value||null;
  var asistId = document.getElementById('mf-asist')?.value||null;
  var instObj = instId ? (STATE.instructores||[]).find(function(p){return p.id===instId;}) : null;
  var asistObj = asistId ? (STATE.instructores||[]).find(function(p){return p.id===asistId;}) : null;

  // Conflict check: instructor can't have two modules on the same date in different groups
  var fechaInicio = document.getElementById('mf-inicio')?.value||null;
  var fechaFin = document.getElementById('mf-fin')?.value||null;
  if(instId && fechaInicio){
    var conflicto = detectarConflictoInstructor(instId, grupoId, fechaInicio, fechaFin, moduloId);
    if(conflicto){
      if(!confirm('⚠️ CONFLICTO: '+conflicto+'\n\n¿Deseas guardar de todas formas?')) return;
    }
  }

  if(moduloId){
    var idx = g.modulos.findIndex(function(m){return m.id===moduloId;});
    if(idx>=0){
      g.modulos[idx] = Object.assign(g.modulos[idx], {
        nombre, fechaInicio, fechaFin, instructorId:instId,
        instructor:instObj?instObj.nombre:'', asistenteId:asistId,
        asistente:asistObj?asistObj.nombre:''
      });
    }
  } else {
    g.modulos.push({
      id:uid(), nombre, fechaInicio, fechaFin,
      instructorId:instId, instructor:instObj?instObj.nombre:'',
      asistenteId:asistId, asistente:asistObj?asistObj.nombre:'',
      createdAt:new Date().toISOString()
    });
  }

  await saveState();
  showModalModulos(cursoNombre, grupoId);
}

async function eliminarModulo(cursoNombre, grupoId, moduloId){
  if(!confirm('¿Eliminar este módulo?')) return;
  var c = STATE.cursos.find(function(x){return x.nombre===cursoNombre;});
  var g = (c.grupos||[]).find(function(x){return x.id===grupoId;});
  if(!g) return;
  g.modulos = (g.modulos||[]).filter(function(m){return m.id!==moduloId;});
  await saveState();
  showModalModulos(cursoNombre, grupoId);
}

function detectarConflictoInstructor(instId, grupoIdActual, fechaInicio, fechaFin, excludeModuloId){
  var conflicto = null;
  var fechaFin2 = fechaFin||fechaInicio;
  (STATE.cursos||[]).forEach(function(c){
    (c.grupos||[]).forEach(function(g){
      if(g.id === grupoIdActual) return;
      (g.modulos||[]).forEach(function(m){
        if(m.id === excludeModuloId) return;
        if(m.instructorId !== instId && m.asistenteId !== instId) return;
        var mFin = m.fechaFin||m.fechaInicio;
        if(!m.fechaInicio || !fechaInicio) return;
        // Date overlap check
        if(fechaInicio <= mFin && m.fechaInicio <= fechaFin2){
          // Same dates AND same group schedule day? Check schedule conflict
          var gConf = (STATE.cursos||[]).reduce(function(acc,cx){
            return acc||(cx.grupos||[]).find(function(gg){return gg.id===g.id;});
          }, null)||g;
          conflicto = 'El instructor ya tiene el módulo "'+m.nombre+'" en el grupo "'+g.nombre+'" '
            + '('+c.nombre+') del '+m.fechaInicio+' al '+(m.fechaFin||m.fechaInicio);
        }
      });
    });
  });
  return conflicto;
}


function checkCursoConflict(){
  var salon  = document.getElementById('mc-salon')?.value;
  var desde  = document.getElementById('mc-desde')?.value;
  var hasta  = document.getElementById('mc-hasta')?.value;
  var inicio = document.getElementById('mc-inicio')?.value;
  var fin    = document.getElementById('mc-fin')?.value;
  var dia    = document.getElementById('mc-dia')?.value;
  var nombre = document.getElementById('mc-nombre')?.value?.trim();
  var alert  = document.getElementById('mc-conflict-alert');
  if(!alert) return;
  if(!salon || !desde || !hasta){ alert.style.display='none'; return; }
  var c = nombre ? STATE.cursos.find(function(x){return x.nombre===nombre;}) : null;
  var conflict = checkScheduleConflict(salon, desde, hasta, inicio, fin, c?c.id:null, null, dia);
  if(conflict){
    alert.style.display='block';
    alert.textContent = t('cur_grupo_conflicto') + ' Conflicto con: ' + conflict;
  } else {
    alert.style.display='none';
  }
}

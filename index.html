function buildPromoCursosPanel(prefix, selectedValue){
  prefix = prefix || 'np';
  selectedValue = selectedValue || 'todos';
  if(!STATE.cursos||STATE.cursos.length===0){
    return '<p style="color:var(--text3);font-size:13px;padding:8px 0">No hay cursos registrados aún.</p>';
  }
  var lista = selectedValue!=='todos' ? selectedValue.split(',').map(function(s){return s.trim();}) : null;
  function isSel(val){
    if(!lista) return true;
    return lista.some(function(s){return s===val||s.split('|')[0]===val;});
  }
  var LS='display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;'
    +'padding:10px 13px;border:2px solid var(--border);border-radius:8px;'
    +'cursor:pointer;font-size:13px;width:100%;box-sizing:border-box;background:var(--surface)';
  function key(nombre){ return (nombre||'').replace(/[^a-z0-9]/gi,'_'); }
  var h='<div id="'+prefix+'-cursos-panel" style="display:flex;flex-direction:column;gap:6px;'
    +'max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:10px">';
  h+='<label style="'+LS+'">'
    +'<div style="font-weight:700">🌐 Todos los cursos</div>'
    +'<input type="checkbox" id="'+prefix+'-todos" onchange="onPromoTodosChange(\''+prefix+'\')" style="width:16px;height:16px;flex-shrink:0"'
    +(!lista?' checked':'')+'>'
    +'</label>';
  STATE.cursos.forEach(function(c,ci){
    var grupos=c.grupos||[];
    var ck=key(c.nombre)+'_'+ci;
    var cSel=isSel(c.nombre);
    h+='<div>';
    h+='<label style="'+LS+'">'
      +'<div><div style="font-weight:600">'+c.nombre+'</div>'
      +(grupos.length>0?'<div style="font-size:11px;color:var(--text3)">'+grupos.length+' grupo'+(grupos.length!==1?'s':'')+'</div>':'')
      +'</div>'
      +'<input type="checkbox" class="'+prefix+'-curso-chk" data-ck="'+ck+'" onchange="onPromoCursoChange(this,\''+prefix+'\')" style="width:16px;height:16px;flex-shrink:0"'
      +(cSel?' checked':'')+'>'
      +'</label>';
    if(grupos.length>0){
      h+='<div style="padding-left:14px;display:flex;flex-direction:column;gap:4px;margin-top:4px">';
      grupos.forEach(function(g,gi){
        var gk=ck+'_g'+gi;
        var gVal=c.nombre+'|'+(g.id||gi);
        var gSel=cSel||isSel(gVal);
        var tag=[g.dia,(g.horarioDesde&&g.horarioHasta)?g.horarioDesde+'–'+g.horarioHasta:''].filter(Boolean).join(' · ');
        h+='<label style="'+LS+';font-size:12px">'
          +'<div><span style="font-weight:600">'+(g.nombre||'Grupo '+(gi+1))+'</span>'
          +(tag?' <span style="color:var(--text3)">'+tag+'</span>':'')
          +'</div>'
          +'<input type="checkbox" class="'+prefix+'-grupo-chk" data-ck="'+ck+'" data-gk="'+gk+'" onchange="onPromoGrupoChange(this,\''+prefix+'\')" style="width:15px;height:15px;flex-shrink:0"'
          +(gSel?' checked':'')+'>'
          +'</label>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  return h+'</div>';
}
function onPromoTodosChange(prefix){
  var v=document.getElementById(prefix+'-todos').checked;
  document.querySelectorAll('.'+prefix+'-curso-chk,.'+prefix+'-grupo-chk').forEach(function(el){el.checked=v;});
}
function onPromoCursoChange(el,prefix){
  var ck=el.dataset.ck;
  document.querySelectorAll('.'+prefix+'-grupo-chk[data-ck="'+ck+'"]').forEach(function(g){g.checked=el.checked;});
  var all=document.querySelectorAll('.'+prefix+'-curso-chk');
  document.getElementById(prefix+'-todos').checked=all.length>0&&Array.from(all).every(function(c){return c.checked;});
}
function onPromoGrupoChange(el,prefix){
  var ck=el.dataset.ck;
  var allG=document.querySelectorAll('.'+prefix+'-grupo-chk[data-ck="'+ck+'"]');
  var chkG=document.querySelectorAll('.'+prefix+'-grupo-chk[data-ck="'+ck+'"]:checked');
  var cc=document.querySelector('.'+prefix+'-curso-chk[data-ck="'+ck+'"]');
  if(cc) cc.checked=allG.length>0&&chkG.length===allG.length;
  var allC=document.querySelectorAll('.'+prefix+'-curso-chk');
  document.getElementById(prefix+'-todos').checked=allC.length>0&&Array.from(allC).every(function(c){return c.checked;});
}
function getPromoCursosValue(prefix){
  if(document.getElementById(prefix+'-todos')?.checked) return 'todos';
  var vals=[];
  STATE.cursos.forEach(function(c,ci){
    var ck=(c.nombre||'').replace(/[^a-z0-9]/gi,'_')+'_'+ci;
    var cc=document.querySelector('.'+prefix+'-curso-chk[data-ck="'+ck+'"]');
    var grupos=c.grupos||[];
    if(cc&&cc.checked){ vals.push(c.nombre); return; }
    grupos.forEach(function(g,gi){
      var gk=ck+'_g'+gi;
      var gc=document.querySelector('.'+prefix+'-grupo-chk[data-gk="'+gk+'"]');
      if(gc&&gc.checked) vals.push(c.nombre+'|'+(g.id||gi));
    });
  });
  return vals.length?vals.join(','):'todos';
}
async function guardarPromo(){
  const nombre=(document.getElementById('np-nombre')||{value:''}).value.trim();
  const tipo=(document.getElementById('np-tipo')||{value:'porcentaje'}).value;
  const valor=parseFloat((document.getElementById('np-valor')||{value:'0'}).value)||0;
  const min=parseInt((document.getElementById('np-min')||{value:'2'}).value)||2;
  const cursos=getPromoCursosValue('np');
  const inicio=(document.getElementById('np-inicio')||{value:''}).value||todayISO();
  const fin=(document.getElementById('np-fin')||{value:''}).value;
  const desc=(document.getElementById('np-desc')||{value:''}).value;
  if(!nombre||valor<=0){alert(t('promo_nombre_req'));return;}
  STATE.promociones.push({id:uid(),nombre,descripcion:desc,tipo,valor,mesesMinimos:min,cursosAplicables:cursos,fechaInicio:inicio.slice(0,7),fechaFin:fin?fin.slice(0,7):'2099-12',activa:false,estado:'pendiente',autorizadaPor:null,autorizadaEn:null,createdBy:currentUser.username,createdAt:new Date().toISOString()});
  await saveState();renderPagoTab();
}
async function autorizarPromo(id){
  if(!puedeAutorizarPromos()){alert('Sin permisos para gestionar esta promoción.');return;}
  const p=STATE.promociones.find(x=>x.id===id);
  if(!p)return;
  if(p.estado==='pendiente'){
    p.estado='autorizada';p.activa=true;
    p.autorizadaPor=currentUser.username;p.autorizadaEn=new Date().toISOString();
  } else if(p.estado==='autorizada'){
    if(!confirm('¿Desactivar "'+p.nombre+'"?\nPodrás editarla y reactivarla después. Los pagos ya registrados no se ven afectados.'))return;
    p.estado='inactiva';p.activa=false;
  } else if(p.estado==='inactiva'){
    if(!confirm('¿Reactivar "'+p.nombre+'"?\nLa promoción volverá a estar disponible para aplicarse en pagos.'))return;
    p.estado='autorizada';p.activa=true;
    p.autorizadaPor=currentUser.username;p.autorizadaEn=new Date().toISOString();
  }
  await saveState();
  buildSidebar();
  if(currentTab==='dios')renderModoDios();else renderPagoTab();
  refreshCurrentView(); // real-time: refresca cualquier vista activa (Nueva Matrícula, etc.)
}

async function eliminarPromo(id){
  if(!puedeAutorizarPromos()&&STATE.promociones.find(x=>x.id===id)?.estado==='autorizada'){alert('No tienes permisos para eliminar esta promoción.');return;}
  if(!confirm(t('promo_confirmar_elim')))return;
  STATE.promociones=STATE.promociones.filter(x=>x.id!==id);
  await saveState();
  buildSidebar();
  if(currentTab==='dios')renderModoDios();else renderPagoTab();
  refreshCurrentView(); // real-time: refresca cualquier vista activa (Nueva Matrícula, etc.)
}

function _renderAlumnosCards(){
  var el=document.getElementById('alm-cards');
  if(!el) return;
  var q=(_alumnosQ||'').toLowerCase();
  var cm=monthStr();
  var seen={};
  var todos=(STATE.matrículas||[]).slice().sort(function(a,b){return (a.alumno||'').localeCompare(b.alumno||'');});
  var alumnos=[];
  todos.forEach(function(m){if(!seen[m.alumno]){seen[m.alumno]=true;alumnos.push(m);}});
  // String() normalization to handle both string and number crmFolio values
  var pagados=new Set((STATE.pagosRegulares||[]).filter(function(p){
    return (p.meses&&p.meses.includes(cm))||(p.fechaISO&&p.fechaISO.startsWith(cm));
  }).map(function(p){return String(p.crmFolio);}));
  var folioTieneAlgunPago=new Set((STATE.pagosRegulares||[]).map(function(p){return String(p.crmFolio);}));
  var folioNuevosAlm=new Set((STATE.matrículas||[]).filter(function(m){return m.fechaISO&&m.fechaISO.startsWith(cm);}).map(function(m){return String(m.folio);}));
  function matriculaCubierta(x){
    if(x.pagoTipo==='unico'){
      return folioTieneAlgunPago.has(String(x.folio))||(!x.autorizacionPendiente&&(x.primerPago||0)>0);
    }
    return pagados.has(String(x.folio));
  }
  function esNuevoEsteMes(nombre){
    return (STATE.matrículas||[]).some(function(x){return x.alumno===nombre&&folioNuevosAlm.has(String(x.folio));});
  }
  if(q) alumnos=alumnos.filter(function(m){
    return m.alumno.toLowerCase().includes(q)
      ||(m.titular||'').toLowerCase().includes(q)
      ||(m.email||'').toLowerCase().includes(q)
      ||m.curso.toLowerCase().includes(q);
  });
  if(alumnos.length===0){
    el.innerHTML='<div class="empty"><div class="empty-icon">🎓</div><h3>'+t('alm_sin_alumnos')+'</h3></div>';
    return;
  }
  var nTotal=alumnos.length;
  var nNuevosAlm=alumnos.filter(function(m){return esNuevoEsteMes(m.alumno);}).length;
  var nAnteriores=nTotal-nNuevosAlm;
  var resumenBar=nNuevosAlm>0
    ?('<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:10px;display:flex;gap:20px;font-size:12px;flex-wrap:wrap;align-items:center">'
      +'<span style="color:var(--text2)"><strong style="color:var(--text)">'+nTotal+'</strong> alumno'+(nTotal===1?'':'s')+(q?' encontrado'+(nTotal===1?'':'s'):'')+'</span>'
      +'<span style="color:var(--text3)">|</span>'
      +'<span style="color:var(--text2)">Anteriores: <strong style="color:var(--text)">'+nAnteriores+'</strong></span>'
      +'<span style="color:var(--text3)">|</span>'
      +'<span style="color:var(--accent);font-weight:700">🆕 Nuevos este mes: <strong>'+nNuevosAlm+'</strong></span>'
      +'</div>')
    :('<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:10px;font-size:12px;color:var(--text2)">'
      +'<strong style="color:var(--text)">'+nTotal+'</strong> alumno'+(nTotal===1?'':'s')+(q?' encontrado'+(nTotal===1?'':'s'):'')
      +'</div>');
  el.innerHTML=resumenBar+'<div style="display:flex;flex-direction:column;gap:10px">'+alumnos.map(function(m){
    var misMatriculas=(STATE.matrículas||[]).filter(function(x){return x.alumno===m.alumno;});
    var cursosCount=misMatriculas.length;
    var pago=misMatriculas.every(matriculaCubierta);
    var esNuevo=esNuevoEsteMes(m.alumno);
    var ini=m.alumno.charAt(0).toUpperCase();
    var cardBorder=esNuevo?'border:1.5px solid var(--accent)':'border:1px solid var(--border)';
    return '<div style="background:var(--surface);'+cardBorder+';border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px">'
      +'<div style="width:46px;height:46px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;flex-shrink:0">'+ini+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:700;font-size:14px;margin-bottom:2px">'+esc(m.alumno)
        +(esNuevo?' <span style="font-size:9px;background:var(--accent);color:#fff;border-radius:4px;padding:1px 6px;vertical-align:middle;font-weight:700">🆕 NUEVO</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:var(--text3)">'+esc(m.curso)+(cursosCount>1?' + '+(cursosCount-1)+' más':'')+'</div>'
      +(m.email?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+esc(m.email)+'</div>':'')
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">'
      +(pago?'<span class="badge badge-green" style="font-size:10px">✓ Pagó</span>'
            :'<span class="badge badge-red" style="font-size:10px">Pendiente</span>')
      +'<button class="btn-primary btn-sm" onclick="showFichaAlumno('+m.folio+')" style="font-size:11px;padding:5px 10px">'
      +'<i class="ti ti-id-badge-2"></i> Ver ficha</button>'

  }).join('')+'</div>';
}

function _filtrarCursos(){
  var q=(_curQ||'').toLowerCase();
  var tabla=document.querySelector('#main-content .table-wrap table tbody');
  if(!tabla) return;
  tabla.querySelectorAll('tr').forEach(function(tr){
    // Las filas de detalle (cascadas) tienen id que empieza con 'cg-'.
    // NUNCA tocarlas aquí — solo toggleGrupos() las controla. Si las tocáramos
    // con q='' las pondríamos en display:'' (visible), abriendo todas las cascadas.
    if(tr.id&&tr.id.indexOf('cg-')===0) return;
    var texto=tr.textContent.toLowerCase();
    var visible=!q||texto.includes(q);
    tr.style.display=visible?'':'none';
    // Si la fila padre se oculta, también ocultar (no mostrar) su cascada asociada
    var next=tr.nextElementSibling;
    if(next&&next.id&&next.id.indexOf('cg-')===0&&!visible){
      next.style.display='none';
    }
  });
  // Actualizar contador — solo cuenta filas PRINCIPALES visibles (excluye cascadas 'cg-')
  var ph=document.querySelector('#main-content .page-header p');
  if(ph){
    var visible=[...tabla.querySelectorAll('tr')].filter(function(tr){
      return !(tr.id&&tr.id.indexOf('cg-')===0) && tr.style.display!=='none';
    }).length;
    ph.textContent=visible+' curso'+(visible!==1?'s':'')+' encontrado'+(visible!==1?'s':'')+(q?' para "'+q+'"':'');
  }
}

          tags+='<span style="background:var(--surface2);padding:2px 7px;border-radius:4px">👨‍🏫 '+g.instructor+'</span> ';
        }
        if(g.asistenteId){
          var asistObj=STATE.instructores.find(function(p){return p.id===g.asistenteId;});
          if(asistObj) tags+='<span style="background:rgba(107,45,146,.08);color:var(--accent);padding:2px 7px;border-radius:4px">🤝 '+asistObj.nombre+'</span> ';

            +'<div style="display:flex;flex-wrap:wrap;gap:5px">'
            +mostrar.map(function(m){
              return '<span style="background:var(--accent-light);color:var(--accent);border-radius:12px;padding:2px 9px;font-size:11px">'+m.alumno+'</span>';
            }).join('')
            +(grupoMats.length>6?'<span style="color:var(--text3);font-size:11px;align-self:center">+ '+(grupoMats.length-6)+' más</span>':'')
            +'</div></div>';

          +'<div style="font-weight:700;font-size:13px;color:#92600a">⚠️ Sin grupo asignado</div>'
          +'<span style="background:rgba(245,193,71,.2);color:#92600a;border-radius:10px;padding:2px 9px;font-size:11px;font-weight:600">👤 '+sinGrupo.length+' alumno'+(sinGrupo.length!==1?'s':'')+'</span>'
          +'</div>'
          +'<div style="display:flex;flex-wrap:wrap;gap:5px">'
          +sinGrupo.slice(0,6).map(function(m){

          +'</div></div>';

      rows+='<tr id="'+cid+'" style="display:none">'

        +'<div style="padding:14px 16px 18px 24px;border-top:1px solid var(--border2)">'
        +'<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Grupos de '+c.nombre+' ('+gc+')</div>'
        +cards
        +sinGrupoCard
        +'</div></td></tr>';
    } else {
      // Course with no groups — show all enrolled students directly
      var todosMats = STATE.matrículas.filter(function(m){ return m.curso===c.nombre; });
      var estudiantesHtml = '';
      if(todosMats.length > 0){
        var mostrar = todosMats.slice(0,10);
        estudiantesHtml = '<div style="display:flex;flex-wrap:wrap;gap:6px">'
          +mostrar.map(function(m){
            return '<span style="background:var(--accent-light);color:var(--accent);border-radius:12px;padding:3px 10px;font-size:12px">'+m.alumno+'</span>';
          }).join('')
          +(todosMats.length>10?'<span style="color:var(--text3);font-size:12px;align-self:center">+ '+(todosMats.length-10)+' más</span>':'')
          +'</div>';
      } else {
        estudiantesHtml = '<div style="color:var(--text3);font-size:13px">Sin alumnos inscritos</div>';
      }

      var detallesCurso = '';
      if(c.salon) detallesCurso += '<span style="background:'+(c.salon==='Netflix'?'rgba(0,113,235,.1)':c.salon==='Youtube'?'rgba(255,0,0,.1)':'rgba(109,40,217,.1)')+';padding:2px 8px;border-radius:4px;font-size:12px">'+(c.salon==='Netflix'?'🔵':c.salon==='Youtube'?'🔴':c.salon==='Online'?'💻':'▶️')+' '+c.salon+'</span> ';
      if(c.horarioDesde&&c.horarioHasta) detallesCurso += '<span style="background:var(--surface);padding:2px 8px;border-radius:4px;font-size:12px">⏰ '+c.horarioDesde+'–'+c.horarioHasta+'</span> ';
      if(c.nivel) detallesCurso += '<span style="background:var(--surface);padding:2px 8px;border-radius:4px;font-size:12px">📊 '+c.nivel+'</span> ';
      if(c.instructor) detallesCurso += '<span style="background:var(--surface);padding:2px 8px;border-radius:4px;font-size:12px">👤 '+c.instructor+'</span> ';
      if(c.fechaInicio) detallesCurso += '<span style="background:var(--surface);padding:2px 8px;border-radius:4px;font-size:12px">🗓 '+c.fechaInicio+(c.fechaFin?' → '+c.fechaFin:'')+'</span> ';

      rows+='<tr id="'+cid+'" style="display:none">'
        +'<td colspan="'+colCount+'" style="padding:0;background:var(--surface2)">'
        +'<div style="padding:14px 16px 18px 24px;border-top:1px solid var(--border2)">'
        +(detallesCurso?'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+detallesCurso+'</div>':'')
        +'<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Alumnos inscritos ('+todosMats.length+')</div>'
        +estudiantesHtml

  document.getElementById('main-content').innerHTML=
    '<div class="page-header fade-in"><h2>Cursos</h2><p>'+cursos.length+' '+t('cur_registrados')+'</p></div>'
    +'<div class="toolbar">'
    +'<input id="cur-q" type="text" placeholder="🔍 Buscar por nombre, salón, tipo…" style="flex:1;max-width:360px" value="" oninput="_curQ=this.value;_filtrarCursos()">'
    +(canEdit?'<button class="btn-primary" onclick="showModalNuevoCurso()"><i class="ti ti-plus"></i> '+t('cur_nuevo')+'</button>':'')
    +(canRecover?'<button class="btn-warn btn-sm" onclick="recuperarCursos()" title="Solo Modo Dios"><i class="ti ti-restore"></i> Recuperar cursos borrados</button>':'')
    +'</div>'
    +(cursos.length===0
      ?'<div class="empty"><div class="empty-icon">📚</div><h3>'+t('cur_sin_cursos')+'</h3><p>'+t('cur_sin_cursos_sub')+'</p></div>'
      :'<div class="table-wrap fade-in"><table>'
        +'<thead><tr>'

        +'<th>Tipo</th>'
        +'<th>Salón</th>'
        +'<th>Costo base</th>'
        +'<th>Inicio</th>'
        +'<th>Fin</th>'
        +'<th>Inscritos</th>'
        +(canEdit?'<th></th>':'')
        +'</tr></thead>'
        +'<tbody>'+rows+'</tbody>'

  _filtrarCursos();
}
function showModalNuevoCurso() {
  _modalGrupos = [];
  renderCursoModal(null);
}

function showModalEditarCurso(nombre) {
  const c = STATE.cursos.find(x=>x.nombre===nombre);
  if(!c) return;
  _modalGrupos = JSON.parse(JSON.stringify(c.grupos||[]));
  renderCursoModal(c);
}

var _editingCursoNombre = ''; // Set when modal opens, used by save button

    +'<input type="number" id="mc-cupo" min="0" step="1" placeholder="Sin límite" value="'+(c?c.cupo||'':'')+'"></div>'

    +'<div class="form-group"><label class="flbl">'+t('cur_fecha_fin')+'</label>'

    +'<div class="form-group"><label class="flbl">Día(s)</label>'

    // ── Hasta
    +'<div class="form-group"><label class="flbl">Hasta</label>'

    +'<div><div style="font-weight:700;font-size:14px">'+t('cur_grupos')+'</div>'

    +'<button class="btn-primary btn-sm" onclick="addModalGrupo()"><i class="ti ti-plus"></i> '+t('cur_nuevo_grupo')+'</button>'

    +'</div></div>'
    +'<div id="curso-como-grupo-panel" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px">'

    +cursosParaGrupo.map(function(cc){return '<option value="'+cc.nombre+'">'+cc.nombre+'</option>';}).join('')

      ?'<div style="background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:14px;text-align:center;color:var(--text3);font-size:13px">Sin grupos adicionales — este curso se tomará como un grupo único.</div>'
      :grupoRows)
    +'</div>'
    +'<div id="conflict-alert" style="display:none;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:13px;color:#92600a"></div>'
    +'</div>' // end grupos

    +'<div class="form-actions">'
    +'<button class="btn-ghost" onclick="closeModal()">'+t('cancelar')+'</button>'
    +'<button class="btn-primary" onclick="guardarCursoModal(_editingCursoNombre)"><i class="ti ti-device-floppy"></i> '+t('guardar')+'</button>'
    +'</div>'
    +'</div></div></div>';

  document.getElementById('modal-container').innerHTML = h;
}

  var costoBase = parseFloat(document.getElementById('mc-costo')?.value)||0;
  var costoGrupo = (g.costoBase!==null && g.costoBase!==undefined && g.costoBase!=='') ? g.costoBase : (costoBase||'');

  function sopts(arr, curVal){
    return arr.map(function(s){ return '<option value="'+s+'"'+(curVal===s?' selected':'')+'>'+s+'</option>'; }).join('');
  }
  function instOpts(sel){
    return '<option value="">— Sin instructor —</option>'
      +(STATE.instructores||[]).map(function(p){
        return '<option value="'+p.id+'"'+(sel===p.id?' selected':'')+'>'+
          (p.tipo==='asistente'?'🤝 ':'👨‍🏫 ')+p.nombre+(p.especialidad?' ('+p.especialidad+')':'')+'</option>';
      }).join('');
  }
  function asistOpts(sel){
    return '<option value="">— Sin asistente —</option>'
      +(STATE.instructores||[]).map(function(p){
        return '<option value="'+p.id+'"'+(sel===p.id?' selected':'')+'>'+
          (p.tipo==='asistente'?'🤝 ':'👨‍🏫 ')+p.nombre+'</option>';

function updateGrupoInstructor(idx, rol, instId){
  if(!_modalGrupos[idx]) return;
  var inst = STATE.instructores.find(function(p){return p.id===instId;});
  if(rol==='instructor'){
    _modalGrupos[idx].instructorId  = instId||null;
    _modalGrupos[idx].instructor    = inst?inst.nombre:'';
  } else {
    _modalGrupos[idx].asistenteId   = instId||null;
    _modalGrupos[idx].asistente     = inst?inst.nombre:'';
  }
}

function updateGrupo(idx, field, val) {
  if(!_modalGrupos[idx]) return;
  _modalGrupos[idx][field] = val;
}

function updateGrupoConflict(idx, field, val) {
  updateGrupo(idx, field, val);
  // Check conflict
  const g = _modalGrupos[idx];
  const nombreOriginal = document.getElementById('mc-nombre')?.value?.trim()||'';
  const c = STATE.cursos.find(x=>x.nombre===nombreOriginal);
  // Excluir el curso padre Y el curso original si este grupo viene de un curso existente
  const excludeIds = [c?.id||null, g._originalCursoId||null];
  const conflict = checkScheduleConflict(
    g.salon, g.horarioDesde, g.horarioHasta,
    g.fechaInicio, g.fechaFin,
    excludeIds, g.id||null, g.dia
  );
  const alertEl = document.getElementById('conflict-'+idx);
  if(alertEl){
    alertEl.style.display = conflict ? 'block' : 'none';
    if(conflict) alertEl.textContent = t('cur_grupo_conflicto')+' Conflicto con: '+conflict;
  }
}

// Si el nombre escrito a mano para un grupo coincide EXACTAMENTE con un curso
// standalone ya existente, se asume que el usuario quiere migrar ese curso como
// grupo (igual que el botón "Usar curso existente") en vez de crear uno nuevo
// que choque de horario con él. Autocompleta los datos y excluye el conflicto.
function detectarCursoExistentePorNombre(idx){
  const g = _modalGrupos[idx];
  if(!g || !g.nombre) return;
  if(g._fromCurso) return; // ya viene de "Usar curso existente", no tocar
  const nombreBuscado = g.nombre.trim().toLowerCase();
  if(!nombreBuscado) return;
  const nombreOriginal = document.getElementById('mc-nombre')?.value?.trim()||'';
  const cPadre = STATE.cursos.find(x=>x.nombre===nombreOriginal);
  const match = STATE.cursos.find(function(c){
    return c.id!==(cPadre&&cPadre.id) && c.nombre.trim().toLowerCase()===nombreBuscado;
  });
  if(!match) return;
  // Autocompletar solo los campos que el usuario aún no llenó, para no pisar
  // datos que ya haya editado a mano para este grupo
  if(!g.salon) g.salon = match.salon||'';
  if(!g.dia) g.dia = match.dia||'';
  if(!g.horarioDesde) g.horarioDesde = match.horarioDesde||'';
  if(!g.horarioHasta) g.horarioHasta = match.horarioHasta||'';
  if(!g.nivel) g.nivel = match.nivel||'';
  if(!g.cupo) g.cupo = match.cupo||'';
  if(!g.instructorId) g.instructorId = match.instructorId||'';
  if(!g.costoBase) g.costoBase = match.costoBase||null;
  g._originalCursoId = match.id;
  g._fromCurso = true;
  // Re-renderizar la fila para reflejar los valores autocompletados
  const cont=document.getElementById('grupos-container');
  if(cont) cont.innerHTML=_modalGrupos.map((gr,i)=>renderGrupoRow(gr,i)).join('');
  const aviso=document.getElementById('conflict-'+idx);
  // Mostrar confirmación breve de que se detectó y vinculó el curso existente
  setTimeout(function(){
    var fila=document.getElementById('gn-'+idx);
    if(fila){
      var hint=document.createElement('div');
      hint.style.cssText='color:#16a34a;font-size:11px;font-weight:600;margin-top:3px';
      hint.textContent='✓ Vinculado al curso existente "'+match.nombre+'" — sus datos se autocompletaron, sin conflicto de horario.';
      fila.parentElement&&fila.parentElement.appendChild(hint);
    }
  },50);
}

  const cont = document.getElementById('grupos-container');

}

async function removeModalGrupo(idx) {
  const g = _modalGrupos[idx];
  if(!g) return;

  if(g._fromCurso || g._originalCursoId) {
    // ── Grupo creado DESDE UN CURSO EXISTENTE → restaurar como curso independiente
    const ok = confirm(
      '⚠️ "' + g.nombre + '" fue agregado desde un curso existente.\n\n' +
      'Al quitarlo del grupo, se restaurará como curso independiente ' +
      'para que puedas editarlo o borrarlo desde la pestaña Cursos.\n\n' +
      '¿Continuar?'
    );
    if(!ok) return;

    // Restaurar el curso solo si no existe ya un curso con ese ID
    const existePorId = STATE.cursos.find(c => c.id === (g._originalCursoId || g.id));
    const existePorNombre = STATE.cursos.find(c => c.nombre === g.nombre && c.grupos && c.grupos.length === 0);

    if(!existePorId) {
      // Reconstruir el curso desde los datos del grupo
      const cursoRestaurado = {
        id:    g._originalCursoId || g.id || uid(),
        nombre:        g.nombre        || '',
        nivel:         g.nivel         || '',
        cupo:          g.cupo          || '',
        costoBase:     g.costoBase     || 0,
        salon:         g.salon         || null,
        dia:           g.dia           || '',
        horarioDesde:  g.horarioDesde  || '',
        horarioHasta:  g.horarioHasta  || '',
        instructorId:  g.instructorId  || '',
        asistenteId:   g.asistenteId   || '',
        fechaInicio:   g.fechaInicio   || '',
        fechaFin:      g.fechaFin      || null,
        grupos:        [],
        createdAt:     new Date().toISOString(),
        restoradoDeGrupo: true,
      };
      STATE.cursos.push(cursoRestaurado);
      await saveState();
      alert('✅ "' + g.nombre + '" restaurado como curso independiente.\nPuedes encontrarlo en la pestaña Cursos.');
    } else {
      alert('ℹ️ El curso "' + g.nombre + '" ya existe como curso independiente.\nPuedes encontrarlo en la pestaña Cursos.');
    }

  } else {
    // ── Grupo creado MANUALMENTE (nuevo grupo) → eliminar definitivamente
    const ok = confirm(
      '🗑️ ¿Eliminar el grupo "' + g.nombre + '" definitivamente?\n\n' +
      'Este grupo fue creado como grupo nuevo dentro de este curso. ' +
      'Al eliminarlo se perderá toda su configuración.\n\n' +
      'Esta acción NO se puede deshacer.'
    );
    if(!ok) return;
  }

  // Quitar del array y actualizar display
  _modalGrupos.splice(idx, 1);
  const cont = document.getElementById('grupos-container');
  if(cont) cont.innerHTML = _modalGrupos.length===0
    ? '<div style="background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:14px;text-align:center;color:var(--text3);font-size:13px">Sin grupos adicionales — este curso se tomará como un grupo único.</div>'
    : _modalGrupos.map((g2,i2)=>renderGrupoRow(g2,i2)).join('');
}

async function guardarCursoModal(nombreOriginal) {
  try {
    const nombre = document.getElementById('mc-nombre')?.value?.trim();
    const costo = document.getElementById('mc-costo')?.value;
    const pagoMinimo = parseFloat(document.getElementById('mc-pago-minimo')?.value)||0;
    const tipo = document.getElementById('mc-tipo')?.value||'regular';
    const inicio = document.getElementById('mc-inicio')?.value||null;
    const fin = document.getElementById('mc-fin')?.value||null;
    const dia = document.getElementById('mc-dia')?.value||null;
    const horarioDesde = document.getElementById('mc-desde')?.value||null;
    const horarioHasta = document.getElementById('mc-hasta')?.value||null;
    const salon = document.getElementById('mc-salon')?.value||null;
    const instructorId = document.getElementById('mc-instructor')?.value||null;
    const asistenteId = document.getElementById('mc-asistente')?.value||null;
    const instObj=(STATE.instructores||[]).find(p=>p.id===instructorId);
    const asistObj=(STATE.instructores||[]).find(p=>p.id===asistenteId);
  
    if(!nombre) { alert(t('cur_nombre_req')); return; }
  if(!nombreOriginal && (!costo||parseFloat(costo)<=0)) { alert(t('cur_costo_req')); document.getElementById('mc-costo')?.focus(); return; }
    // Check schedule conflict for the main course (only if no groups)
    const mcSalon=document.getElementById('mc-salon')?.value;
    const mcDesde=document.getElementById('mc-desde')?.value;
    const mcHasta=document.getElementById('mc-hasta')?.value;
    if(_modalGrupos.length===0 && mcSalon && mcDesde && mcHasta){
      const c0=STATE.cursos.find(x=>x.nombre===nombreOriginal);
      const conf0=checkScheduleConflict(mcSalon,mcDesde,mcHasta,inicio,fin,c0?.id||null,null,dia);
      if(conf0){alert(t('cur_grupo_conflicto')+'\nConflicto con: '+conf0);return;}
    }
  
    // Check conflicts in all grupos
    for(let i=0; i<_modalGrupos.length; i++){
      const g=_modalGrupos[i];
      if(!g.salon||!g.horarioDesde||!g.horarioHasta) continue;
      const c=STATE.cursos.find(x=>x.nombre===nombreOriginal);
      // Excluir el curso padre Y el curso original (si este grupo viene de un curso existente)
      const excludeIds=[c?.id||null, g._originalCursoId||null];
      const conflict=checkScheduleConflict(g.salon,g.horarioDesde,g.horarioHasta,
        g.fechaInicio||inicio,g.fechaFin||fin,excludeIds,g.id||null,g.dia||dia);
      if(conflict){
        alert(t('cur_grupo_conflicto')+'\nConflicto con: '+conflict);
        return;
      }
    }
  
    if(nombreOriginal) {
      // EDIT
      const idx = STATE.cursos.findIndex(x=>x.nombre===nombreOriginal);
      if(idx>=0){
        const nuevoNombre = nombre;
        STATE.cursos[idx]={...STATE.cursos[idx],nombre:nuevoNombre,costoBase:parseFloat(costo)||0,pagoMinimo,cupo:parseInt(document.getElementById('mc-cupo')?.value)||0,
          tipo,fechaInicio:inicio,fechaFin:fin,dia,horarioDesde,horarioHasta,salon,instructorId,instructor:instObj?instObj.nombre:'',asistenteId,asistente:asistObj?asistObj.nombre:'',grupos:_modalGrupos.map(g=>({...g}))};
        // Update references in matrículas
        if(nuevoNombre!==nombreOriginal){
          STATE.matrículas.forEach(m=>{if(m.curso===nombreOriginal)m.curso=nuevoNombre;});
          STATE.pagosRegulares.forEach(p=>{if(p.curso===nombreOriginal)p.curso=nuevoNombre;});
        }
      }
    } else {
      // NEW
      if(STATE.cursos.find(c=>c.nombre===nombre)){alert(t('cur_existe'));return;}
      STATE.cursos.push({id:uid(),nombre,costoBase:parseFloat(costo)||0,pagoMinimo,tipo,
        fechaInicio:inicio,fechaFin:fin,dia,horarioDesde,horarioHasta,salon,
        instructorId,instructor:instObj?instObj.nombre:'',
        asistenteId,asistente:asistObj?asistObj.nombre:'',
        cupo:parseInt(document.getElementById('mc-cupo')?.value)||0,
        grupos:_modalGrupos.map(g=>({...g})),
        createdAt:new Date().toISOString()});
    }
    // Update matriculas for courses converted to grupos
    const convertedIds = _modalGrupos.filter(g=>g._fromCurso).map(g=>g._originalCursoId||g.id);
    const parentNombre = nombre; // the new parent course name
  
    _modalGrupos.filter(g=>g._fromCurso).forEach(function(g){
      const originalCurso = STATE.cursos.find(c=>c.id===(g._originalCursoId||g.id));
      if(!originalCurso) return;
      const originalNombre = originalCurso.nombre;
      // Update all matriculas that referenced the original course
      STATE.matrículas.forEach(function(m){
        if(m.curso === originalNombre){
          m.curso   = parentNombre;   // now belongs to the parent course
          m.grupoId = g.id;            // assigned to this group
        }
      });
      // Update pagosRegulares too
      STATE.pagosRegulares.forEach(function(p){
        if(p.curso === originalNombre) p.curso = parentNombre;
      });
    });
  
    // Remove the original standalone courses that were converted
    if(convertedIds.length>0){
      STATE.cursos=STATE.cursos.filter(c=>!convertedIds.includes(c.id));
    }
  // Auto-aplicar promociones vigentes del curso a los grupos nuevos
  var cursoCorrecto=STATE.cursos.find(function(c){return c.nombre===nombre;});
  if(cursoCorrecto&&cursoCorrecto.grupos&&cursoCorrecto.grupos.length){
    (STATE.promociones||[]).forEach(function(promo){
      if(!promo.activa) return;
      var ca=promo.cursosAplicables||'todos';
      // ¿La promo ya aplica a este curso (sin grupo específico)?
      var aplicaAlCurso = ca==='todos' || ca.split(',').some(function(e){
        var p=e.trim().split('|'); return p[0]===nombre && !p[1];
      });
      if(!aplicaAlCurso) return;
      // Agregar los grupos del curso a cursosAplicables si no están ya
      cursoCorrecto.grupos.forEach(function(g){
        var entradaGrupo = nombre+'|'+g.id;
        var yaIncluido = ca==='todos' || ca.split(',').some(function(e){return e.trim()===entradaGrupo;});
        if(!yaIncluido && ca!=='todos'){
          promo.cursosAplicables = ca+','+entradaGrupo;
          ca = promo.cursosAplicables;
        }
      });
    });
  }
  await saveState(); alert('✅ Curso guardado correctamente');
    closeModal();
    renderCursos();
  } catch(err) { alert('ERROR AL GUARDAR: ' + err.message + '\n\n' + err.stack); console.error(err); }
}

async function eliminarCurso(nombre){
  const inscritos=STATE.matrículas.filter(m=>m.curso===nombre).length;
  if(inscritos>0&&!confirm(`Este curso tiene ${inscritos} alumno(s) inscrito(s).\n¿Eliminar de todas formas?`))return;
  else if(inscritos===0&&!confirm(`¿Eliminar el curso "${nombre}"?`))return;
  STATE.cursos=STATE.cursos.filter(c=>c.nombre!==nombre);
  await saveState();renderCursos();
}

function setPermsFromRol(){
  const rol=(document.getElementById('nu-rol')||{value:'recepcionista'}).value;
  const defaults=PERMS_POR_ROL[rol]||[];
  ALL_PERMS.forEach(p=>{const cb=document.getElementById('np-'+p.id);if(cb)cb.checked=defaults.includes(p.id);});
}

async function guardarUsuario(){
  const name=(document.getElementById('nu-name')||{value:''}).value.trim();
  const username=(document.getElementById('nu-user')||{value:''}).value.trim();
  const password=(document.getElementById('nu-pass')||{value:''}).value;
  const role=(document.getElementById('nu-rol')||{value:'recepcionista'}).value;
  if(!name||!username||password.length<4){alert(t('usr_min4'));return;}
  if(STATE.usuarios.find(u=>u.username===username)){alert(t('usr_existe'));return;}
  const perms=ALL_PERMS.map(p=>p.id).filter(id=>{const cb=document.getElementById('np-'+id);return cb&&cb.checked;});
  STATE.nextUID=(STATE.nextUID||100)+1;
  const now=new Date();
  STATE.usuarios.push({id:'u'+STATE.nextUID,username,password,role,name,perms,creado:`${String(now.getDate()).padStart(2,'0')} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][now.getMonth()]} ${now.getFullYear()}`});
  // Auto-create maestro for new instructor users
  if(role==='instructor'){
    var newId='u'+STATE.nextUID;
    var existeMaestro=(STATE.instructores||[]).find(function(i){return i.userId===newId||i.nombre===name;});
    if(!existeMaestro){
      if(!STATE.instructores)STATE.instructores=[];
      STATE.instructores.push({id:uid(),nombre:name,userId:newId,tarifa:200,tarifaAsistente:60,activo:true,createdAt:new Date().toISOString()});
    } else { existeMaestro.userId=newId; }
  }
  await saveState();closeModal();renderUsuarios();
}

function showModalEditarUsuario(id){
  const u=STATE.usuarios.find(x=>x.id===id);
  if(!u)return;
  const rl={admin:'Administrador',recepcionista:'Recepcionista',instructor:'Instructor'};
  document.getElementById('modal-container').innerHTML=`
  <div class="moverlay"><div class="modal" style="max-width:540px">
    <div class="modal-hdr"><div class="modal-title"><i class="ti ti-edit"></i> Editar Usuario: ${u.name}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group span2"><label class="flbl">Nombre</label><input id="eu-name" value="${u.name}"></div>
        <div class="form-group"><label class="flbl">${t('usr_campo_pass_edit')}</label><input type="password" id="eu-pass" placeholder=""></div>
        <div class="form-group"><label class="flbl">${t('usr_campo_rol')}</label><select id="eu-rol"><option value="recepcionista"${u.role==='recepcionista'?' selected':''}>Recepcionista</option><option value="instructor"${u.role==='instructor'?' selected':''}>Instructor</option><option value="admin"${u.role==='admin'?' selected':''}>Administrador</option></select></div>
        <div class="form-group span2"><label class="flbl">Permisos</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px">
          ${ALL_PERMS.map(p=>`<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="ep-${p.id}" value="${p.id}"${(u.perms||[]).includes(p.id)?' checked':''}> ${p.label}
          </label>`).join('')}
          </div>
        </div>
      </div>
      <div class="form-actions"><button class="btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="actualizarUsuario('${id}')"><i class="ti ti-device-floppy"></i> Guardar</button></div>
    </div>
  </div></div>`;
}

async function actualizarUsuario(id){
  const idx=STATE.usuarios.findIndex(u=>u.id===id);
  if(idx<0)return;
  const pass=(document.getElementById('eu-pass')||{value:''}).value;
  const perms=ALL_PERMS.map(p=>p.id).filter(pid=>{const cb=document.getElementById('ep-'+pid);return cb&&cb.checked;});
  STATE.usuarios[idx]={
    ...STATE.usuarios[idx],
    name:(document.getElementById('eu-name')||{value:STATE.usuarios[idx].name}).value.trim(),
    role:(document.getElementById('eu-rol')||{value:STATE.usuarios[idx].role}).value,
    perms,
    ...(pass.length>=4?{password:pass}:{})
  };
  await saveState();
  if(id===currentUser.id)currentUser={...currentUser,...STATE.usuarios[idx]};
  closeModal();renderUsuarios();
}

async function eliminarUsuario(id){
  const u=STATE.usuarios.find(x=>x.id===id);
  if(!confirm(`¿Eliminar al usuario "${u?.name}"?`))return;
  STATE.usuarios=STATE.usuarios.filter(x=>x.id!==id);
  await saveState();renderUsuarios();
}

let proyMes = monthStr();

function renderProyeccion() {
  // Build 14 months: 1 past + current + 12 future
  const months = [];
  for(let i=-1; i<=12; i++){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+i);
    const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    months.push(ym);
  }

  // Timeline data
  const timeline = months.map(ym=>({
    ym, label:mesLabel(ym),
    count:alumnosActivosEnMes(ym).length,
    income:ingresosMinimosEnMes(ym),
    finalizan:cursosQueFinalizanEnMes(ym).length,
    inician:cursosQueInicianEnMes(ym).length,
  }));

  const maxCount = Math.max(...timeline.map(t=>t.count), 1);

  // Current selected month detail
  const activos = alumnosActivosEnMes(proyMes);
  const finalizan = cursosQueFinalizanEnMes(proyMes);
  const inician = cursosQueInicianEnMes(proyMes);

  // Group activos by course
  const porCurso = {};
  activos.forEach(mat=>{
    if(!porCurso[mat.curso]) porCurso[mat.curso]={count:0,costo:0};
    porCurso[mat.curso].count++;
    const cur=STATE.cursos.find(c=>c.nombre===mat.curso);
    porCurso[mat.curso].costo=cur?parseFloat(String(cur.costoBase||'').replace(/[^0-9.]/g,''))||0:0;
  });

  const totalIncome = ingresosMinimosEnMes(proyMes);

  // Courses ending within next 60 days
  const hoy=new Date();
  const pronto=STATE.cursos.filter(c=>{
    if(!c.fechaFin)return false;
    const f=new Date(c.fechaFin+'T00:00:00');
    const diff=(f-hoy)/(1000*60*60*24);
    return diff>=0&&diff<=60;
  }).sort((a,b)=>a.fechaFin.localeCompare(b.fechaFin));

  document.getElementById('main-content').innerHTML=`
  <div class="page-header fade-in">
    <h2>${t('proy_titulo')}</h2>
    <p>${t('proy_subtitulo')}</p>
  </div>

  <!-- STATS HOY -->
  <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:24px">
    <div class="stat-card" style="--stripe:var(--accent)">
      <div class="stat-label">📅 ${mesLabel(monthStr())}</div>
      <div class="stat-val">${alumnosActivosEnMes(monthStr()).length}</div>
      <div class="stat-sub">${t('proy_alumnos_activos')}</div>
    </div>
    <div class="stat-card" style="--stripe:var(--green)">
      <div class="stat-label">💰 ${t('proy_ingresos_min')}</div>
      <div class="stat-val" style="font-size:19px">${fmtMXN(ingresosMinimosEnMes(monthStr()))}</div>
      <div class="stat-sub">${mesLabel(monthStr())}</div>
    </div>
    <div class="stat-card" style="--stripe:var(--danger)">
      <div class="stat-label">⚠️ ${t('proy_finalizan')}</div>
      <div class="stat-val">${pronto.length}</div>
      <div class="stat-sub">${t('proy_alerta_fin')} (60 días)</div>
    </div>
    <div class="stat-card" style="--stripe:#a855f7">
      <div class="stat-label">💸 Nómina instructores (a pagar)</div>
      <div class="stat-val" style="font-size:19px">${fmtMXN(calcNominaInstructoresMes(monthStr()))}</div>
      <div class="stat-sub">horas de ${mesLabel(prevMonth(monthStr()))}</div>
    </div>
    <div class="stat-card" style="--stripe:#6366f1">
      <div class="stat-label">📚 Cursos activos hoy</div>
      <div class="stat-val">${STATE.cursos.filter(c=>{const f=c.fechaFin?new Date(c.fechaFin+'T00:00:00'):null;return!f||f>=new Date();}).length}</div>
      <div class="stat-sub">de ${STATE.cursos.length} totales</div>
    </div>
  </div>

  ${pronto.length>0?`
  <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:12px;padding:14px 18px;margin-bottom:24px">
    <div style="font-weight:700;margin-bottom:10px;color:var(--warn)"><i class="ti ti-alert-triangle"></i> ${t('proy_alerta_fin')}</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      ${pronto.map(c=>{
        const diasR=Math.ceil((new Date(c.fechaFin+'T00:00:00')-hoy)/(1000*60*60*24));
        const ins=STATE.matrículas.filter(m=>m.curso===c.nombre).length;
        return`<div style="background:#fff;border:1px solid var(--warn-border);border-radius:8px;padding:10px 14px;min-width:200px">

          ${ins>0?`<button onclick="showModalEditarCurso('${c.nombre}')" style="margin-top:8px;background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600"><i class="ti ti-calendar-plus"></i> Extender curso</button>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`:''}

  <!-- TIMELINE BAR CHART -->
  <div class="card fade-in" style="margin-bottom:24px">
    <div style="font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px">

    <div style="overflow-x:auto;padding-bottom:4px">

          const isCurrent=ym===monthStr();

          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer" onclick="selProyMes('${ym}')">
            <div style="font-size:9px;font-family:'DM Mono',monospace;color:var(--text3)">${count>0?count:''}</div>
            <div style="width:100%;height:${Math.round(pct*80)}px;background:${isSel?'var(--accent)':isCurrent?'var(--green)':'var(--border2)'};border-radius:4px 4px 0 0;transition:all .15s;min-height:4px;position:relative"
              title="${label}: ${count} alumnos · ${fmtMXN(income)}">
              ${finalizan>0?`<div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--danger)">▼${finalizan}</div>`:''}
              ${inician>0?`<div style="position:absolute;top:-14px;right:0;font-size:9px;color:var(--green)">+${inician}</div>`:''}
            </div>
            <div style="font-size:9px;color:${isSel?'var(--accent)':isCurrent?'var(--green)':'var(--text3)'};font-weight:${isSel||isCurrent?'700':'400'};text-align:center;line-height:1.2;white-space:nowrap">${label.replace(' ','\n')}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--text3);flex-wrap:wrap">
        <span><span style="background:var(--green);width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:4px"></span>Mes actual</span>
        <span><span style="background:var(--accent);width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:4px"></span>Mes seleccionado</span>
        <span style="color:var(--danger)">▼ Cursos que finalizan</span>
        <span style="color:var(--green)">+ Cursos que inician</span>

  </div>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">

      ${months.map(ym=>`<option value="${ym}"${ym===proyMes?' selected':''}>${mesLabel(ym)}</option>`).join('')}
    </select>
    <div style="font-size:13px;color:var(--text2)">
      <strong style="color:var(--accent);font-size:18px">${activos.length}</strong> ${t('proy_alumnos_activos')}
      · <strong style="color:var(--green)">${fmtMXN(totalIncome)}</strong> ${t('proy_ingresos_min')}
    </div>
  </div>

  <!-- NÓMINA INSTRUCTORES DEL MES SELECCIONADO -->
  <div class="card fade-in" style="margin-bottom:16px;border-left:3px solid #a855f7">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">💸 Nómina instructores — ${mesLabel(proyMes)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">Horas finalizadas en ${mesLabel(prevMonth(proyMes))} (se pagan en ${mesLabel(proyMes)})</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:700;color:#a855f7">${fmtMXN(calcNominaInstructoresMes(proyMes))}</div>
        <div style="font-size:11px;color:var(--text3)">Ingreso neto estimado: <strong style="color:var(--green)">${fmtMXN(totalIncome - calcNominaInstructoresMes(proyMes))}</strong></div>
      </div>
    </div>
  </div>

  <!-- DETALLE POR CURSO -->
  ${Object.keys(porCurso).length===0?`<div class="empty"><div class="empty-icon">📊</div><h3>${t('proy_sin_mat')}</h3></div>`:`
  <div class="table-wrap fade-in" style="margin-bottom:16px">
    <table>
      <thead><tr>
        <th>${t('proy_curso_col')}</th>

        ${Object.entries(porCurso).map(([curso,d])=>{

  ${finalizan.length>0?`<div style="background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:10px;padding:12px 16px;margin-bottom:12px">

function handleImpFile(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      impWB = XLSX.read(e.target.result, {type:'binary', cellDates:true});
      impSheets = impWB.SheetNames;
      // Auto-detect format: if only 1 sheet, likely columna; if multiple, likely multihoja
      if(impSheets.length === 1) setImpFmt('columna');
      else setImpFmt('multihoja');
      document.getElementById('imp-config').style.display = 'block';
      document.getElementById('imp-dropzone').style.borderColor = 'var(--green)';
      document.getElementById('imp-dropzone').innerHTML = `<div style="font-size:32px">✅</div><div style="font-weight:600;color:var(--green);margin-top:8px">${file.name}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">${impSheets.length} hoja(s) detectada(s)</div>`;
      populateColSelectors();
      actualizarPreview();
    } catch(err) { alert('Error leyendo el archivo: '+err.message); }
  };
  reader.readAsBinaryString(file);
}

function setImpFmt(fmt) {
  impFmt = fmt;
  const colMap = document.getElementById('imp-colmap');
  const sheetsInfo = document.getElementById('imp-sheets-info');
  if(!colMap || !sheetsInfo) return;
  if(fmt === 'columna') {
    colMap.style.display = 'block';
    sheetsInfo.innerHTML = '';
    document.getElementById('fmt-lbl-col').style.borderColor = 'var(--accent)';
    document.getElementById('fmt-lbl-multi').style.borderColor = 'var(--border)';
  } else {
    colMap.style.display = 'none';
    document.getElementById('fmt-lbl-multi').style.borderColor = 'var(--accent)';
    document.getElementById('fmt-lbl-col').style.borderColor = 'var(--border)';
    if(impWB) {
      sheetsInfo.innerHTML = `<strong>${t('imp_hojas')}</strong> ${impSheets.map(s=>`<span style="background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:4px;font-size:11px;margin:2px">${s}</span>`).join(' ')}`;
    }
  }
  actualizarPreview();
}

function populateColSelectors() {
  if(!impWB || impSheets.length === 0) return;
  // Get columns from first sheet
  const sheet = impWB.Sheets[impSheets[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
  if(rows.length === 0) return;
  const headers = rows[0].map(h => String(h||'').trim()).filter(Boolean);
  impCols = headers;

  // Fill selectors
  const selIds = ['imp-map-alumno','imp-map-curso','imp-map-email','imp-map-tel','imp-map-nac','imp-map-titular'];
  selIds.forEach(id => {
    const sel = document.getElementById(id);
    if(!sel) return;
    const cur = sel.value;
    sel.innerHTML = `<option value="">${t('imp_sel_col')}</option>` +
      headers.map(h=>`<option value="${h}"${cur===h?' selected':''}>${h}</option>`).join('');
  });

  // Auto-detect common column names
  const autoMatch = (candidates, selId) => {
    const sel = document.getElementById(selId);
    if(!sel||sel.value) return;
    for(const c of candidates) {
      const found = headers.find(h=>h.toLowerCase().includes(c.toLowerCase()));
      if(found){sel.value=found;return;}
    }
  };
  autoMatch(['nombre','alumno','estudiante','student','name','ученик'], 'imp-map-alumno');
  autoMatch(['curso','materia','clase','course','asignatura'], 'imp-map-curso');
  autoMatch(['email','correo','mail'], 'imp-map-email');
  autoMatch(['tel','phone','celular','móvil','whatsapp'], 'imp-map-tel');
  autoMatch(['nac','birth','cumple','nacimiento','fecha de nac'], 'imp-map-nac');
  autoMatch(['titular','padre','madre','tutor','parent','responsable'], 'imp-map-titular');
}

function getMapping() {
  return {
    alumno: (document.getElementById('imp-map-alumno')||{value:''}).value,
    curso:  (document.getElementById('imp-map-curso')||{value:''}).value,
    email:  (document.getElementById('imp-map-email')||{value:''}).value,
    tel:    (document.getElementById('imp-map-tel')||{value:''}).value,
    nac:    (document.getElementById('imp-map-nac')||{value:''}).value,
    titular:(document.getElementById('imp-map-titular')||{value:''}).value,
  };
}

function parseRows() {
  if(!impWB) return [];
  const rows = [];
  if(impFmt === 'multihoja') {
    // Each sheet = course; rows = students
    impSheets.forEach(sheetName => {
      const sheet = impWB.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      if(data.length < 2) return;
      const headers = data[0].map(h=>String(h||'').trim());
      // Auto-detect name column in this sheet
      const nameIdx = headers.findIndex(h=>
        ['nombre','alumno','estudiante','name','student'].some(k=>h.toLowerCase().includes(k))
      );
      const emailIdx = headers.findIndex(h=>['email','correo','mail'].some(k=>h.toLowerCase().includes(k)));
      const telIdx = headers.findIndex(h=>['tel','phone','celular'].some(k=>h.toLowerCase().includes(k)));
      const nacIdx = headers.findIndex(h=>['nac','birth','cumple'].some(k=>h.toLowerCase().includes(k)));
      const titIdx = headers.findIndex(h=>['titular','padre','madre','tutor'].some(k=>h.toLowerCase().includes(k)));
      for(let i=1; i<data.length; i++) {
        const row = data[i];
        const alumno = nameIdx>=0 ? String(row[nameIdx]||'').trim() : String(row[0]||'').trim();
        if(!alumno) continue;
        rows.push({
          alumno, curso:sheetName,
          email: emailIdx>=0 ? String(row[emailIdx]||'') : '',
          telefono: telIdx>=0 ? String(row[telIdx]||'') : '',
          nacimiento: nacIdx>=0 ? String(row[nacIdx]||'') : '',
          titular: titIdx>=0 ? String(row[titIdx]||'') : '',
        });
      }
    });
  } else {
    // Single sheet, use mapping
    const map = getMapping();
    if(!map.alumno) return [];
    const sheet = impWB.Sheets[impSheets[0]];
    const data = XLSX.utils.sheet_to_json(sheet, {defval:''});
    data.forEach(row => {
      const alumno = String(row[map.alumno]||'').trim();
      if(!alumno) return;
      rows.push({
        alumno,
        curso: map.curso ? String(row[map.curso]||'').trim() : '',
        email: map.email ? String(row[map.email]||'') : '',
        telefono: map.tel ? String(row[map.tel]||'') : '',
        nacimiento: map.nac ? String(row[map.nac]||'') : '',
        titular: map.titular ? String(row[map.titular]||'') : '',
      });
    });
  }
  return rows.filter(r=>r.alumno);
}

function actualizarPreview() {

    </tbody></table>`;

  // ── Costo mensual por curso ───────────────────────────────────────────────
  // Show cost input for EVERY detected course (new or existing without cost)
  const cursosSinCosto = cursosDetectados.filter(c => {
    const existing = STATE.cursos.find(x=>x.nombre===c);
    return !existing || !existing.costoBase || parseFloat(String(existing.costoBase).replace(/[^0-9.]/g,''))===0;
  });
  const cursosConCosto = cursosDetectados.filter(c => {
    const existing = STATE.cursos.find(x=>x.nombre===c);
    return existing && existing.costoBase && parseFloat(String(existing.costoBase).replace(/[^0-9.]/g,''))>0;
  });

  let costoHtml = '';

    costoHtml = `
    <div style="margin-top:16px;margin-bottom:4px">
      <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">
        💰 Costo mensual por curso
      </div>
      <div style="background:${cursosSinCosto.length>0?'var(--warn-bg)':'var(--green-bg)'};border:1px solid ${cursosSinCosto.length>0?'var(--warn-border)':'var(--green-border)'};border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:${cursosSinCosto.length>0?'var(--warn)':'var(--green)'}">
        ${cursosSinCosto.length>0

    ⏭️ ${dups} ${t('imp_duplicados')} (ya existen en el CRM)`;

  btnImp.disabled = nuevos.length===0;
}

async function ejecutarImport() {
  if(!impWB) return;
  if(impFmt==='columna'&&!getMapping().alumno){alert(t('imp_req_col'));return;}
  const rows=parseRows();
  const existingKeys=new Set(STATE.matrículas.map(m=>m.alumno.toLowerCase()+'|'+(m.curso||'').toLowerCase()));
  let cursosAdd=0,alumnosAdd=0,dups=0;
  const today=new Date().toISOString().split('T')[0];
  const fmtFechaHoy=fmtFecha(today);

  // Collect course costs defined in the import UI
  const costosDefinidos={};
  document.querySelectorAll('[id^="costo-curso-"]').forEach(input=>{
    const val=parseFloat(input.value)||0;
    if(val>0){
      // Extract course name from element id
      const curso=input.dataset.curso;
      if(curso) costosDefinidos[curso]=val;
    }
  });

  rows.forEach(r=>{
    const key=r.alumno.toLowerCase()+'|'+r.curso.toLowerCase();
    if(existingKeys.has(key)){dups++;return;}
    existingKeys.add(key);
    // Create course if not exists
    if(r.curso&&!STATE.cursos.find(c=>c.nombre===r.curso)){
      STATE.cursos.push({
        id:uid(),nombre:r.curso,nivel:'',cupo:'',
        costoBase:costosDefinidos[r.curso]||0,
        horario:'',instructor:'',salon:null,
        fechaInicio:today,fechaFin:null,
        createdAt:new Date().toISOString()
      });
      cursosAdd++;
    } else if(r.curso&&costosDefinidos[r.curso]) {
      // Update cost of existing course if user defined one
      const idx=STATE.cursos.findIndex(c=>c.nombre===r.curso);
      if(idx>=0&&(!STATE.cursos[idx].costoBase||parseFloat(String(STATE.cursos[idx].costoBase).replace(/[^0-9.]/g,''))===0)){
        STATE.cursos[idx].costoBase=costosDefinidos[r.curso];
      }
    }
    // Create matricula — grupoId y salon se dejan null porque en la importación masiva
    // no se conoce el grupo específico; el admin los asigna después en Matrículas.
    STATE.matrículas.push({
      folio:STATE.nextFolio++,
      alumno:r.alumno,
      nacimiento:r.nacimiento||'',
      curso:r.curso||'',
      titular:r.titular||r.alumno,
      email:r.email||'',
      telefono:r.telefono||'',
      primerPago:0,
      fecha:fmtFechaHoy,
      fechaISO:today,
      grupoId:null,
      salon:null,
      notas:'Importado desde Excel',
      createdAt:new Date().toISOString(),
      createdBy:currentUser.username,
    });
    alumnosAdd++;
  });

  await saveState();
  closeModal();
  const cursosConCosto=Object.keys(costosDefinidos).length;
  alert(`✅ ${t('imp_ok')}\n\n📚 ${cursosAdd} ${t('imp_cursos_creados')}\n💰 ${cursosConCosto} curso(s) con costo mensual configurado\n👤 ${alumnosAdd} ${t('imp_alumnos_add')}\n⏭️ ${dups} ${t('imp_duplicados')}`);
  navigate('matriculas');
  buildSidebar();
}

async function darDeBaja(folio) {
  const m = STATE.matrículas.find(x=>x.folio===folio);
  if(!m) return;
  const motivo = document.getElementById('baja-motivo')?.value || '';
  const notas  = document.getElementById('baja-notas')?.value  || '';
  // Collect all cursos this student attended (in case of multiple matrículas)
  const todasSusMats = STATE.matrículas.filter(x=>x.alumno===m.alumno);
  const cursosAsistidos = [...new Set(todasSusMats.map(x=>x.curso).filter(Boolean))];
  // Build inactive record
  const inactivo = {
    id: uid(),
    alumno: m.alumno,
    email: m.email||'',
    telefono: m.telefono||'',
    nacimiento: m.nacimiento||'',
    titular: m.titular||'',
    cursosAsistidos,
    matrículasOriginales: todasSusMats.map(x=>({...x})),
    motivoBaja: motivo,
    notas,
    fechaBaja: todayISO(),
    inactivoDesde: new Date().toISOString(),
    creadoPor: currentUser.username,
  };
  if(!STATE.alumnosInactivos) STATE.alumnosInactivos=[];
  // Avoid duplicate in inactivos
  if(!STATE.alumnosInactivos.find(x=>x.alumno===m.alumno)) {
    STATE.alumnosInactivos.push(inactivo);
  } else {
    // Update existing inactive record with latest baja info
    const idx=STATE.alumnosInactivos.findIndex(x=>x.alumno===m.alumno);
    STATE.alumnosInactivos[idx]={...STATE.alumnosInactivos[idx],...inactivo,id:STATE.alumnosInactivos[idx].id};
  }
  // Remove from active matrículas (only this folio, or all of this student?)
  STATE.matrículas = STATE.matrículas.filter(x=>x.folio!==folio);
  await saveState();
  closeModal();
  renderMatriculas();
  buildSidebar();
}

async function eliminarMatriculaPermanente(folio) {
  const m=STATE.matrículas.find(x=>x.folio===folio);
  const pagosDelFolio=(STATE.pagosRegulares||[]).filter(p=>String(p.crmFolio)===String(folio));
  let msg=t('baja_elim_confirm')+(m?.alumno||'')+'?';
  if(pagosDelFolio.length>0){
    msg+='\n\n🔴 ATENCIÓN: Esta matrícula tiene '+pagosDelFolio.length+' pago'+(pagosDelFolio.length!==1?'s':'')+' registrado'+(pagosDelFolio.length!==1?'s':'')+' ('+pagosDelFolio.map(p=>(p.meses||[]).join(', ')).join(' | ')+').\nAl eliminar la matrícula, esos pagos también se borrarán del CRM y de Contabilidad automáticamente.';
  }
  if(!confirm(msg))return;
  STATE.matrículas=STATE.matrículas.filter(x=>x.folio!==folio);
  STATE.pagosRegulares=(STATE.pagosRegulares||[]).filter(p=>String(p.crmFolio)!==String(folio));
  if(STATE.autorizacionesPago) STATE.autorizacionesPago=STATE.autorizacionesPago.filter(a=>a.folio!==folio||a.estado!=='pendiente');
  await saveState();
  closeModal();
  renderMatriculas();
  buildSidebar();
}

function toggleSelectAllInac(el){
  document.querySelectorAll('.inac-chk').forEach(function(c){c.checked=el.checked;});
  updateBulkBarInac();
}

function updateBulkBarInac(){
  var checked=document.querySelectorAll('.inac-chk:checked');
  var bar=document.getElementById('inac-bulk-bar');
  if(bar){
    bar.style.display=checked.length>0?'flex':'none';
    var cnt=document.getElementById('inac-bulk-count');
    if(cnt) cnt.textContent=checked.length+' seleccionado'+(checked.length!==1?'s':'');
  }
}

async function eliminarExAlumnosSeleccionados(){
  var ids=[...document.querySelectorAll('.inac-chk:checked')].map(function(c){return c.dataset.id;});
  if(!ids.length) return;
  if(!confirm('¿Eliminar definitivamente '+ids.length+' ex-alumno(s)? Esta acción no se puede deshacer.')) return;
  STATE.alumnosInactivos=(STATE.alumnosInactivos||[]).filter(function(a){return!ids.includes(a.id);});
  await saveState();
  renderInactivos();
}

async function reactivarExAlumnosSeleccionados(){
  var ids=[...document.querySelectorAll('.inac-chk:checked')].map(function(c){return c.dataset.id;});
  if(!ids.length) return;
  if(ids.length===1){
    showModalReactivarAlumno(ids[0]);
  } else {
    showModalReactivarMasivo(ids);
  }
}

function showModalReactivarAlumno(id){
  var a=(STATE.alumnosInactivos||[]).find(function(x){return x.id===id;});
  if(!a) return;
  var mc=document.getElementById('modal-container');
  var cursosOpts=(STATE.cursos||[]).map(function(c){return '<option value="'+c.nombre+'">'+c.nombre+'</option>';}).join('');
  mc.innerHTML='<div class="moverlay"><div class="modal" style="max-width:480px">'
    +'<div class="modal-hdr"><div class="modal-title"><i class="ti ti-user-check"></i> Reactivar a '+esc(a.alumno)+'</div>'
    +'<button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body">'
    +'<div style="background:var(--accent-light);border:1px solid rgba(107,45,146,.2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px">'
    +'Se creará una nueva matrícula y un contrato nuevo para este alumno.</div>'
    +'<div class="form-grid">'
    +'<div class="form-group span2"><label class="flbl">Curso al que se reincorpora *</label>'
    +'<select id="reac-curso" onchange="reacActualizarGrupo()"><option value="">— Selecciona —</option>'+cursosOpts+'</select></div>'
    +'<div class="form-group span2" id="reac-grupo-cont" style="display:none"><label class="flbl">Grupo</label><select id="reac-grupo"></select></div>'
    +'<div class="form-group"><label class="flbl">Primer pago (MXN)</label><input type="number" id="reac-pago" value=""></div>'
    +'<div class="form-group"><label class="flbl">Fecha</label><input type="date" id="reac-fecha" value="'+todayISO()+'"></div>'
    +'</div>'
    +'<div class="form-actions">'
    +'<button class="btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn-primary" data-id="'+id+'" onclick="ejecutarReactivacion(this.dataset.id)"><i class="ti ti-check"></i> Reactivar y crear contrato</button>'
    +'</div></div></div></div>';
}

function showModalReactivarMasivo(ids){
  var mc=document.getElementById('modal-container');
  var cursosOpts=(STATE.cursos||[]).map(function(c){return '<option value="'+c.nombre+'">'+c.nombre+'</option>';}).join('');

  mc.innerHTML='<div class="moverlay"><div class="modal" style="max-width:480px">'
    +'<div class="modal-hdr"><div class="modal-title"><i class="ti ti-users-check"></i> Reactivar '+ids.length+' ex-alumnos</div>'
    +'<button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body">'
    +'<div style="background:var(--accent-light);border:1px solid rgba(107,45,146,.2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px">'
    +'Se crearán '+ids.length+' nuevas matrículas y contratos. Todos se asignarán al mismo curso/grupo.</div>'
    +'<div class="form-grid">'
    +'<div class="form-group span2"><label class="flbl">Curso *</label>'

    +'<button class="btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn-primary" onclick="ejecutarReactivacionMasiva(window._reacIds)"><i class="ti ti-check"></i> Reactivar todos y crear contratos</button>'

function reacActualizarGrupo(){
  var cn=document.getElementById('reac-curso')?.value;
  var c=(STATE.cursos||[]).find(function(x){return x.nombre===cn;});
  var cont=document.getElementById('reac-grupo-cont');
  var sel=document.getElementById('reac-grupo');
  if(!c||!c.grupos||!c.grupos.length){if(cont)cont.style.display='none';return;}
  if(cont) cont.style.display='block';
  if(sel) sel.innerHTML='<option value="">— Sin grupo específico —</option>'
    +c.grupos.map(function(g){return'<option value="'+g.id+'">'+g.nombre+'</option>';}).join('');
}

async function ejecutarReactivacion(id){
  var a=(STATE.alumnosInactivos||[]).find(function(x){return x.id===id;});
  if(!a) return;
  var curso=document.getElementById('reac-curso')?.value;
  if(!curso){alert('Selecciona un curso.');return;}
  var grupoId=document.getElementById('reac-grupo')?.value||null;
  var c=(STATE.cursos||[]).find(function(x){return x.nombre===curso;});
  var g=c&&grupoId?c.grupos?.find(function(x){return x.id===grupoId;}):null;
  var pago=parseFloat(document.getElementById('reac-pago')?.value)||c?.costoBase||0;
  var fecha=document.getElementById('reac-fecha')?.value||todayISO();
  var folio=STATE.nextFolio++;
  STATE.matrículas.push({
    folio,alumno:a.alumno,nacimiento:'',curso,
    titular:a.titular||a.alumno,email:a.email||'',telefono:a.telefono||'',
    primerPago:pago,pagoTipo:'mensual',pagoMensual:null,
    grupoId,grupoNombre:g?g.nombre:null,
    fecha:fmtFecha(fecha),fechaISO:fecha,
    notas:'Reactivado desde Ex-alumnos',
    createdAt:new Date().toISOString(),createdBy:currentUser.username,
  });
  STATE.alumnosInactivos=(STATE.alumnosInactivos||[]).filter(function(x){return x.id!==id;});
  await saveState();
  closeModal();
  renderInactivos();
  // Generar y descargar el contrato nuevo automáticamente
  if(typeof descargarContrato==='function'){
    setTimeout(function(){descargarContrato(folio);},400);
  } else {
    alert('✅ '+a.alumno+' reactivado con folio #'+folio+'. Descarga el contrato desde Matrículas.');
  }
}

async function ejecutarReactivacionMasiva(ids){
  var curso=document.getElementById('reac-curso')?.value;
  if(!curso){alert('Selecciona un curso.');return;}
  var grupoId=document.getElementById('reac-grupo')?.value||null;
  var c=(STATE.cursos||[]).find(function(x){return x.nombre===curso;});
  var g=c&&grupoId?c.grupos?.find(function(x){return x.id===grupoId;}):null;
  var pago=parseFloat(document.getElementById('reac-pago')?.value)||c?.costoBase||0;
  var fecha=document.getElementById('reac-fecha')?.value||todayISO();
  var count=0;
  ids.forEach(function(id){
    var a=(STATE.alumnosInactivos||[]).find(function(x){return x.id===id;});
    if(!a) return;
    var folio=STATE.nextFolio++;
    STATE.matrículas.push({
      folio,alumno:a.alumno,nacimiento:'',curso,
      titular:a.titular||a.alumno,email:a.email||'',telefono:a.telefono||'',
      primerPago:pago,pagoTipo:'mensual',pagoMensual:null,
      grupoId,grupoNombre:g?g.nombre:null,
      fecha:fmtFecha(fecha),fechaISO:fecha,
      notas:'Reactivado masivamente desde Ex-alumnos',
      createdAt:new Date().toISOString(),createdBy:currentUser.username,
    });
    count++;
  });
  STATE.alumnosInactivos=(STATE.alumnosInactivos||[]).filter(function(x){return!ids.includes(x.id);});
  await saveState();
  closeModal();
  renderInactivos();
  // Navegar a matrículas para que pueda descargar los contratos nuevos
  if(count>0){
    if(confirm('✅ '+count+' alumno(s) reactivados.\n\n¿Quieres ir a Matrículas para descargar sus contratos?')){
      navigate('matriculas');
    }
  }
}


async function eliminarInactivoPermanente(id) {
  const a=STATE.alumnosInactivos.find(x=>x.id===id);
  if(!a||!confirm(t('inac_elim_confirm')+a.alumno+'?'))return;
  STATE.alumnosInactivos=STATE.alumnosInactivos.filter(x=>x.id!==id);
  await saveState();
  renderInactivos();
}

function exportarInactivosEmail() {
  const inac=(STATE.alumnosInactivos||[]).filter(a=>a.email);

// Helper: calculate stacked discount for multiple promos
function calcStackDescuento(promosIds, montoBase, mesesCount) {
  let acum = 0;
  const subtotal = +(montoBase * mesesCount).toFixed(2);
  promosIds.forEach(pid => {
    const p = STATE.promociones.find(x=>x.id===pid);
    if(!p) return;
    if(p.tipo==='porcentaje') acum = +((subtotal-acum) * p.valor/100 + acum).toFixed(2);
    else acum = +(acum + p.valor * mesesCount).toFixed(2);
  });
  return Math.min(acum, subtotal); // never discount more than subtotal
}

// Show/hide the stack request panel in the payment form
function toggleSolicitudPanel() {
  const panel = document.getElementById('stack-panel');
  if(!panel) return;
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  calcStackPreview();
}

// Recalculate preview when checkboxes change
function calcStackPreview() {
  const panel = document.getElementById('stack-panel');
  if(!panel || panel.style.display === 'none') return;

  const base = parseFloat(document.getElementById('rp-monto-base')?.value)||0;
  const n = selectedMeses.length;
  if(base <= 0 || n === 0) {
    const pre = document.getElementById('stack-preview');
    if(pre) pre.innerHTML = '<div style="color:var(--text3);font-size:12px">Selecciona meses y monto base primero.</div>';
    return;
  }

  const checked = [...document.querySelectorAll('.stack-promo-chk:checked')].map(cb=>cb.value);
  const subtotal = +(base * n).toFixed(2);
  const descuento = calcStackDescuento(checked, base, n);
  const total = +(subtotal - descuento).toFixed(2);

  const previewEl = document.getElementById('stack-preview');
  if(!previewEl) return;

  if(checked.length === 0) {
    previewEl.innerHTML = '<div style="color:var(--text3);font-size:12px">Selecciona al menos 2 promociones para ver el cálculo.</div>';
    return;
  }

  const promoNames = checked.map(id => STATE.promociones.find(p=>p.id===id)?.nombre||id);
  previewEl.innerHTML = `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--text2)">Subtotal (${n} mes${n>1?'es':''})</span>
        <span style="font-family:'DM Mono',monospace">${fmtMXN(subtotal)}</span>
      </div>
      ${promoNames.map((name,i)=>`<div style="display:flex;justify-content:space-between;color:var(--green);margin-bottom:4px">
        <span>🏷️ ${name}</span>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;color:var(--green);margin-bottom:4px">
        <span>Descuento total combinado</span>
        <span style="font-family:'DM Mono',monospace">-${fmtMXN(descuento)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:15px;border-top:1px solid var(--border);padding-top:8px;margin-top:4px">
        <span>${t('solicitud_total')}</span>
        <span style="font-family:'DM Mono',monospace;color:var(--green)">${fmtMXN(total)}</span>
      </div>
    </div>`;
}

async function enviarSolicitudStack() {
  if(!hasPerm('crear_matriculas')) { alert('Sin permisos.'); return; }

  const folioEl = document.getElementById('rp-alumno');
  const folio = folioEl ? parseInt(folioEl.value) : 0;
  if(!folio) { alert(t('pag_sel_alumno_alert')); return; }
  if(selectedMeses.length === 0) { alert(t('pag_sel_mes_alert')); return; }

  const base = parseFloat(document.getElementById('rp-monto-base')?.value)||0;
  if(base <= 0) { alert(t('pag_monto_alert')); return; }
  if(!selectedMethod) { alert(t('pag_method_alert')); return; }

  const checked = [...document.querySelectorAll('.stack-promo-chk:checked')].map(cb=>cb.value);
  if(checked.length < 2) { alert('Selecciona al menos 2 promociones para solicitar la combinación.'); return; }
  const motivo = (document.getElementById('stack-motivo')||{value:''}).value.trim();
  if(!motivo) { alert('Por favor escribe el motivo de la solicitud.'); document.getElementById('stack-motivo')?.focus(); return; }

  const m = STATE.matrículas.find(x=>x.folio===folio);
  const subtotal = +(base * selectedMeses.length).toFixed(2);
  const descuento = calcStackDescuento(checked, base, selectedMeses.length);
  const montoFinal = +(subtotal - descuento).toFixed(2);
  const promoNombres = checked.map(id => STATE.promociones.find(p=>p.id===id)?.nombre||id);

  const sol = {
    id: uid(),
    alumnoNombre: m.alumno,
    crmFolio: folio,
    curso: m.curso,
    meses: [...selectedMeses],
    mesesCount: selectedMeses.length,
    montoBase: base,
    subtotal,
    promosSeleccionadas: checked,
    promoNombres,
    descuentoTotal: descuento,
    montoFinal,
    method: selectedMethod,
    fecha: document.getElementById('rp-fecha')?.value || todayISO(),
    notas: (document.getElementById('rp-notas')||{value:''}).value,
    motivo: (document.getElementById('stack-motivo')||{value:''}).value.trim(),
    estado: 'pendiente',
    solicitadoPor: currentUser.username,
    solicitadoEn: new Date().toISOString(),
    revisadoPor: null,
    revisadoEn: null,
  };

  if(!STATE.solicitudesStack) STATE.solicitudesStack = [];
  STATE.solicitudesStack.push(sol);
  await saveState();
  buildSidebar(); // update badge count
  alert(t('solicitud_ok'));
  // Reset form
  selectedMeses = []; selectedMethod = '';
  pagoSubTab = 'historial';
  renderPagos();
}

async function aprobarSolicitud(id) {
  if(!puedeAutorizarPromos()) { alert('Sin permisos.'); return; }
  const sol = STATE.solicitudesStack.find(s=>s.id===id);
  if(!sol) return;

  if(!confirm(`¿Aprobar y registrar el pago de ${sol.alumnoNombre}?\n${sol.meses.map(m=>mesLabel(m)).join(', ')} — ${fmtMXN(sol.montoFinal)}\nPromos: ${sol.promoNombres.join(' + ')}`)) return;

  // Register the payment automatically
  let commMP=0, ivaMP=0, neto=sol.montoFinal;
  if(sol.method==='card'){
    commMP=+(sol.montoFinal*0.035).toFixed(2);
    ivaMP=+(commMP*0.16).toFixed(2);
    neto=+(sol.montoFinal-commMP-ivaMP).toFixed(2);
  }

  STATE.pagosRegulares.push({
    id: uid(),
    alumnoNombre: sol.alumnoNombre,
    crmFolio: sol.crmFolio,
    curso: sol.curso,
    meses: sol.meses,
    mesesCount: sol.mesesCount,
    montoBase: sol.montoBase,
    subtotal: sol.subtotal,
    promoId: sol.promosSeleccionadas[0],
    promoNombre: sol.promoNombres[0],
    promosStack: sol.promosSeleccionadas,
    promoNombresStack: sol.promoNombres,
    descuentoMonto: sol.descuentoTotal,
    montoFinal: sol.montoFinal,
    commMP, ivaMP, neto,
    method: sol.method,
    fecha: sol.fecha,
    notas: sol.notas + (sol.notas ? ' | ' : '') + 'Stack autorizado por ' + currentUser.username,
    stackAutorizadoPor: currentUser.username,
    createdAt: new Date().toISOString(),
    createdBy: sol.solicitadoPor,
  });

  // Update solicitud status
  const idx = STATE.solicitudesStack.findIndex(s=>s.id===id);
  if(idx>=0) {
    STATE.solicitudesStack[idx].estado = 'aprobada';
    STATE.solicitudesStack[idx].revisadoPor = currentUser.username;
    STATE.solicitudesStack[idx].revisadoEn = new Date().toISOString();
  }

  await saveState();
  buildSidebar();
  renderModoDios();
  alert('✅ Pago registrado correctamente para ' + sol.alumnoNombre);
}

async function rechazarSolicitud(id) {
  const sol = STATE.solicitudesStack.find(s=>s.id===id);
  if(!sol) return;
  if(!confirm(`¿Rechazar la solicitud de ${sol.alumnoNombre}?`)) return;

  const idx = STATE.solicitudesStack.findIndex(s=>s.id===id);
  if(idx>=0) {
    STATE.solicitudesStack[idx].estado = 'rechazada';
    STATE.solicitudesStack[idx].revisadoPor = currentUser.username;
    STATE.solicitudesStack[idx].revisadoEn = new Date().toISOString();
  }
  await saveState();
  buildSidebar();
  renderModoDios();
}

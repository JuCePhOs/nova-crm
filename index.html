<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--surface3:#e8e7e0;
  --accent:#6B2D92;--accent2:#5a2580;--accent-light:#f3eaf8;
  --brand-mg:#D91E8C;--brand-cy:#00D4E8;--brand-cy2:#e0fafd;
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --border:#e0dfd8;--border2:#d0cfc8;
  --danger:#c0392b;--danger-bg:#fde8e6;--danger-border:#f5c0bb;
  --green:#1a5c3a;--green-bg:#e8f4ee;--green-border:#b8dfc8;
  --warn:#d4820a;--warn-bg:#fef3dc;--warn-border:#f5d88a;
  --indigo:#6366f1;--indigo-bg:#eef2ff;
  --radius:10px;--r2:14px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 16px rgba(0,0,0,.12);
  font-family:"DM Sans",sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;width:100%;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,26,92,.08)}
button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--radius);padding:9px 18px;font-size:14px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#0f3d26}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}.btn-danger:hover{background:#f9d0cc}
.btn-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}.btn-warn:hover{background:#fde9a0}
.btn-indigo{background:var(--indigo-bg);color:var(--indigo);border:1px solid #c7d2fe}.btn-indigo:hover{background:#e0e7ff}
.btn-sm{padding:6px 12px;font-size:12px}
.card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:24px;box-shadow:var(--shadow)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-admin{background:var(--accent-light);color:var(--accent)}
.badge-recep{background:var(--green-bg);color:var(--green)}
.badge-inst{background:var(--warn-bg);color:var(--warn)}
.badge-cash{background:#e8f4ee;color:#1a5c3a}
.badge-transfer{background:#eaeaf8;color:#1a1a5c}
.badge-card{background:#f3f0ff;color:#6d28d9}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-red{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.badge-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#4a1f6e 0%,#6B2D92 40%,#D91E8C 80%,#00D4E8 100%)}
.login-box{background:#fff;border-radius:20px;padding:40px 40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);border-top:4px solid #6B2D92}
.login-title{text-align:center;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:28px}
.fgrp{margin-bottom:14px}
.fgrp label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.alert-err{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);border-radius:8px;padding:9px 13px;font-size:13px;margin-bottom:12px}
/* APP LAYOUT */
#app{display:none}
.sidebar{width:230px;height:100vh;overflow:hidden;background:linear-gradient(160deg,#6B2D92 0%,#4a1f6e 60%,#1a0f3a 100%);position:fixed;top:0;left:0;padding:0;display:flex;flex-direction:column;z-index:50}
.sb-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:12px}
.sb-logo-icon{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-logo h1{font-size:14px;font-weight:700;color:#fff}
.power-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.7);transition:all .15s;flex-shrink:0;position:relative}
.power-btn:hover{background:rgba(255,0,0,.3);border-color:rgba(255,80,80,.5);color:#fff}
.power-menu{position:absolute;bottom:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px;min-width:140px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.power-menu button{width:100%;background:none;border:none;color:var(--text);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:8px;text-align:left}
.power-menu button:hover{background:rgba(244,107,107,.15);color:var(--danger)}
.sb-logo p{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.sb-sync{padding:8px 20px;font-size:11px;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.5);border-bottom:1px solid rgba(255,255,255,.08)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#64748b;flex-shrink:0;transition:background .3s}
.sync-dot.on{background:#4ade80}.sync-dot.off{background:#f87171}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;min-height:0}
.sn-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:500;color:rgba(255,255,255,.65);transition:all .15s;border-left:3px solid transparent}
.sn-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sn-item.active{background:rgba(255,255,255,.13);color:#fff;border-left-color:rgba(255,255,255,.7)}
.sn-item .ti{font-size:18px;width:20px;text-align:center}
.sidebar-nav::-webkit-scrollbar{width:4px}.sidebar-nav::-webkit-scrollbar-track{background:transparent}.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px}
.sn-badge{background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:auto}
.sb-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.12)}
.sb-user{font-size:13px;font-weight:600;color:#fff}
.sb-user-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.btn-logout{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);font-size:12px;padding:5px 11px;border-radius:7px;cursor:pointer;margin-top:10px;transition:all .15s;width:100%}
.btn-logout:hover{background:rgba(255,255,255,.2)}
.main{margin-left:230px;padding:32px;min-height:100vh}
.page-header{margin-bottom:24px}
.page-header h2{font-size:22px;font-weight:700;color:var(--text)}
.page-header p{color:var(--text2);font-size:14px;margin-top:4px}
/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--stripe,var(--accent))}
.stat-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:800;color:var(--text);font-family:"DM Mono",monospace;margin-bottom:4px}
.stat-sub{font-size:12px;color:var(--text3)}
/* TABLES */
.table-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.folio-tag{font-family:"DM Mono",monospace;background:var(--accent-light);color:var(--accent);padding:3px 8px;border-radius:6px;font-size:12px;font-weight:500}
.monto-tag{font-family:"DM Mono",monospace;color:var(--green);font-weight:600}
/* MODALS */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:var(--surface2);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.modal-body{padding:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.span2{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border);margin-top:16px}
/* EMPTY STATES */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty h3{font-size:17px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty p{font-size:13px;color:var(--text3)}
/* SEARCH + FILTER BAR */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{max-width:260px}
/* PAGOS REGULARES SPECIFIC */
.tab-nav{display:flex;gap:2px;background:var(--surface2);padding:4px;border-radius:10px;margin-bottom:20px;width:fit-content}
.tab-btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--surface);color:var(--accent);font-weight:600;box-shadow:var(--shadow)}
.method-toggle{display:flex;gap:8px}
.method-btn{flex:1;padding:10px 8px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.method-btn:hover{border-color:var(--accent);color:var(--accent)}
.method-btn.sel-cash{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.method-btn.sel-transfer{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.method-btn.sel-card{border-color:#6d28d9;background:#f3f0ff;color:#6d28d9}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.month-chip{padding:8px 6px;border-radius:8px;border:2px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;text-align:center;cursor:pointer;transition:all .15s;color:var(--text2)}
.month-chip:hover{border-color:var(--accent);color:var(--accent)}
.month-chip.sel{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:700}
.month-chip.covered{border-color:var(--green-border);background:var(--green-bg);color:var(--green);cursor:default}
.breakdown-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 0}
.breakdown-total{border-top:1px solid var(--border);padding-top:10px;margin-top:6px;font-weight:700;font-size:15px}
.promo-badge{display:inline-flex;align-items:center;gap:5px;background:#f3f0ff;color:#6d28d9;border:1px solid #c4b5fd;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600}
.promo-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;transition:border .15s}
.promo-card:hover{border-color:var(--accent)}
.promo-icon{width:40px;height:40px;background:var(--indigo-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.info-box{background:var(--accent-light);border:1px solid rgba(26,26,92,.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--accent);margin-top:8px}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.field-err{border-color:var(--danger)!important;box-shadow:0 0 0 3px rgba(192,57,43,.15)!important;animation:shake .45s ease}
.field-err-lbl{color:var(--danger)!important}
.field-hint{font-size:11px;margin-top:4px;color:var(--danger);display:none}
.field-hint.show{display:block}

.fade-in{animation:fadeIn .2s ease}
/* RESPONSIVE */
@media(max-width:900px){.sidebar{width:200px}.main{margin-left:200px;padding:20px}}
</style>
</head>

<script>
function diaToSet(d){
  var map={'Lunes':['Lunes'],'Martes':['Martes'],'Miércoles':['Miércoles'],'Jueves':['Jueves'],
    'Viernes':['Viernes'],'Sábado':['Sábado'],'Domingo':['Domingo'],
    'Lunes a Viernes':['Lunes','Martes','Miércoles','Jueves','Viernes'],
    'Todos los días':['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo']};
  return map[d]||map['Todos los días'];
}
function diasOverlap(d1,d2){
  var s1=diaToSet(d1), s2=diaToSet(d2);
  return s1.some(function(x){return s2.indexOf(x)>=0;});
}

function fmtFecha(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return`${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}`;}
function mesLabel(ym){const[y,m]=ym.split('-');const n=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${n[parseInt(m)-1]} ${y}`;}
function monthStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;}
function prevMonth(ym){const[y,m]=ym.split('-').map(Number);let py=y,pm=m-1;if(pm<1){pm=12;py--;}return`${py}-${String(pm).padStart(2,'0')}`;}
function calcNominaInstructoresMes(mesPago){
  // Nómina que se PAGA en "mesPago" = horas finalizadas en el mes ANTERIOR (pago con un mes de retraso).
  var mesHoras = prevMonth(mesPago);
  var inst = STATE.instructores||[];
  var sesiones = STATE.sesionesClase||[];
  var total = 0;
  inst.filter(function(p){return p.activo!==false;}).forEach(function(p){
    var altId = p.userId||null;
    var hP=0, hA=0;
    sesiones.forEach(function(s){
      if(s.mes!==mesHoras) return;
      if((s.instructorId===p.id||(altId&&s.instructorId===altId))&&s.estadoP==='finalizada') hP+=s.horasInstructor||0;
      if((s.asistenteId===p.id||(altId&&s.asistenteId===altId))&&s.estadoA==='finalizada') hA+=s.horasAsistente||0;
    });
    var tarifaA = p.tarifaHoraAsistente||p.tarifaHora||0;
    total += hP*(p.tarifaHora||0) + hA*tarifaA;
  });
  return +total.toFixed(2);
}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function calcEdad(nacISO){
  if(!nacISO)return null;
  var p=nacISO.split('-');
  if(p.length<3)return null;
  var b=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  if(isNaN(b.getTime()))return null;
  var t=new Date();
  var edad=t.getFullYear()-b.getFullYear();
  var m=t.getMonth()-b.getMonth();
  if(m<0||(m===0&&t.getDate()<b.getDate()))edad--;
  return (edad>=0&&edad<130)?edad:null;
}

// ════════════════════════════════════════════════
function timeSlots(start='08:00', end='23:30') {
  const slots = [];
  let [h,m] = start.split(':').map(Number);
  while(!(h===0&&m===0)) {
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m += 30; if(m>=60){m=0;h++;}
    if(h>23){h=0;m=0;} // midnight = 00:00, stop after adding it
    if(h===0&&m===0) slots.push('00:00');
    if(h===0&&m===0) break;
  }
  return slots;
}
const TIME_FROM  = timeSlots('08:00','23:30').slice(0,-1); // 08:00 → 23:30
const TIME_UNTIL = timeSlots('08:30','00:00');              // 08:30 → 00:00

function toMin(t){ const [h,m]=t.split(':').map(Number); return h===0&&m===0?1440:h*60+m; }

function timeOverlap(d1,h1,d2,h2){
  const [s1,e1,s2,e2]=[toMin(d1),toMin(h1),toMin(d2),toMin(h2)];
  return s1<e2 && s2<e1;
}
function dateOverlap(fi1,ff1,fi2,ff2){
  if(!fi1||!fi2) return true; // assume overlap if no dates
  const s1=fi1||'1900-01',e1=ff1||'2099-12',s2=fi2||'1900-01',e2=ff2||'2099-12';
  return s1<=e2 && s2<=e1;
}

// Returns conflict description or null
function checkScheduleConflict(salon, desde, hasta, fechaIni, fechaFin, excludeCursoId, excludeGrupoId, dia){
  if(!salon||!desde||!hasta) return null;
  // excludeCursoId puede ser un único id o un array de ids a excluir
  // (necesario cuando un curso existente se convierte en grupo: hay que
  // excluir tanto el curso padre como el curso original del que se tomó el grupo)
  const excludeIds = Array.isArray(excludeCursoId) ? excludeCursoId.filter(Boolean) : (excludeCursoId?[excludeCursoId]:[]);
  for(const c of STATE.cursos){
    if(excludeIds.includes(c.id)) continue;
    const grupos = c.grupos&&c.grupos.length ? c.grupos : [{
      id:'_main',salon:c.salon,horarioDesde:c.horarioDesde||'',horarioHasta:c.horarioHasta||'',
      fechaInicio:c.fechaInicio,fechaFin:c.fechaFin,nombre:c.nombre,dia:c.dia||''
    }];
    for(const g of grupos){
      if(g.id===excludeGrupoId) continue;
      if((g.salon||c.salon)!==salon) continue;
      if(!g.horarioDesde||!g.horarioHasta) continue;
      if(!diasOverlap(dia, g.dia||c.dia)) continue;
      if(timeOverlap(desde,hasta,g.horarioDesde,g.horarioHasta) &&
         dateOverlap(fechaIni,fechaFin,g.fechaInicio||c.fechaInicio,g.fechaFin||c.fechaFin)){
        return `${c.nombre}${g.nombre&&g.nombre!==c.nombre?' — '+g.nombre:''} (${g.salon||c.salon} ${g.horarioDesde}-${g.horarioHasta}${(g.dia||c.dia)?' · '+(g.dia||c.dia):''})`;
      }
    }
  }
  return null;
}

function alumnosActivosEnMes(ym) {
  const [y,m]=ym.split('-').map(Number);
  const mesStart=new Date(y,m-1,1);
  const mesEnd=new Date(y,m,0);
  return STATE.matrículas.filter(mat=>{
    const cur=STATE.cursos.find(c=>c.nombre===mat.curso);
    if(!cur)return true;
    const fin=cur.fechaFin?new Date(cur.fechaFin+'T00:00:00'):null;
    const ini=cur.fechaInicio?new Date(cur.fechaInicio+'T00:00:00'):null;
    if(ini&&ini>mesEnd)return false;
    if(fin&&fin<mesStart)return false;
    return true;
  });
}
function ingresosMinimosEnMes(ym) {
  return alumnosActivosEnMes(ym).reduce((s,mat)=>{
    const cur=STATE.cursos.find(c=>c.nombre===mat.curso);
    return s+(cur?parseFloat(String(cur.costoBase||'').replace(/[^0-9.]/g,''))||0:0);
  },0);
}
function cursosQueFinalizanEnMes(ym) {
  const [y,m]=ym.split('-').map(Number);
  const mesStart=new Date(y,m-1,1);
  const mesEnd=new Date(y,m,0);
  return STATE.cursos.filter(c=>{
    if(!c.fechaFin)return false;
    const f=new Date(c.fechaFin+'T00:00:00');
    return f>=mesStart&&f<=mesEnd;
  });
}
function cursosQueInicianEnMes(ym) {
  const [y,m]=ym.split('-').map(Number);
  const mesStart=new Date(y,m-1,1);
  const mesEnd=new Date(y,m,0);
  return STATE.cursos.filter(c=>{
    if(!c.fechaInicio)return false;
    const f=new Date(c.fechaInicio+'T00:00:00');
    return f>=mesStart&&f<=mesEnd;
  });
}

async function guardarModuloBase(gid){
  var inp=document.getElementById('mod-base-'+gid);
  if(!inp)return;
  if(!STATE.modulosCurso)STATE.modulosCurso={};
  if(!STATE.modulosCurso[gid])STATE.modulosCurso[gid]={moduloBase:'',sesiones:{}};
  STATE.modulosCurso[gid].moduloBase=inp.value.trim();
  await saveState();
  inp.style.borderColor='var(--green)';
  setTimeout(function(){inp.style.borderColor='';},1500);
}
async function agregarSesionOverride(gid){
  var fechaEl=document.getElementById('mod-fecha-'+gid);
  var modEl=document.getElementById('mod-sesion-'+gid);
  if(!fechaEl||!modEl)return;
  var fecha=fechaEl.value;
  var mod=modEl.value.trim();
  if(!fecha||!mod){alert('Indica la fecha y el módulo especial para esa sesión.');return;}
  if(!STATE.modulosCurso)STATE.modulosCurso={};
  if(!STATE.modulosCurso[gid])STATE.modulosCurso[gid]={moduloBase:'',sesiones:{}};
  STATE.modulosCurso[gid].sesiones[fecha]=mod;
  await saveState();
  fechaEl.value='';modEl.value='';
  renderCursosInstructor();
}
async function eliminarSesionOverride(gid,fecha){
  if(!STATE.modulosCurso||!STATE.modulosCurso[gid])return;
  delete STATE.modulosCurso[gid].sesiones[fecha];
  await saveState();
  renderCursosInstructor();
}

              grupoInfo='<span style="color:var(--text3);font-size:11px"> · 🗓 Grupo: '+_go.fechaInicio+(_go.fechaFin?' → '+_go.fechaFin:'')+' (pago único)</span>';
            }
          }
          var filas=sched.map(function(s){
            var cancelada=!!cans[mat.folio+'_'+s.mes];
            var hoy=todayISO();
            var diff=Math.round((new Date(s.fechaISO)-new Date(hoy))/86400000);
            var estadoColor=s.pagado?'var(--green)':cancelada?'var(--text2)':diff<0?'var(--danger)':diff<=7?'#e89c00':'var(--text2)';
            var estadoLbl=s.pagado?'✓ Pagado':cancelada?'✓ Cobrado':diff<0?'⚠️ Vencido':diff===0?'📅 Hoy':diff<=7?'⏰ En '+diff+' d.':'';
            return '<tr style="border-bottom:1px solid var(--border)">'
              +'<td style="padding:5px 8px;font-size:12px;color:var(--text3)">Pago #'+s.num+'</td>'
              +'<td style="padding:5px 8px;font-size:12px">'+s.fechaISO+'</td>'
              +'<td style="padding:5px 8px;font-size:12px;font-family:monospace">$'+s.monto.toLocaleString('es-MX')+'</td>'
              +'<td style="padding:5px 8px;font-size:12px;color:'+estadoColor+'">'+estadoLbl+'</td>'
              +(!s.pagado&&!cancelada&&diff<=7?'<td style="padding:5px 8px"><button onclick="marcarAlertaCancelada('+mat.folio+',\''+s.mes+'\')" style="font-size:10px;padding:3px 8px;background:var(--green);color:#fff;border:none;border-radius:5px;cursor:pointer">✓ Pago realizado</button></td>':'<td></td>')
              +'</tr>';
          }).join('');
          return '<div style="margin-top:16px">'
            +'<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:8px">💳 Plan de pagos — #'+mat.folio+' '+mat.curso+pagoMens+grupoInfo+'</div>'
            +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'
            +'<thead><tr style="background:var(--surface2)"><th style="padding:5px 8px;text-align:left;font-size:11px">#</th><th style="padding:5px 8px;text-align:left;font-size:11px">Fecha</th><th style="padding:5px 8px;text-align:left;font-size:11px">Monto</th><th style="padding:5px 8px;text-align:left;font-size:11px">Estado</th><th></th></tr></thead>'
            +'<tbody>'+filas+'</tbody></table></div></div>';
        }).join('');
      })()
      +'</div></div></div>';
    mc.innerHTML=content;
  }catch(err){
    alert('Error al abrir ficha: '+err.message);
    console.error('showFichaAlumno error:', err);
  }
}

function renderClasesInstructor(){

  });

    +'<p>'+cursos.length+' curso'+(cursos.length!==1?'s':'')+' asignado'+(cursos.length!==1?'s':'')+' a tu perfil</p></div>';

  cursos.forEach(function(c){

    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">';
    html+='<div style="flex:1"><div style="font-size:17px;font-weight:700">'+c.nombre+'</div>';
    html+='<span style="font-size:11px;background:var(--accent-soft,rgba(107,45,146,.12));color:var(--accent);padding:3px 8px;border-radius:99px;font-weight:600">'+rol+'</span></div></div>';
    if(grupos.length===0){
      html+='<div style="font-size:13px;color:var(--text3)">Sin grupos configurados aún.</div>';
    } else {
      grupos.forEach(function(g){
        var mods=STATE.modulosCurso&&STATE.modulosCurso[g.id]?STATE.modulosCurso[g.id]:{moduloBase:'',sesiones:{}};
        var tags=[];
        if(g.salon)tags.push('🏠 '+g.salon);
        if(g.dia)tags.push('📅 '+g.dia);
        if(g.horarioDesde&&g.horarioHasta)tags.push('⏰ '+g.horarioDesde+'–'+g.horarioHasta);
        if(g.fechaInicio)tags.push('🗓 '+g.fechaInicio+(g.fechaFin?' → '+g.fechaFin:''));
        html+='<div style="border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--surface2)">';
        html+='<div style="font-weight:600;font-size:14px;margin-bottom:6px">'+( g.nombre||'Grupo sin nombre')+'</div>';
        if(tags.length)html+='<div style="font-size:12px;color:var(--text3);margin-bottom:10px">'+tags.join(' · ')+'</div>';
        if(mods.moduloBase)html+='<div style="font-size:13px;background:var(--accent-soft,rgba(107,45,146,.08));border-radius:8px;padding:8px 12px;margin-bottom:8px"><strong>Módulo:</strong> '+mods.moduloBase+'</div>';
        html+='</div>';
      });
    }
    html+='</div>';
  });
  mc.innerHTML=html;
}

    </div>`).join('')}
  </div>`:''}`;
}

// Highlight missing/invalid field
function mostrarHintCampo(id, msg){
  var el=document.getElementById(id);
  if(!el)return;
  var hint=el.parentElement&&el.parentElement.querySelector('.field-hint-msg');
  if(!hint){
    hint=document.createElement('div');
    hint.className='field-hint-msg';
    hint.style.cssText='color:#dc2626;font-size:11px;margin-top:3px;font-weight:600';
    if(el.parentElement) el.parentElement.appendChild(hint);
  }
  hint.textContent='⚠ '+msg;
  hint.style.display='block';
  el.addEventListener('input',function(){hint.style.display='none';},{once:true});
  el.addEventListener('change',function(){hint.style.display='none';},{once:true});
}
function resaltarError(id, hintId) {
  var el = document.getElementById(id);
  if(!el) return;
  el.classList.remove('field-err');
  void el.offsetWidth; // force reflow to restart animation
  el.classList.add('field-err');
  if(hintId) {
    var h = document.getElementById(hintId);
    if(h) h.classList.add('show');
  }
  // Find label sibling and highlight it
  var lbl = el.previousElementSibling || (el.parentElement && el.parentElement.querySelector('label'));
  if(lbl && lbl.tagName === 'LABEL') lbl.classList.add('field-err-lbl');
  // Auto-clear on user input
  function clearErr() {
    el.classList.remove('field-err');
    if(lbl && lbl.tagName === 'LABEL') lbl.classList.remove('field-err-lbl');
    if(hintId) { var h = document.getElementById(hintId); if(h) h.classList.remove('show'); }
    el.removeEventListener('input', clearErr);
    el.removeEventListener('change', clearErr);
  }
  el.addEventListener('input', clearErr);
  el.addEventListener('change', clearErr);
}

// ─── Calendario de pagos ──────────────────────────────────────────────────────
// Devuelve un array de {fechaISO, mes, pagado, monto} para cada mensualidad
// esperada de una matrícula, empezando desde su fecha de inicio.
function getSchedulePagos(m, maxMeses){
  if(!m||!m.fechaISO) return [];
  if(m.pagoTipo==='unico') maxMeses=1; // pago único: solo 1 fecha
  if(maxMeses==null) maxMeses=6; // null/undefined → 6 por defecto (0 es un valor válido explícito, no se sobreescribe)
  var pagados=(STATE.pagosRegulares||[])
    .filter(function(p){return p.crmFolio==m.folio||(p.paqueteFolios&&p.paqueteFolios.indexOf(m.folio)>=0);})
    .reduce(function(s,p){(p.meses||[]).forEach(function(mes){s[mes]=true;});return s;},{});
  var result=[];
  var startD=new Date(m.fechaISO+'T00:00:00');
  if(isNaN(startD.getTime())) return []; // fechaISO no válido → no calcular
  var dayOfMonth=startD.getDate();
  for(var i=0;i<maxMeses;i++){
    var targetYear=startD.getFullYear();
    var targetMonthIdx=startD.getMonth()+i;
    // Calcular cuántos días tiene el mes OBJETIVO antes de construir la fecha,
    // así nunca se desborda a un mes equivocado (ej. 31 de Feb en bisiesto → no salta a Marzo)
    var daysInTargetMonth=new Date(targetYear, targetMonthIdx+1, 0).getDate();
    var actualDay=Math.min(dayOfMonth, daysInTargetMonth);
    var d=new Date(targetYear, targetMonthIdx, actualDay);
    if(isNaN(d.getTime())) continue; // skip si sigue inválido
    var fISO=d.toISOString().slice(0,10);
    var mes=fISO.slice(0,7);
    var monto=i===0?(m.primerPago||0):(m.pagoMensual||m.primerPago||0);
    result.push({fechaISO:fISO, mes, pagado:!!pagados[mes], monto, num:i+1});
  }
  return result;
}

function autoFillAlumno(){
  const val=(document.getElementById('f-alumno')?.value||'').trim();
  if(!val) return;
  // Buscar la matrícula más reciente de este alumno (folio más alto = más nuevo)
  const prevMats=(STATE.matrículas||[]).filter(m=>m.alumno===val).sort((a,b)=>b.folio-a.folio);
  const m=prevMats[0];
  if(!m) return;
  // Auto-rellenar solo campos vacíos (no pisar lo que el usuario ya escribió)
  const fill=(id,val)=>{const el=document.getElementById(id);if(el&&!el.value&&val)el.value=val;};
  fill('f-nac',    m.nacimiento||'');
  fill('f-titular',m.titular||'');
  fill('f-email',  m.email||'');
  fill('f-tel',    m.telefono||'');
  // Mostrar confirmación
  const hint=document.getElementById('f-alumno-hint');
  if(hint){
    hint.textContent='✓ Datos personales autocompletados desde matrícula #'+m.folio+' ('+m.curso+')';
    hint.style.display='block';
  }
}

async function guardarMatricula(){
  const alumno=document.getElementById('f-alumno').value.trim();
  const nac=document.getElementById('f-nac').value;
  const curso=document.getElementById('f-curso').value;
  const titular=document.getElementById('f-titular').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const tel=document.getElementById('f-tel').value.trim();
  const pago=document.getElementById('f-pago').value;
  const pagoMensualRaw=document.getElementById('f-pago-mensual');
  const pagoMensualVal=pagoMensualRaw?parseFloat(pagoMensualRaw.value)||null:null;
  const tipoPagoEl=document.querySelector('input[name="f-tipo-pago"]:checked');
  const pagoTipo=(tipoPagoEl&&tipoPagoEl.value)==='unico'?'unico':'mensual';
  const fechaEl=document.getElementById('f-fecha');
  const fechaISO=fechaEl?fechaEl.value:todayISO();
  const notas=(document.getElementById('f-notas')||{value:''}).value;
  // Validation with clear hints
  var valid=true;
  var hints={
    'f-alumno':'Nombre del alumno requerido',
    'f-nac':'Fecha de nacimiento requerida',
    'f-curso':'Selecciona un curso',
    'f-titular':'Nombre del titular requerido',
    'f-tel':'Teléfono requerido',
    'f-pago':'Ingresa el monto del primer pago'
  };
  [['f-alumno',alumno],['f-nac',nac],['f-curso',curso],['f-titular',titular],['f-tel',tel],['f-pago',pago]].forEach(function(pair){
    if(!pair[1]){
      resaltarError(pair[0]);
      mostrarHintCampo(pair[0], hints[pair[0]]||'Campo requerido');
      valid=false;
    }
  });
  if(email){
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/i.test(email)){
      resaltarError('f-email');
      mostrarHintCampo('f-email','Correo electrónico no válido');
      valid=false;
    }
  }
  if(!valid){
    var firstErr=document.querySelector('.field-err');
    if(firstErr) firstErr.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  const folio=STATE.nextFolio++;
  const pagoMensualFinal=pagoMensualVal||parseFloat(pago)||0;
  // ── Autorización Modo Dios: primer pago por debajo del mínimo/costo del curso ──
  // FIX: usar costoBase como mínimo cuando pagoMinimo no esté configurado,
  // para que la autorización dispare aunque el campo "pago mínimo" no esté definido.
  var cursoObj=(STATE.cursos||[]).find(function(c){return c.nombre===curso;});
  var minimoReq=cursoObj?Math.max(cursoObj.pagoMinimo||0, parseFloat(cursoObj.costoBase)||0):0;
  var pagoVal=parseFloat(pago)||0;
  // Si tiene semidios o modo dios puede autorizar directamente
  var necesitaAutorizacion = minimoReq>0 && pagoVal>0 && pagoVal<minimoReq && !puedeAutorizarPromos();
  var motivoAuth='';
  if(necesitaAutorizacion){
    if(puedeAutorizarPromos()){
      // Semidios: auto-autoriza pero pide nota igualmente
      motivoAuth=prompt('ℹ️ Modo Semidios activo. El pago ($'+pagoVal.toLocaleString('es-MX')+') es menor al precio del curso ($'+minimoReq.toLocaleString('es-MX')+').\nSe aplicará automáticamente. Indica el motivo (beca, caso especial, etc.):');
      if(motivoAuth===null){ return; }
      necesitaAutorizacion=false; // semidios auto-autoriza
    } else {
      motivoAuth=prompt('⚠️ El pago ($'+pagoVal.toLocaleString('es-MX')+') es menor al precio del curso ($'+minimoReq.toLocaleString('es-MX')+').\n\nLa matrícula se guardará como PENDIENTE DE AUTORIZACIÓN — el Modo Dios deberá aprobarla antes de que sea válida.\n\nEscribe el motivo del precio especial (beca, caso particular, etc.):');
      if(motivoAuth===null){ return; } // canceló — no guardar nada
    }
  }
  var promoSelEl=document.getElementById('f-promo');
  var promoAplicada=promoSelEl&&promoSelEl.value?promoSelEl.value:null;
  STATE.matrículas.push({folio,alumno,nacimiento:nac,curso,titular,email,telefono:tel,
    primerPago:parseFloat(pago),pagoTipo:pagoTipo,pagoMensual:pagoTipo==='unico'?null:pagoMensualFinal,
    fecha:fmtFecha(fechaISO),fechaISO,notas,promoAplicada,
    autorizacionPendiente:necesitaAutorizacion||false,
    createdAt:new Date().toISOString(),createdBy:currentUser.username});
  if(necesitaAutorizacion){
    if(!STATE.autorizacionesPago)STATE.autorizacionesPago=[];
    STATE.autorizacionesPago.push({
      id:uid(), folio, alumnoNombre:alumno, curso,
      pagoIngresado:pagoVal, pagoMinimo:minimoReq, motivo:motivoAuth||'',
      estado:'pendiente', solicitadoPor:currentUser.username, solicitadoEn:new Date().toISOString(),
      revisadoPor:null, revisadoEn:null,
    });
  }
  // Auto-register first payment if already paid
  var pagoStatusEl=document.querySelector('input[name="f-pago-status"]:checked');
  var primerPagoNum=parseFloat(pago)||0;
  if(pagoStatusEl&&pagoStatusEl.value==='pagado'&&primerPagoNum>0){
    var metEl=document.querySelector('input[name="f-metodo-pago"]:checked');
    var met=metEl?metEl.value:'cash';
    var comm2=0,iva2=0,neto2=primerPagoNum;
    if(met==='card'){comm2=+(primerPagoNum*0.035).toFixed(2);iva2=+(comm2*0.16).toFixed(2);neto2=+(primerPagoNum-comm2-iva2).toFixed(2);}
    STATE.pagosRegulares.push({id:uid(),alumnoNombre:alumno,crmFolio:folio,curso,
      meses:[monthStr()],mesesCount:1,montoBase:primerPagoNum,subtotal:primerPagoNum,
      promoId:null,promoNombre:null,descuentoMonto:0,montoFinal:primerPagoNum,
      commMP:comm2,ivaMP:iva2,neto:neto2,method:met,
      fecha:fmtFecha(fechaISO),fechaISO,notas:'Primer pago — Folio #'+folio,
      createdAt:new Date().toISOString(),createdBy:currentUser.username});
  }
  await saveState();
  renderMatriculas();
  buildSidebar();
  mostrarPanelDescargaContratos([folio],[alumno+' — '+curso]);
}

async function guardarEdicionMasiva(folios){
  var cambios={};
  if(document.getElementById('em-chk-curso').checked){
    cambios.curso=document.getElementById('em-curso').value;
    var gEl=document.getElementById('em-grupo');
    cambios.grupoId=(gEl&&gEl.value)||null;
    var c=(STATE.cursos||[]).find(function(x){return x.nombre===cambios.curso;});
    var g=(c&&c.grupos&&cambios.grupoId)?c.grupos.find(function(x){return x.id===cambios.grupoId;}):null;
    cambios.grupoNombre=g?g.nombre:null;
  }
  if(document.getElementById('em-chk-pago').checked){
    cambios.primerPago=parseFloat(document.getElementById('em-pago').value)||0;
  }
  if(document.getElementById('em-chk-fecha').checked){
    cambios.fechaISO=document.getElementById('em-fecha').value;
    cambios.fecha=fmtFecha(cambios.fechaISO);
  }
  var creadoPorEl=document.getElementById('em-chk-creadopor');
  if(creadoPorEl&&creadoPorEl.checked){
    cambios.createdBy=document.getElementById('em-creadopor').value;
  }
  var pagosChk=document.getElementById('em-chk-pagos');
  if(pagosChk&&pagosChk.checked){
    var ptEl=document.getElementById('em-pagotipo');
    var ppEl=document.getElementById('em-pago');
    var pmEl=document.getElementById('em-pagomensual');
    var pt=ptEl?ptEl.value:'mensual';
    if(ppEl&&ppEl.value) cambios.primerPago=parseFloat(ppEl.value)||0;
    cambios.pagoTipo=pt;
    cambios.pagoMensual=pt==='unico'?null:(pmEl&&pmEl.value?parseFloat(pmEl.value)||0:null);
    // Crear/actualizar pagosRegulares para que Contabilidad lo vea
    if(cambios.primerPago!=null){
      var cm2=monthStr();
      folios.forEach(function(folio){
        var m2=STATE.matrículas.find(function(x){return x.folio===folio;});
        if(!m2) return;
        var exists=STATE.pagosRegulares.find(function(p){return p.crmFolio===folio&&(p.mes===cm2||(p.meses&&p.meses.includes(cm2)));});
        if(!exists){
          STATE.pagosRegulares.push({id:uid(),alumnoNombre:m2.alumno,crmFolio:folio,curso:m2.curso||'',
            monto:cambios.primerPago,mes:cm2,meses:[cm2],fecha:todayISO(),
            createdAt:new Date().toISOString()});
        }
      });
    }
  }
  if(Object.keys(cambios).length===0){ alert('No marcaste ningún campo para aplicar. Selecciona al menos uno.'); return; }
  if(!confirm('¿Aplicar estos cambios a las '+folios.length+' matrículas seleccionadas (folios #'+folios.join(', #')+')?\\n\\nCampos a cambiar: '+Object.keys(cambios).join(', ')))return;
  folios.forEach(function(folio){
    var idx=STATE.matrículas.findIndex(function(x){return x.folio===folio;});
    if(idx<0) return;
    STATE.matrículas[idx]={...STATE.matrículas[idx], ...cambios};
  });
  await saveState();
  closeModal();
  renderMatriculas();
  alert('✅ Cambios aplicados a '+folios.length+' matrículas.');
}

// Puebla el <select> de grupo leyendo STATE.cursos EN VIVO al momento de llamarse —
// así cualquier grupo creado después de la matrícula (incluso en otra pestaña/sesión
// sincronizada por Firebase) aparece de inmediato la próxima vez que se abre este modal.
function actualizarGrupoEdicion(grupoIdPreseleccionado){
  var cursoNombre = document.getElementById('e-curso')?.value;
  var cont = document.getElementById('e-grupo-cont');
  var sel = document.getElementById('e-grupo');
  if(!cont||!sel) return;
  var curso = cursoNombre ? (STATE.cursos||[]).find(function(c){return c.nombre===cursoNombre;}) : null;
  var grupos = curso&&curso.grupos ? curso.grupos : [];
  if(!curso || grupos.length===0){
    cont.style.display='none';
    sel.innerHTML='';
    return;
  }
  cont.style.display='block';
  var preSel = grupoIdPreseleccionado!==undefined ? grupoIdPreseleccionado : sel.value;
  sel.innerHTML = '<option value="">— Sin grupo específico —</option>'
    + grupos.map(function(g){
        var tag=[g.dia,g.horarioDesde&&g.horarioHasta?(g.horarioDesde+'–'+g.horarioHasta):''].filter(Boolean).join(' · ');
        return '<option value="'+g.id+'"'+(g.id===preSel?' selected':'')+'>'+(g.nombre||'Grupo')+(tag?' ('+tag+')':'')+'</option>';
      }).join('');
}

async function guardarEdicion(folio){
  const idx=STATE.matrículas.findIndex(x=>x.folio===folio);
  if(idx<0)return;
  const fechaEl=document.getElementById('e-fecha');
  const fechaISO=fechaEl?fechaEl.value:STATE.matrículas[idx].fechaISO;
  const nuevoCurso=document.getElementById('e-curso').value;
  const nuevoPago=parseFloat(document.getElementById('e-pago').value)||0;

  // ── Mismo gate de autorización que en Nueva Matrícula: si el pago editado ──
  // queda por debajo del mínimo del curso, requiere autorización del Modo Dios.
  var cursoObj=(STATE.cursos||[]).find(function(c){return c.nombre===nuevoCurso;});
  var minimoReq=cursoObj?(cursoObj.pagoMinimo||0):0;
  var yaAutorizado=STATE.matrículas[idx].autorizacionPendiente===false||!STATE.matrículas[idx].autorizacionPendiente;
  var necesitaAutorizacion = minimoReq>0 && nuevoPago<minimoReq && !puedeAutorizarPromos();
  var motivoAuth='';
  if(necesitaAutorizacion){
    motivoAuth=prompt('⚠️ El pago editado ($'+nuevoPago.toLocaleString('es-MX')+') es menor al mínimo del curso ($'+minimoReq.toLocaleString('es-MX')+').\n\nLos cambios se guardarán, pero requieren autorización del Modo Dios.\n\nExplica brevemente el motivo:');
    if(motivoAuth===null){ return; } // canceló — no guardar ningún cambio
  }

  STATE.matrículas[idx]={
    ...STATE.matrículas[idx],
    alumno:document.getElementById('e-alumno').value.trim(),
    nacimiento:document.getElementById('e-nac').value,
    curso:nuevoCurso,
    createdBy:(document.getElementById('e-creadopor')&&document.getElementById('e-creadopor').value)||STATE.matrículas[idx].createdBy,
    grupoId:(document.getElementById('e-grupo')&&document.getElementById('e-grupo').value)||null,
    grupoNombre:(function(){
      var gEl=document.getElementById('e-grupo');
      if(!gEl||!gEl.value) return null;
      var c=(STATE.cursos||[]).find(function(x){return x.nombre===nuevoCurso;});
      var g=c&&c.grupos?c.grupos.find(function(x){return x.id===gEl.value;}):null;
      return g?g.nombre:null;
    })(),
    titular:document.getElementById('e-titular').value.trim(),
    email:document.getElementById('e-email').value.trim(),
    telefono:document.getElementById('e-tel').value.trim(),
    primerPago:nuevoPago,
    pagoTipo:(document.getElementById('e-pagotipo')&&document.getElementById('e-pagotipo').value)||'mensual',
    pagoMensual:(function(){var pt=document.getElementById('e-pagotipo');var pm=document.getElementById('e-pagomensual');if(pt&&pt.value==='unico')return null;return pm?parseFloat(pm.value)||nuevoPago:nuevoPago;})(),
    fechaISO,fecha:fmtFecha(fechaISO),
    autorizacionPendiente:necesitaAutorizacion||false,
  };
  if(necesitaAutorizacion){
    if(!STATE.autorizacionesPago)STATE.autorizacionesPago=[];
    STATE.autorizacionesPago.push({
      id:uid(), folio, alumnoNombre:STATE.matrículas[idx].alumno, curso:nuevoCurso,
      pagoIngresado:nuevoPago, pagoMinimo:minimoReq, motivo:(motivoAuth||'')+' (editado de matrícula existente)',
      estado:'pendiente', solicitadoPor:currentUser.username, solicitadoEn:new Date().toISOString(),
      revisadoPor:null, revisadoEn:null,
    });
  }
  await saveState();closeModal();renderMatriculas();
}

async function eliminarMatriculasSeleccionadas(){
  var folios=[...document.querySelectorAll('.mat-chk:checked')].map(function(c){return parseInt(c.value);});
  if(folios.length===0)return;
  var conPagos=folios.filter(function(f){return STATE.pagosRegulares.some(function(p){return p.crmFolio===f;});});
  var msg='¿Eliminar '+folios.length+' matrícula'+(folios.length!==1?'s':'')+' seleccionada'+(folios.length!==1?'s':'')+'?\n\nFolios: #'+folios.join(', #')+'\n\n⚠ Esta acción NO se puede deshacer.';
  if(conPagos.length>0){
    msg+='\n\n🔴 ADVERTENCIA: '+conPagos.length+' de las seleccionadas tiene'+(conPagos.length!==1?'n':'')+' pagos registrados asociados (Folios #'+conPagos.join(', #')+'). Los pagos vinculados también se eliminarán.';
  }
  if(!confirm(msg))return;
  STATE.matrículas=STATE.matrículas.filter(function(m){return !folios.includes(m.folio);});
  STATE.pagosRegulares=STATE.pagosRegulares.filter(function(p){return !folios.includes(p.crmFolio);});
  // Limpiar autorizaciones de pago pendientes que quedarían huérfanas
  if(STATE.autorizacionesPago) STATE.autorizacionesPago=STATE.autorizacionesPago.filter(function(a){return !folios.includes(a.folio)||a.estado!=='pendiente';});
  await saveState();
  renderMatriculas();
  buildSidebar();
}

function exportarExcel(){
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([
    ['Folio','Alumno','Nacimiento','Titular','Email','Teléfono','Curso','Primer Pago (MXN)','Fecha del Contrato','Notas'],
    ...STATE.matrículas.map(m=>[m.folio,m.alumno,m.nacimiento,m.titular,m.email,m.telefono,m.curso,parseFloat(String(m.primerPago||0).replace(/[^0-9.]/g,'')),m.fecha,m.notas||'']),
  ]);
  ws['!cols']=[6,26,12,26,26,14,22,14,18,30].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,'Matrículas');
  // Pagos regulares sheet
  if(STATE.pagosRegulares.length>0){
    const wp=XLSX.utils.aoa_to_sheet([
      ['ID','Alumno','Folio CRM','Curso','Meses cubiertos','Monto base','Promo','Descuento','Monto final','Método','Fecha','Notas'],
      ...STATE.pagosRegulares.map(p=>[p.id,p.alumnoNombre,p.crmFolio,p.curso,(p.meses||[]).join(', '),p.montoBase,p.promoNombre||'',p.descuentoMonto||0,p.montoFinal,p.method,p.fecha,p.notas||'']),
    ]);
    XLSX.utils.book_append_sheet(wb,wp,'Pagos Regulares');
  }
  // Ex-alumnos sheet
  if((STATE.alumnosInactivos||[]).length>0){
    const wi=XLSX.utils.aoa_to_sheet([
      ['Nombre','Email','Teléfono','Cursos Asistidos','Motivo de Baja','Fecha de Baja','Titular'],
      ...(STATE.alumnosInactivos||[]).map(a=>[a.alumno,a.email||'',a.telefono||'',(a.cursosAsistidos||[]).join(', '),a.motivoBaja||'',a.fechaBaja||'',a.titular||''])
    ]);
    wi['!cols']=[24,28,14,36,20,12,24].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,wi,'Ex-Alumnos');
  }
  XLSX.writeFile(wb,`NOVA_IA_CRM_${todayISO()}.xlsx`);
}

function switchPagoTab(t){
  pagoSubTab=t;
  document.querySelectorAll('.tab-nav .tab-btn[data-tab]').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===t);
  });
  renderPagoTab();
}

function renderPagoTab(){
  const el=document.getElementById('pago-content');
  if(!el)return;
  if(pagoSubTab==='registrar')el.innerHTML=buildRegistrarPago();
  else if(pagoSubTab==='historial')el.innerHTML=buildHistorialPagos();
  else if(pagoSubTab==='pendientes')el.innerHTML=buildPendientes();
  else if(pagoSubTab==='masivo')el.innerHTML=buildPagoMasivo();

  attachPagoEvents();
}

function buildPromoOpts(list){

let _pagoMasivoSel=new Set(); // folios seleccionados
let _pmMesActual=null; // mes seleccionado en Pago Masivo (null = mes actual)
let _pmHideMode=false; // true cuando se activó 'Solo sin pago' y se ocultan los ya pagados

function buildPagoMasivo(){
  const mesSel=_pmMesActual||monthStr();

  // Generar opciones de meses (actual + 2 anteriores + 3 futuros)
  var mesesOpts='';
  for(var mi=-2;mi<=3;mi++){
    var d=new Date();d.setDate(1);d.setMonth(d.getMonth()+mi);
    var ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var lbl=mesLabel(ym);
    mesesOpts+='<option value="'+ym+'"'+(ym===mesSel?' selected':'')+'>'+lbl+'</option>';
  }

  // Métodos de pago — MISMOS códigos internos que usa el registro individual
  // ('cash'/'transfer'/'card') para que Contabilidad los reconozca correctamente.
  // "Tarjeta" y "Mercado Pago" son la MISMA opción: la terminal bancaria de MP.
  var metOpts=
    '<option value="cash">💵 Efectivo</option>'
    +'<option value="transfer">🏦 Transferencia</option>'
    +'<option value="card">💳 Tarjeta / Terminal MP</option>';

  // Lista de alumnos activos con su monto de mensualidad
  var alumnos=STATE.matrículas.filter(function(m){return m.alumno&&m.curso;})
    .sort(function(a,b){return a.alumno.localeCompare(b.alumno);});

  var pagadosSet=new Set((STATE.pagosRegulares||[]).filter(function(p){
    return (p.meses||[]).includes(mesSel);
  }).map(function(p){return p.crmFolio;}));

  var rows=alumnos.map(function(m){
    var monto=m.pagoMensual!=null?m.pagoMensual:(m.primerPago||0);
    var pagado=pagadosSet.has(m.folio);
    var chk=_pagoMasivoSel.has(m.folio);
    var oculto=_pmHideMode&&pagado;
    return '<tr id="pm-row-'+m.folio+'" data-folio="'+m.folio+'" data-pagado="'+(pagado?'1':'0')+'"'+(oculto?' style="display:none"':'')+'>'
      +'<td style="text-align:center;padding:6px 8px">'
        +'<input type="checkbox" class="pm-chk" value="'+m.folio+'"'+(chk?' checked':'')
        +' onchange="_pagoMasivoSel[this.checked?\'add\':\'delete\'](parseInt(this.value));_pmActualizarConteo()"'
        +' style="width:15px;height:15px"></td>'
      +'<td style="font-size:12px"><strong>'+esc(m.alumno)+'</strong></td>'
      +'<td style="font-size:11px;color:var(--text3)">'+esc(m.curso||'')+(m.grupoNombre?' — '+esc(m.grupoNombre):'')+'</td>'
      +'<td style="text-align:right">'
        +'<input type="number" id="pm-monto-'+m.folio+'" value="'+monto+'" min="0" step="0.01"'
        +' style="width:90px;text-align:right;font-size:12px" placeholder="Monto">'
      +'</td>'
      +'<td style="font-size:11px;text-align:center">'
        +(pagado?'<span style="color:var(--green);font-weight:600">✓ Pagado</span>'
               :'<span style="color:var(--text3)">—</span>')
      +'</td>'
      +'</tr>';
  }).join('');

  return '<div class="card fade-in" style="max-width:900px">'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:16px">💳 Pago Masivo de Mensualidades</div>'

    // Controles superiores
    +'<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px">'

      +'<div class="form-group" style="margin:0">'
        +'<label class="flbl">Mes que se paga *</label>'
        +'<select id="pm-mes" onchange="_pmMesActual=this.value;_pmHideMode=false;renderPagoTab();">'+mesesOpts+'</select>'
      +'</div>'

      +'<div class="form-group" style="margin:0">'
        +'<label class="flbl">Método de pago *</label>'
        +'<select id="pm-metodo" onchange="_pmActualizarMetodoInfo()">'+metOpts+'</select>'
      +'</div>'

      +'<div class="form-group" style="margin:0;flex:1;min-width:180px">'
        +'<label class="flbl">Notas (opcional)</label>'
        +'<input id="pm-notas" type="text" placeholder="Ej: Pago de junio grupal" style="width:100%">'
      +'</div>'

    +'</div>'

    +'<div id="pm-mp-info" style="display:none;margin-bottom:12px">'
      +'<div style="background:#f3f0ff;border:1px solid #c4b5fd;border-radius:8px;padding:10px 14px;font-size:12px;color:#6d28d9">'
        +'<strong>💳 Mercado Pago Point:</strong> Se aplicará comisión de 3.50% + IVA (~4.06% efectivo) a cada pago seleccionado con este método.'
      +'</div>'
    +'</div>'

    // Acciones rápidas de selección
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">'
      +'<button class="btn-ghost btn-sm" onclick="_pmSeleccionarTodos(true)">✅ Seleccionar todos</button>'
      +'<button class="btn-ghost btn-sm" onclick="_pmSeleccionarTodos(false)">☐ Deseleccionar todos</button>'
      +'<button class="btn-primary btn-sm" onclick="_pmSeleccionarNoPagados()">⚡ Solo sin pago este mes</button>'
      +(_pmHideMode?'<button class="btn-ghost btn-sm" onclick="_pmMostrarTodos()">👁️ Mostrar todos de nuevo</button>':'')
      +'<span id="pm-conteo" style="margin-left:8px;font-size:12px;color:var(--text3)">'+_pagoMasivoSel.size+' seleccionado'+(_pagoMasivoSel.size!==1?'s':'')+'</span>'
    +'</div>'

    // Tabla de alumnos
    +'<div class="table-wrap" style="max-height:420px;overflow-y:auto">'
    +'<table>'
    +'<thead><tr>'
      +'<th style="width:36px"><input type="checkbox" id="pm-chk-all" onchange="_pmSeleccionarTodos(this.checked)" style="width:15px;height:15px"></th>'
      +'<th>Alumno</th><th>Curso</th><th style="text-align:right">Monto (MXN)</th><th>Estado</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div>'

    // Botón confirmar
    +'<div class="form-actions" style="margin-top:16px">'

      +'</button>'

    +'</div>';
}

function _pmActualizarMetodoInfo(){
  var sel=document.getElementById('pm-metodo');
  var info=document.getElementById('pm-mp-info');
  if(info) info.style.display=(sel&&sel.value==='card')?'block':'none';
}

function _pmActualizarConteo(){
  var n=_pagoMasivoSel.size;
  var el=document.getElementById('pm-conteo');
  if(el) el.textContent=n+' seleccionado'+(n!==1?'s':'');
  var total=0;
  _pagoMasivoSel.forEach(function(folio){
    var inp=document.getElementById('pm-monto-'+folio);
    if(inp) total+=parseFloat(inp.value)||0;
  });
  var res=document.getElementById('pm-resumen');
  if(res) res.textContent=n>0?'Total a registrar: '+fmtMXN(total):'';
}

function _pmSeleccionarTodos(sel){
  document.querySelectorAll('.pm-chk').forEach(function(c){
    var row=document.getElementById('pm-row-'+c.value);
    if(row&&row.style.display==='none') return; // no tocar filas ocultas (ya pagadas)
    c.checked=sel;
    _pagoMasivoSel[sel?'add':'delete'](parseInt(c.value));
  });
  var all=document.getElementById('pm-chk-all');
  if(all) all.checked=sel;
  _pmActualizarConteo();
}

function _pmSeleccionarNoPagados(){
  // Oculta del listado a quien YA pagó el mes seleccionado y selecciona solo
  // a quienes faltan — así se ve de inmediato quién sigue pendiente.
  // El ocultamiento se calcula DENTRO de buildPagoMasivo() (usando _pmHideMode),
  // así que sobrevive al re-render completo que dispara renderPagoTab().
  _pmHideMode=true;
  var mesSel=_pmMesActual||monthStr();
  var pagadosSet=new Set((STATE.pagosRegulares||[]).filter(function(p){
    return (p.meses||[]).includes(mesSel);
  }).map(function(p){return p.crmFolio;}));
  _pagoMasivoSel.clear();
  STATE.matrículas.forEach(function(m){
    if(!pagadosSet.has(m.folio)) _pagoMasivoSel.add(m.folio);
  });
  renderPagoTab();
}

function _pmMostrarTodos(){
  _pmHideMode=false;
  renderPagoTab();
}

async function guardarPagoMasivo(){
  if(!hasPerm('gestionar_pagos')){alert('Sin permiso para registrar pagos');return;}
  var mes=document.getElementById('pm-mes')?.value;
  var metodo=document.getElementById('pm-metodo')?.value; // 'cash' | 'transfer' | 'card'
  var notas=(document.getElementById('pm-notas')?.value||'').trim();
  if(!mes){alert('Selecciona el mes que se está pagando.');return;}
  if(!metodo){alert('Selecciona el método de pago.');return;}
  if(_pagoMasivoSel.size===0){alert('Selecciona al menos un alumno.');return;}

  var folios=[..._pagoMasivoSel];
  var registrados=0;
  var omitidos=[];

  folios.forEach(function(folio){
    var m=STATE.matrículas.find(function(x){return x.folio===folio;});
    if(!m) return;
    var monto=parseFloat(document.getElementById('pm-monto-'+folio)?.value)||0;
    if(monto<=0){omitidos.push(m.alumno+' (monto 0)');return;}

    var yaPago=(STATE.pagosRegulares||[]).some(function(p){
      return p.crmFolio===folio&&(p.meses||[]).includes(mes);
    });
    if(yaPago){omitidos.push(m.alumno+' (ya pagó '+mesLabel(mes)+')');return;}

    // Comisión de Mercado Pago Point — solo aplica a pagos con terminal/tarjeta
    var commMP=0, ivaMP=0, neto=monto;
    if(metodo==='card'){
      commMP=+(monto*0.035).toFixed(2);
      ivaMP=+(commMP*0.16).toFixed(2);
      neto=+(monto-commMP-ivaMP).toFixed(2);
    }

    STATE.pagosRegulares.push({
      id:uid(),
      alumnoNombre:m.alumno,
      crmFolio:folio,
      curso:m.curso||'',
      grupoId:m.grupoId||null,
      meses:[mes],
      mesesCount:1,
      montoBase:monto,
      subtotal:monto,
      promoId:null,promoNombre:null,
      descuentoMonto:0,
      montoFinal:monto,
      commMP:commMP,ivaMP:ivaMP,
      neto:neto,
      method:metodo,
      fecha:fmtFecha(todayISO()),
      fechaISO:todayISO(),
      notas:notas||'Pago masivo — '+mesLabel(mes),
      createdAt:new Date().toISOString(),
      createdBy:currentUser.username,
    });
    registrados++;
  });

  await saveState();
  _pagoMasivoSel.clear();
  _pmHideMode=false;

  var msg='✅ '+registrados+' pago'+(registrados!==1?'s':'')+' registrado'+(registrados!==1?'s':'')+' para '+mesLabel(mes)+'.';
  if(metodo==='card'&&registrados>0) msg+='\n\n💳 Se aplicó comisión de Mercado Pago Point a cada pago.';
  if(omitidos.length>0) msg+='\n\n⚠️ Omitidos ('+omitidos.length+'):\n'+omitidos.join('\n');
  alert(msg);
  pagoSubTab='masivo';
  renderPagos();
  buildSidebar();
}

function onAlumnoChange(){
  const folio=parseInt(document.getElementById('rp-alumno')?.value);
  if(!folio)return;
  const m=STATE.matrículas.find(x=>x.folio===folio);
  if(!m)return;
  // Fill monto base from curso cost
  const cur=STATE.cursos.find(c=>c.nombre===m.curso);
  const base=cur?parseFloat(String(cur.costoBase||'').replace(/[^0-9.]/g,''))||0:0;
  const montoEl=document.getElementById('rp-monto-base');
  if(montoEl&&!montoEl.value&&base>0)montoEl.value=base;
  // Show info box
  const infoEl=document.getElementById('rp-alumno-info');
  const infoBox=document.getElementById('rp-info-box');
  if(infoEl)infoEl.style.display='block';
  if(infoBox)infoBox.innerHTML=`<strong>${m.alumno}</strong> · Folio #${m.folio} · <span class="badge badge-admin" style="font-size:11px">${m.curso}</span>${base>0?` · Costo base: <strong>${fmtMXN(base)}</strong>`:''}`;
  // Mark covered months
  const covered=new Set(STATE.pagosRegulares.filter(p=>String(p.crmFolio)===String(folio)).flatMap(p=>p.meses||[]));
  document.querySelectorAll('.month-chip').forEach(chip=>{
    const ym=chip.dataset.ym;
    chip.classList.remove('covered','sel');
    if(covered.has(ym)){chip.classList.add('covered');chip.title='Ya registrado';chip.onclick=null;}
    else{chip.onclick=function(){toggleMes(this);};}
  });
  calcPagoBreakdown();
}

let selectedMeses=[];
function toggleMes(chip){
  const ym=chip.dataset.ym;
  if(chip.classList.contains('covered'))return;
  if(chip.classList.contains('sel')){chip.classList.remove('sel');selectedMeses=selectedMeses.filter(m=>m!==ym);}
  else{chip.classList.add('sel');selectedMeses.push(ym);}
  selectedMeses.sort();
  const el=document.getElementById('rp-selected-months');
  if(el)el.textContent=selectedMeses.length>0?'Meses seleccionados: '+selectedMeses.map(m=>mesLabel(m)).join(', '):'';
  calcPagoBreakdown();
}

let selectedMethod='';
function selectMethod(btn){
  document.querySelectorAll('.method-btn').forEach(b=>b.className='method-btn');
  const m=btn.dataset.m;
  selectedMethod=m;
  btn.className='method-btn sel-'+m;
  const mpInfo=document.getElementById('rp-mp-info');
  if(mpInfo)mpInfo.style.display=m==='card'?'block':'none';
  calcPagoBreakdown();
}

function getPromosVigentes(cm){
  return STATE.promociones.filter(p=>{
    if(!p.activa)return false;
    if(p.estado==='inactiva')return false;
    // Date check: compare first 7 chars (YYYY-MM) to handle both date and month formats
    var fi=p.fechaInicio?p.fechaInicio.substring(0,7):'';
    var ff=p.fechaFin?p.fechaFin.substring(0,7):'';
    if(fi&&fi>cm)return false;
    if(ff&&ff<cm)return false;
    return true;
  });
}


function puedeAutorizarPromos(){
  return hasPerm('modo_dios') || (STATE.semidiosActivo && currentUser && currentUser.role==='admin');
}

function promoRazonInvalida(promo, n, cursoAlumno) {
  if(!promo) return null;
  if(promo.estado==='pendiente') return t('promo_no_autorizada');
  if(!promo.activa) return 'Esta promoción está <strong>desactivada</strong>.';
  const cm = monthStr();
  if(promo.fechaFin && promo.fechaFin < cm)
    return 'Esta promoción <strong>ya expiró</strong> (venció en ' + mesLabel(promo.fechaFin) + '). Ya no está vigente.';
  if(promo.fechaInicio && promo.fechaInicio > cm)
    return 'Esta promoción <strong>aún no está vigente</strong>. Iniciará en ' + mesLabel(promo.fechaInicio) + '.';
  if(promo.cursosAplicables && promo.cursosAplicables !== 'todos' && cursoAlumno) {
    const lista=promo.cursosAplicables.split(',').map(s=>s.trim());
    // Check if any entry matches: "CourseName" or "CourseName|grupoId"
    const aplica=lista.some(entry=>{
      const [cn]=entry.split('|');
      return cn===cursoAlumno||entry===cursoAlumno;
    });
    if(!aplica) return 'Esta promoción no aplica para el curso <strong>"' + cursoAlumno + '"</strong>.';
  }
  if(n < promo.mesesMinimos) {
    const faltan = promo.mesesMinimos - n;
    return 'Esta promoción requiere <strong>mínimo ' + promo.mesesMinimos + ' mes' + (promo.mesesMinimos>1?'es':'') + '</strong>.<br>' +
           'Tienes <strong>' + n + ' seleccionado' + (n>1?'s':'') + '</strong>. Agrega <strong>' + faltan + ' mes' + (faltan>1?'es más':'') + '</strong> para aplicarla.';
  }
  return null;
}

function calcPagoBreakdown(){
  const base=parseFloat(document.getElementById('rp-monto-base')?.value)||0;
  const n=selectedMeses.length;
  const promoId=document.getElementById('rp-promo')?.value;
  const cont=document.getElementById('rp-breakdown-cont');
  const box=document.getElementById('rp-breakdown');
  if(!cont||!box)return;
  if(base<=0||n===0){cont.style.display='none';return;}
  cont.style.display='block';
  const subtotal=+(base*n).toFixed(2);

  // Get alumno's course for course-specific promo validation
  const folioEl=document.getElementById('rp-alumno');
  const folio=folioEl?parseInt(folioEl.value):0;
  const mat=folio?STATE.matrículas.find(m=>m.folio===folio):null;
  const cursoAlumno=mat?mat.curso:'';

  let promo=null,descuento=0,promoLabel='',promoError='';
  let promo2=null,descuento2=0;
  const promoId2=puedeAutorizarPromos()?(document.getElementById('rp-promo2')?.value||''):'';
  if(promoId){
    promo=STATE.promociones.find(p=>p.id===promoId);
    const razon=promoRazonInvalida(promo,n,cursoAlumno);
    if(razon){ promoError=razon; descuento=0; }
    else if(promo){
      if(promo.tipo==='porcentaje') descuento=+(subtotal*promo.valor/100).toFixed(2);
      else descuento=+(promo.valor*n).toFixed(2);
      promoLabel=promo.nombre;
    }
  }
  if(promoId2&&promoId2!==promoId&&puedeAutorizarPromos()){
    promo2=STATE.promociones.find(p=>p.id===promoId2);
    if(promo2&&!promoRazonInvalida(promo2,n,cursoAlumno)){
      if(promo2.tipo==='porcentaje') descuento2=+((subtotal-descuento)*promo2.valor/100).toFixed(2);
      else descuento2=+(promo2.valor*n).toFixed(2);
    }
  }
  const total=+(subtotal-descuento-descuento2).toFixed(2);
  let mpLine='';
  if(selectedMethod==='card'){
    const comm=+(total*0.035).toFixed(2);
    const iva=+(comm*0.16).toFixed(2);
    const neto=+(total-comm-iva).toFixed(2);
    mpLine='<div class="breakdown-row" style="color:#6d28d9;font-size:12px"><span>Comisión MP (3.5% + IVA 16%)</span><span>-'+fmtMXN(+(comm+iva).toFixed(2))+'</span></div>'
          +'<div class="breakdown-row breakdown-total" style="color:#6d28d9"><span>💳 Neto en cuenta</span><span>'+fmtMXN(neto)+'</span></div>';
  }
  box.innerHTML=
    '<div class="breakdown-row"><span>'+t('pag_monto_base')+'</span><span>'+fmtMXN(base)+'</span></div>'
   +'<div class="breakdown-row"><span>'+t('pag_meses_count')+'</span><span>× '+n+'</span></div>'
   +'<div class="breakdown-row"><span>'+t('pag_subtotal')+'</span><span>'+fmtMXN(subtotal)+'</span></div>'
   +(promoError?'<div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:10px 13px;margin:8px 0;font-size:12px;color:#92600a;line-height:1.7">'
     +'<div style="font-weight:700;margin-bottom:2px">⚠️ Promoción no aplicable</div><div>'+promoError+'</div></div>':'')
   +(descuento>0?'<div class="breakdown-row" style="color:var(--green)"><span><span class="promo-badge"><i class="ti ti-tag" style="font-size:12px"></i> '+promoLabel+'</span></span><span>-'+fmtMXN(descuento)+'</span></div>':'')
   +(descuento2>0?'<div class="breakdown-row" style="color:#c4a000"><span><span class="promo-badge" style="background:#fef3dc;color:#92600a;border-color:#f5d88a"><i class="ti ti-bolt" style="font-size:12px"></i> ⚡ '+(promo2?promo2.nombre:'')+'</span></span><span>-'+fmtMXN(descuento2)+'</span></div>':'')
   +'<div class="breakdown-row breakdown-total"><span>'+t('pag_total')+'</span><span>'+fmtMXN(total)+'</span></div>'
   +mpLine;
}

async function guardarPago(){
  if(!hasPerm('gestionar_pagos')){alert('Sin permiso para registrar pagos');return;}
  const folioStr=document.getElementById('rp-alumno')?.value;
  const folio=parseInt(folioStr);
  const base=parseFloat(document.getElementById('rp-monto-base')?.value)||0;
  const promoId=document.getElementById('rp-promo')?.value;
  const fecha=document.getElementById('rp-fecha')?.value||todayISO();
  const notas=(document.getElementById('rp-notas')||{value:''}).value;
  if(!folio){alert(t('pag_sel_alumno_alert'));return;}
  if(selectedMeses.length===0){alert(t('pag_sel_mes_alert'));return;}
  if(base<=0){alert(t('pag_monto_alert'));return;}
  if(!selectedMethod){alert(t('pag_method_alert'));return;}
  const m=STATE.matrículas.find(x=>x.folio===folio);
  const subtotal=+(base*selectedMeses.length).toFixed(2);
  let descuentoMonto=0,promoNombre='';
  if(promoId){
    const promo=STATE.promociones.find(p=>p.id===promoId);
    const razon=promoRazonInvalida(promo,selectedMeses.length,m.curso);
    if(razon){
      const msgPlain=razon.replace(/<br>/g,' ').replace(/<[^>]+>/g,'');
      if(!confirm('⚠️ La promoción no se puede aplicar:\n\n'+msgPlain+'\n\n¿Registrar el pago sin el descuento?')) return;
    } else if(promo){
      descuentoMonto=promo.tipo==='porcentaje'?+(subtotal*promo.valor/100).toFixed(2):+(promo.valor*selectedMeses.length).toFixed(2);
      promoNombre=promo.nombre;
    }
  }
  // MP commission calculation
  // Second promo (God Mode stacking)
  let descuentoMonto2=0,promoNombre2='',promoId2=puedeAutorizarPromos()?(document.getElementById('rp-promo2')?.value||''):'';
  if(promoId2&&promoId2!==promoId){
    const p2=STATE.promociones.find(x=>x.id===promoId2);
    if(p2&&!promoRazonInvalida(p2,selectedMeses.length,m.curso)){
      descuentoMonto2=p2.tipo==='porcentaje'?+((subtotal-descuentoMonto)*p2.valor/100).toFixed(2):+(p2.valor*selectedMeses.length).toFixed(2);
      promoNombre2=p2.nombre;
    }
  }
  const montoFinal=+(subtotal-descuentoMonto-descuentoMonto2).toFixed(2);
  let commMP=0,ivaMP=0,neto=montoFinal;
  if(selectedMethod==='card'){commMP=+(montoFinal*0.035).toFixed(2);ivaMP=+(commMP*0.16).toFixed(2);neto=+(montoFinal-commMP-ivaMP).toFixed(2);}
  const pago={
    id:uid(),alumnoNombre:m.alumno,crmFolio:folio,curso:m.curso,stackAutorizadoPor:promoId2?currentUser.username:null,
    meses:[...selectedMeses],mesesCount:selectedMeses.length,
    montoBase:base,subtotal,promoId:promoId||null,promoNombre:promoNombre||null,
    descuentoMonto,promoId2:promoId2||null,promoNombre2:promoNombre2||null,descuentoMonto2,montoFinal,commMP,ivaMP,neto,
    method:selectedMethod,fecha,notas,
    createdAt:new Date().toISOString(),createdBy:currentUser.username,
  };
  STATE.pagosRegulares.push(pago);
  await saveState();
  alert(`✅ Pago registrado correctamente\n${m.alumno} — ${selectedMeses.map(s=>mesLabel(s)).join(', ')}\nTotal: ${fmtMXN(montoFinal)}`);
  selectedMeses=[];selectedMethod='';
  pagoSubTab='historial';
  renderPagos();buildSidebar();
}

function _fechaSortKey(p){ return p.fechaISO||p.fecha||''; }
function _fechaDisplay(p){
  const iso=p.fechaISO||p.fecha||'';
  if(!iso||iso.includes(' ')||iso.includes('de')) return iso;
  const[y,m,d]=iso.split('-');
  return d&&m&&y?`${d}/${m}/${y}`:iso;
}

async function guardarEdicionPago(id){
  const idx=(STATE.pagosRegulares||[]).findIndex(x=>String(x.id)===String(id));
  if(idx===-1){alert('Pago no encontrado.');return;}
  const fechaRaw=(document.getElementById('ep-fecha')?.value||'').trim();
  const method=(document.getElementById('ep-method')?.value||'cash').trim();
  const monto=parseFloat(document.getElementById('ep-monto')?.value)||0;
  const mesosRaw=(document.getElementById('ep-meses')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const notas=(document.getElementById('ep-notas')?.value||'').trim();
  if(!fechaRaw){alert('La fecha es obligatoria.');return;}
  if(monto<=0){alert('El monto debe ser mayor a 0.');return;}
  let commMP=0,ivaMP=0,neto=monto;
  if(method==='card'){commMP=+(monto*0.035).toFixed(2);ivaMP=+(commMP*0.16).toFixed(2);neto=+(monto-commMP-ivaMP).toFixed(2);}
  const pago=STATE.pagosRegulares[idx];
  STATE.pagosRegulares[idx]={...pago,fecha:fechaRaw,fechaISO:fechaRaw,method,montoFinal:monto,commMP,ivaMP,neto,notas,
    ...(mesosRaw.length>0?{meses:mesosRaw,mesesCount:mesosRaw.length}:{}),
    editadoEn:new Date().toISOString(),editadoPor:currentUser?.username||''};
  await saveState();
  closeModal();
  _historialQ='';
  renderPagoTab();
}

async function limpiarPagosHuerfanosCRM(){
  if(!hasPerm('modo_dios')){alert('Solo el Modo Dios puede usar esta función.');return;}
  const foliosValidos=new Set((STATE.matrículas||[]).map(m=>m.folio));
  const huerfanos=(STATE.pagosRegulares||[]).filter(p=>p.crmFolio!=null&&!foliosValidos.has(p.crmFolio));
  if(huerfanos.length===0){alert('✅ No hay pagos huérfanos. Todos los pagos tienen matrícula activa.');return;}
  const detalles=huerfanos.map(p=>`Folio #${p.crmFolio} — ${p.alumnoNombre||'(sin nombre)'} — ${(p.meses||[]).join(', ')} — ${fmtMXN(p.montoFinal||0)}`).join('\n');
  if(!confirm(`🗑️ Eliminar ${huerfanos.length} pago${huerfanos.length===1?'':'s'} huérfano${huerfanos.length===1?'':'s'} de CRM?\n\n${detalles}\n\nContabilidad los eliminará automáticamente en el siguiente ciclo de sincronización.\n\nEsta acción NO se puede deshacer.`))return;
  const foliosH=new Set(huerfanos.map(p=>p.crmFolio));
  STATE.pagosRegulares=(STATE.pagosRegulares||[]).filter(p=>!foliosH.has(p.crmFolio));
  await saveState();
  closeModal();
  renderPagos();
  buildSidebar();
  setTimeout(()=>alert(`✅ Eliminados ${huerfanos.length} pago${huerfanos.length===1?'':'s'} huérfano${huerfanos.length===1?'':'s'}. Recarga Contabilidad para ver los cambios.`),200);
}

async function eliminarPago(id){
  if(!confirm('¿Eliminar este pago? Esta acción no se puede deshacer.'))return;
  STATE.pagosRegulares=STATE.pagosRegulares.filter(p=>p.id!==id);
  await saveState();renderPagoTab();buildSidebar();
}

function buildPendientes(){
  const cm=monthStr();
  const pagosMes=(STATE.pagosRegulares||[]).filter(p=>p.meses&&p.meses.includes(cm));
  // String() normaliza el tipo para evitar mismatch entre string/number en crmFolio
  const pagados=new Set(pagosMes.map(p=>String(p.crmFolio)));
  const pendientes=(STATE.matrículas||[]).filter(m=>!pagados.has(String(m.folio)));
  if(pendientes.length===0)return`<div class="empty"><div class="empty-icon">🎉</div><h3>¡Todos pagaron!</h3><p>${t('pag_pend_vacia_sub')} ${mesLabel(cm)}</p></div>`;
  // Separar pendientes: anteriores (base mínima garantizada) vs nuevos este mes
  const folioNuevos=new Set((STATE.matrículas||[]).filter(m=>m.fechaISO&&m.fechaISO.startsWith(cm)).map(m=>String(m.folio)));
  const pendAnt=pendientes.filter(m=>!folioNuevos.has(String(m.folio)));
  const pendNvo=pendientes.filter(m=>folioNuevos.has(String(m.folio)));
  const filasPend=group=>`${group.map(m=>`<tr>
      <td style="font-weight:600">${esc(m.alumno)}</td>
      <td><span class="folio-tag">#${m.folio}</span></td>
      <td><span class="badge badge-admin">${esc(m.curso)}</span></td>
      <td style="font-size:12px;color:var(--text2)">${m.email||'—'}</td>
      <td><button class="btn-green btn-sm" onclick="precargarPago(${m.folio})"><i class="ti ti-cash"></i> ${t('pag_reg_pago')}</button></td>
    </tr>`).join('')}`;
  const tablaBase=`<div class="table-wrap fade-in"><table>
    <thead><tr><th>Alumno</th><th>Folio</th><th>Curso</th><th>Email</th><th>Acción</th></tr></thead>
    <tbody>${filasPend(pendientes)}</tbody></table></div>`;
  if(pendAnt.length>0&&pendNvo.length>0){
    return`<div style="font-size:13px;color:var(--text2);margin-bottom:12px">${t('pag_pend_texto')} <strong>${mesLabel(cm)}</strong> — ${pendientes.length} total:</div>
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Alumnos anteriores (${pendAnt.length})</div>
    <div class="table-wrap fade-in"><table>
      <thead><tr><th>Alumno</th><th>Folio</th><th>Curso</th><th>Email</th><th>Acción</th></tr></thead>
      <tbody>${filasPend(pendAnt)}</tbody></table></div>
    <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px">🆕 Nuevos inscritos este mes (${pendNvo.length})</div>
    <div class="table-wrap fade-in"><table>
      <thead><tr><th>Alumno</th><th>Folio</th><th>Curso</th><th>Email</th><th>Acción</th></tr></thead>
      <tbody>${filasPend(pendNvo)}</tbody></table></div>`;
  }
  const label=pendNvo.length===pendientes.length
    ?`${t('pag_pend_texto')} <strong>${mesLabel(cm)}</strong> — 🆕 todos son nuevos inscritos este mes:`
    :`${t('pag_pend_texto')} <strong>${mesLabel(cm)}</strong>:`;
  return`<div style="font-size:13px;color:var(--text2);margin-bottom:12px">${label}</div>${tablaBase}`;
}

    const el=document.getElementById('rp-alumno');
    if(el){el.value=folio;onAlumnoChange();}
  },100);
